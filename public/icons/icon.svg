<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#007AFF"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Kanban bars (pipeline columns) -->
  <rect x="88" y="280" width="80" height="130" rx="12" fill="url(#bar1)" opacity=".9"/>
  <rect x="216" y="180" width="80" height="230" rx="12" fill="url(#bar2)" opacity=".9"/>
  <rect x="344" y="120" width="80" height="290" rx="12" fill="url(#bar3)" opacity=".9"/>
  <!-- Trend line -->
  <path d="M128 270 L256 170 L384 110" stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
  <!-- Dots on line -->
  <circle cx="128" cy="270" r="8" fill="#00D2FF"/>
  <circle cx="256" cy="170" r="8" fill="#7C3AED"/>
  <circle cx="384" cy="110" r="8" fill="#34D399"/>
  <!-- Small check mark -->
  <path d="M362 98 L378 114 L406 82" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".6"/>
</svg>
