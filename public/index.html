// ─── THEME ──────────────────────────────────────────────
const DARK = {bg:'#0a0a0f',card:'#12121a',cardH:'#1a1a25',elev:'#1e1e2a',border:'#2a2a3a',borderL:'#3a3a4a',text:'#e8e8f0',dim:'#8888a0',muted:'#5a5a70',accent:'#6c5ce7',accentG:'#7c6cf7',accentS:'rgba(108,92,231,0.15)',success:'#00d2a0',successS:'rgba(0,210,160,0.12)',warn:'#ffa64d',warnS:'rgba(255,166,77,0.12)',danger:'#ff6b6b',dangerS:'rgba(255,107,107,0.12)',sport:'#00b4d8',sportS:'rgba(0,180,216,0.12)',relax:'#e77cd2',relaxS:'rgba(231,124,210,0.12)'};
const LIGHT = {bg:'#f5f5f8',card:'#ffffff',cardH:'#f0f0f5',elev:'#eeeef3',border:'#dddde5',borderL:'#ccccd5',text:'#1a1a2e',dim:'#6a6a80',muted:'#9999aa',accent:'#6c5ce7',accentG:'#5a4bd6',accentS:'rgba(108,92,231,0.1)',success:'#00b88d',successS:'rgba(0,184,141,0.1)',warn:'#e8943a',warnS:'rgba(232,148,58,0.1)',danger:'#e55555',dangerS:'rgba(229,85,85,0.1)',sport:'#0099bb',sportS:'rgba(0,153,187,0.1)',relax:'#d066bb',relaxS:'rgba(208,102,187,0.1)'};

const CATS = [{id:'werk',label:'Werk',icon:'💼'},{id:'sport',label:'Sport',icon:'🏃'},{id:'relax',label:'Ontspanning',icon:'🧘'},{id:'persoonlijk',label:'Persoonlijk',icon:'🏠'},{id:'zakelijk',label:'Zakelijk',icon:'📊'}];
const catColor = (id,t) => ({werk:t.accent,sport:t.sport,relax:t.relax,persoonlijk:t.warn,zakelijk:t.success})[id]||t.accent;
const catSoft = (id,t) => ({werk:t.accentS,sport:t.sportS,relax:t.relaxS,persoonlijk:t.warnS,zakelijk:t.successS})[id]||t.accentS;
const PRIS = ['high','medium','low'];
const PRI_L = {high:'Hoog',medium:'Midden',low:'Laag'};
const PRI_C = (p,t) => ({high:t.danger,medium:t.warn,low:t.success})[p];
const DURS = [{v:30,l:'30 min'},{v:60,l:'1 uur'},{v:90,l:'1,5 uur'},{v:120,l:'2 uur'}];
const RECUR = [{v:'none',l:'Geen'},{v:'daily',l:'Dagelijks'},{v:'weekdays',l:'Werkdagen'},{v:'weekly',l:'Wekelijks'},{v:'monthly',l:'Maandelijks'}];

const uid = () => Math.random().toString(36).substr(2,9);
const fd = d => new Date(d+'T12:00:00').toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
const ft = () => new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
const td = () => new Date().toISOString().split('T')[0];
const addD = (s,n) => {const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];};
const dayN = s => new Date(s+'T12:00:00').toLocaleDateString('nl-NL',{weekday:'short'});
const dayNum = s => new Date(s+'T12:00:00').getDate();
const fullD = s => new Date(s+'T12:00:00').toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
const p2 = n => String(n).padStart(2,'0');

const SLOTS = [];
for(let h=6;h<22;h++){SLOTS.push(`${p2(h)}:00`);SLOTS.push(`${p2(h)}:30`);}
const sIdx = s => SLOTS.indexOf(s);
const sNeed = d => Math.ceil(d/30);

const INIT_TEAM = [
  {id:'me',name:'Ik',ini:'IK',c:'#6c5ce7'},
  {id:'anna',name:'Anna',ini:'AB',c:'#00d2a0'},
  {id:'mark',name:'Mark',ini:'MV',c:'#00b4d8'},
];

const INIT_TASKS = [
  {id:uid(),title:'Kwartaalrapport afronden',category:'werk',priority:'high',assignee:'me',dueDate:td(),completed:false,notes:['Data verifiëren'],links:['https://docs.google.com'],createdAt:new Date().toISOString(),timeSlot:'09:00',duration:60,recur:'none'},
  {id:uid(),title:'Hardlopen 5km',category:'sport',priority:'medium',assignee:'me',dueDate:td(),completed:false,notes:[],links:[],createdAt:new Date().toISOString(),timeSlot:'17:00',duration:30,recur:'weekdays'},
  {id:uid(),title:'Teammeeting',category:'zakelijk',priority:'high',assignee:'anna',dueDate:td(),completed:false,notes:['Agenda'],links:[],createdAt:new Date().toISOString(),timeSlot:'10:30',duration:60,recur:'weekly'},
  {id:uid(),title:'Yoga',category:'relax',priority:'low',assignee:'me',dueDate:td(),completed:true,notes:[],links:[],createdAt:new Date().toISOString(),completedAt:new Date().toISOString(),timeSlot:'07:00',duration:30,recur:'daily'},
  {id:uid(),title:'Offerte versturen',category:'zakelijk',priority:'high',assignee:'mark',dueDate:td(),completed:false,notes:[],links:[],createdAt:new Date().toISOString(),timeSlot:'11:30',duration:30,recur:'none'},
  {id:uid(),title:'Boodschappen',category:'persoonlijk',priority:'low',assignee:'me',dueDate:td(),completed:false,notes:[],links:[],createdAt:new Date().toISOString(),timeSlot:null,duration:30,recur:'none'},
  {id:uid(),title:'Website review',category:'werk',priority:'medium',assignee:'me',dueDate:td(),completed:false,notes:[],links:[],createdAt:new Date().toISOString(),timeSlot:'14:00',duration:90,recur:'none'},
  {id:uid(),title:'Meditatie',category:'relax',priority:'low',assignee:'me',dueDate:td(),completed:true,notes:[],links:[],createdAt:new Date().toISOString(),completedAt:new Date().toISOString(),timeSlot:'06:30',duration:30,recur:'daily'},
  {id:uid(),title:'Q2 Strategie',category:'werk',priority:'high',assignee:'me',dueDate:addD(td(),1),completed:false,notes:[],links:[],createdAt:new Date().toISOString(),timeSlot:'09:00',duration:120,recur:'none'},
  {id:uid(),title:'Presentatie oefenen',category:'zakelijk',priority:'medium',assignee:'me',dueDate:addD(td(),2),completed:false,notes:[],links:[],createdAt:new Date().toISOString(),timeSlot:'10:00',duration:60,recur:'none'},
];

// Fake completion history for stats
const STATS_HISTORY = Array.from({length:7},(_,i) => ({
  date: addD(td(), i-6),
  dag: dayN(addD(td(), i-6)),
  afgerond: Math.floor(Math.random()*6)+2,
  gepland: Math.floor(Math.random()*4)+4,
}));

// ─── CSS HELPER ─────────────────────────────────────────
const S = (t) => `
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',system-ui,sans-serif; background:${t.bg}; color:${t.text}; }
  ::-webkit-scrollbar { width:6px } ::-webkit-scrollbar-thumb { background:${t.border}; border-radius:3px }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-80px) rotate(720deg);opacity:0} }
  @keyframes fadeOut { to{opacity:0;transform:translateY(-15px)} }
  @keyframes glow { 0%,100%{box-shadow:0 0 15px ${t.accentS}} 50%{box-shadow:0 0 30px rgba(108,92,231,.35)} }
  @keyframes pomoPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
  .fin{animation:fadeIn .35s ease}
`;

// ═══ COMPONENTS ═════════════════════════════════════════

// ─── Pomodoro Timer ─────────────────────────────────────
const Pomodoro = ({task, theme:t, onClose}) => {
  const [mode, setMode] = useState('work'); // work | break
  const [secs, setSecs] = useState(25*60);
  const [running, setRunning] = useState(false);
  const [cycles, setCycles] = useState(0);
  const iv = useRef(null);

  useEffect(() => {
    if (running && secs > 0) {
      iv.current = setInterval(() => setSecs(s => s - 1), 1000);
    } else if (secs === 0) {
      if (mode === 'work') { setCycles(c => c+1); setMode('break'); setSecs(5*60); }
      else { setMode('work'); setSecs(25*60); }
      try { new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQQAAAB/f39/').play(); } catch(e){}
    }
    return () => clearInterval(iv.current);
  }, [running, secs, mode]);

  const pct = mode === 'work' ? (1 - secs/(25*60))*100 : (1 - secs/(5*60))*100;
  const mm = Math.floor(secs/60), ss = secs%60;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',backdropFilter:'blur(8px)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn .2s ease'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:20,padding:32,width:340,textAlign:'center'}}>
        <div style={{fontSize:12,color:t.muted,textTransform:'uppercase',letterSpacing:2,marginBottom:4}}>{mode==='work'?'🍅 Focus':'☕ Pauze'}</div>
        <div style={{fontSize:11,color:t.dim,marginBottom:16}}>{task?.title || 'Pomodoro Timer'}</div>
        <div style={{position:'relative',width:180,height:180,margin:'0 auto 20px'}}>
          <svg viewBox="0 0 100 100" style={{transform:'rotate(-90deg)'}}>
            <circle cx="50" cy="50" r="44" fill="none" stroke={t.border} strokeWidth="6"/>
            <circle cx="50" cy="50" r="44" fill="none" stroke={mode==='work'?t.danger:t.success} strokeWidth="6" strokeDasharray={`${pct*2.76} 276`} strokeLinecap="round" style={{transition:'stroke-dasharray .5s'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div style={{fontSize:42,fontWeight:700,fontFamily:'monospace',animation:running?'pomoPulse 2s ease infinite':'none'}}>{p2(mm)}:{p2(ss)}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:16}}>
          <button onClick={()=>setRunning(!running)} style={{padding:'10px 24px',borderRadius:10,border:'none',background:running?t.dangerS:t.accentS,color:running?t.danger:t.accent,fontFamily:'inherit',fontSize:14,fontWeight:600,cursor:'pointer'}}>{running?'⏸ Pauze':'▶ Start'}</button>
          <button onClick={()=>{setSecs(mode==='work'?25*60:5*60);setRunning(false);}} style={{padding:'10px 16px',borderRadius:10,border:`1px solid ${t.border}`,background:'transparent',color:t.dim,fontFamily:'inherit',fontSize:13,cursor:'pointer'}}>↺ Reset</button>
        </div>
        <div style={{fontSize:11,color:t.muted}}>Rondes voltooid: {cycles}</div>
      </div>
    </div>
  );
};

// ─── Team Manager Modal ─────────────────────────────────
const TeamManager = ({team, onUpdate, onClose, theme:t}) => {
  const [name, setName] = useState('');
  const add = () => {
    if (!name.trim()) return;
    const ini = name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const cols = ['#6c5ce7','#00d2a0','#00b4d8','#e77cd2','#ffa64d','#ff6b6b','#a855f7'];
    onUpdate([...team, {id:uid(), name:name.trim(), ini, c:cols[team.length%cols.length]}]);
    setName('');
  };
  const remove = (id) => { if (id==='me') return; onUpdate(team.filter(m=>m.id!==id)); };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',backdropFilter:'blur(8px)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:20,padding:24,width:'100%',maxWidth:400}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:18}}>Team Beheren</div>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'none',background:t.elev,color:t.dim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
          {team.map(m => (
            <div key={m.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:t.elev,borderRadius:10}}>
              <div style={{width:30,height:30,borderRadius:'50%',background:m.c,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,color:'#fff'}}>{m.ini}</div>
              <div style={{flex:1,fontSize:13,fontWeight:500}}>{m.name}{m.id==='me'&&<span style={{fontSize:10,color:t.muted,marginLeft:6}}>(jij)</span>}</div>
              {m.id!=='me'&&<button onClick={()=>remove(m.id)} style={{background:'none',border:'none',color:t.danger,cursor:'pointer',fontSize:14}}>✕</button>}
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:8}}>
          <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Naam nieuw teamlid..." style={{flex:1,padding:'8px 12px',background:t.elev,border:`1px solid ${t.border}`,borderRadius:8,color:t.text,fontFamily:'inherit',fontSize:13,outline:'none'}}/>
          <button onClick={add} style={{padding:'8px 16px',borderRadius:8,background:t.accent,color:'#fff',border:'none',fontFamily:'inherit',fontWeight:600,cursor:'pointer'}}>+ Toevoegen</button>
        </div>
      </div>
    </div>
  );
};

// ─── Task Modal ─────────────────────────────────────────
const TaskModal = ({task,onSave,onClose,isNew,tasks,selDate,team,theme:t}) => {
  const [f,sf]=useState(task||{title:'',category:'werk',priority:'medium',assignee:'me',dueDate:selDate||td(),notes:[],links:[],subtasks:[],completed:false,timeSlot:null,duration:30,recur:'none'});
  const [nn,snn]=useState('');const [nl,snl]=useState('');const [sp,ssp]=useState(false);const [ns,sns]=useState('');
  const occ=useMemo(()=>{const s=new Set();tasks.filter(x=>x.id!==(task?.id)&&x.dueDate===f.dueDate&&x.timeSlot).forEach(x=>{const i=sIdx(x.timeSlot),n=sNeed(x.duration||30);for(let j=0;j<n&&i+j<SLOTS.length;j++)s.add(SLOTS[i+j]);});return s;},[tasks,f.dueDate,task]);
  const canFit=s=>{const i=sIdx(s),n=sNeed(f.duration||30);for(let j=0;j<n;j++){if(i+j>=SLOTS.length||occ.has(SLOTS[i+j]))return false;}return true;};
  const addNote=()=>{if(!nn.trim())return;sf({...f,notes:[...(f.notes||[]),nn.trim()]});snn('');};
  const addLink=()=>{if(!nl.trim())return;let u=nl.trim();if(!u.startsWith('http'))u='https://'+u;sf({...f,links:[...(f.links||[]),u]});snl('');};
  const inp = {width:'100%',padding:'8px 11px',background:t.elev,border:`1px solid ${t.border}`,borderRadius:8,color:t.text,fontFamily:'inherit',fontSize:13,outline:'none'};
  const lbl = {display:'block',fontSize:10,color:t.muted,textTransform:'uppercase',letterSpacing:1,marginBottom:4};
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',backdropFilter:'blur(8px)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16,animation:'fadeIn .2s'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:20,width:'100%',maxWidth:520,maxHeight:'90vh',overflowY:'auto',animation:'fadeIn .3s'}}>
        <div style={{padding:'18px 22px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontWeight:700,fontSize:18}}>{isNew?'Nieuwe Taak':'Taak Bewerken'}</div>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'none',background:t.elev,color:t.dim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
        <div style={{padding:'18px 22px'}}>
          <div style={{marginBottom:12}}><label style={lbl}>Titel</label><input style={inp} value={f.title} onChange={e=>sf({...f,title:e.target.value})} placeholder="Wat moet er gebeuren?" autoFocus/></div>
          <div style={{marginBottom:12}}><label style={lbl}>Categorie</label><div style={{display:'flex',gap:5,flexWrap:'wrap'}}>{CATS.map(c=><button key={c.id} onClick={()=>sf({...f,category:c.id})} style={{padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:500,border:`1px solid ${f.category===c.id?catColor(c.id,t):t.border}`,background:f.category===c.id?catSoft(c.id,t):'transparent',color:f.category===c.id?catColor(c.id,t):t.dim,cursor:'pointer',fontFamily:'inherit'}}>{c.icon} {c.label}</button>)}</div></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
            <div><label style={lbl}>Prioriteit</label><select style={{...inp,cursor:'pointer'}} value={f.priority} onChange={e=>sf({...f,priority:e.target.value})}>{PRIS.map(p=><option key={p} value={p}>{PRI_L[p]}</option>)}</select></div>
            <div><label style={lbl}>Datum</label><input type="date" style={inp} value={f.dueDate} onChange={e=>sf({...f,dueDate:e.target.value,timeSlot:null})}/></div>
            <div><label style={lbl}>Duur</label><select style={{...inp,cursor:'pointer'}} value={f.duration} onChange={e=>sf({...f,duration:+e.target.value,timeSlot:null})}>{DURS.map(d=><option key={d.v} value={d.v}>{d.l}</option>)}</select></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
            <div><label style={lbl}>Tijdslot</label>
              <div style={{display:'flex',gap:5}}><input style={{...inp,cursor:'pointer'}} readOnly value={f.timeSlot?`${f.timeSlot} (${f.duration}m)`:'Niet ingepland'} onClick={()=>ssp(!sp)}/>{f.timeSlot&&<button onClick={()=>sf({...f,timeSlot:null})} style={{padding:'4px 8px',borderRadius:6,border:`1px solid ${t.border}`,background:'transparent',color:t.dim,cursor:'pointer',fontSize:13}}>×</button>}</div>
              {sp&&<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:3,maxHeight:200,overflowY:'auto',marginTop:6}}>{SLOTS.map(s=>{const ok=canFit(s);return<button key={s} disabled={!ok} onClick={()=>{if(ok){sf({...f,timeSlot:s});ssp(false);}}} style={{padding:'6px 2px',borderRadius:6,border:`1px solid ${f.timeSlot===s?t.accent:t.border}`,background:f.timeSlot===s?t.accentS:t.elev,color:ok?(f.timeSlot===s?t.accent:t.dim):t.muted,opacity:ok?1:.25,cursor:ok?'pointer':'not-allowed',fontFamily:'inherit',fontSize:11}}>{s}</button>})}</div>}
            </div>
            <div><label style={lbl}>Toewijzen</label><select style={{...inp,cursor:'pointer'}} value={f.assignee} onChange={e=>sf({...f,assignee:e.target.value})}>{team.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr',gap:10,marginBottom:12}}>
            <div><label style={lbl}>Herhaling</label><select style={{...inp,cursor:'pointer'}} value={f.recur||'none'} onChange={e=>sf({...f,recur:e.target.value})}>{RECUR.map(r=><option key={r.v} value={r.v}>{r.l}</option>)}</select></div>
          </div>
          <div style={{marginBottom:12}}><label style={lbl}>Notities</label><div style={{display:'flex',gap:5}}><input style={inp} placeholder="Notitie..." value={nn} onChange={e=>snn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNote()}/><button onClick={addNote} style={{padding:'4px 10px',borderRadius:6,border:`1px solid ${t.border}`,background:'transparent',color:t.dim,cursor:'pointer',fontSize:14}}>+</button></div>

// ─── AI Coach with Claude API ───────────────────────────
const aiCall = async (msg, tasks, selDate, history) => {
  const sys = `Je bent een Nederlandse productiviteitscoach in TaskFlow Pro. Je hebt toegang tot de taken van de gebruiker. Wees kort, praktisch en motiverend. Gebruik emoji's. Huidige datum: ${selDate}. Taken vandaag: ${JSON.stringify(tasks.filter(t=>t.dueDate===selDate).map(t=>({titel:t.title,cat:t.category,prio:t.priority,tijd:t.timeSlot,klaar:t.completed,duur:t.duration+'m'})))}. Alle taken: ${tasks.length} totaal, ${tasks.filter(t=>!t.completed).length} open, ${tasks.filter(t=>t.completed).length} af.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:500, system:sys,
        messages: [...history.slice(-6).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text})), {role:'user',content:msg}]
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || 'Ik kon geen antwoord genereren. Probeer het opnieuw.';
  } catch(e) {
    return fallbackAI(msg, tasks, selDate);
  }
};

const fallbackAI = (msg, tasks, selDate) => {
  const m=msg.toLowerCase(),dt=tasks.filter(t=>t.dueDate===selDate),op=tasks.filter(t=>!t.completed),hp=op.filter(t=>t.priority==='high'),up=dt.filter(t=>!t.timeSlot&&!t.completed);
  if(m.includes('zoek')||m.includes('vind')){const q=m.replace(/zoek|vind|search|naar|taken|taak|voor/gi,'').trim();if(q){const f=tasks.filter(t=>t.title.toLowerCase().includes(q)||t.category.includes(q));return f.length?`🔍 ${f.length} gevonden:\n${f.map(t=>`• ${t.completed?'✅':'⬜'} ${t.title} (${fd(t.dueDate)} ${t.timeSlot||''})`).join('\n')}`:`🔍 Niets gevonden.`;}}
  if(m.includes('rapport')||m.includes('report')){return `📊 Dagrapport ${fd(selDate)}\n✅ ${dt.filter(t=>t.completed).length} af\n⬜ ${dt.filter(t=>!t.completed).length} open\n📅 ${dt.filter(t=>t.timeSlot).length} gepland`;}
  if(m.includes('tip')||m.includes('coach')||m.includes('help')){const tips=[];if(up.length)tips.push(`📌 ${up.length} ongeplande taken.`);if(hp.length>2)tips.push(`⚡ ${hp.length} urgente taken.`);if(!dt.some(x=>x.category==='sport'&&!x.completed))tips.push('🏃 Plan sport in!');return tips.length?tips.join('\n\n'):'👏 Ziet er goed uit!';}
  if(m.includes('planning')||m.includes('tijd')){const pl=dt.filter(t=>t.timeSlot).sort((a,b)=>a.timeSlot.localeCompare(b.timeSlot));return pl.length?`⏰ ${pl.map(t=>`${t.timeSlot} ${t.title} (${t.duration}m)`).join('\n')}`:'Geen planning.';}
  return `${hp.length?`🔴 ${hp.length} urgent\n`:''}${up.length?`📌 ${up.length} ongepland\n`:''}💡 Typ: "zoek", "tips", "planning", "rapport"`;
};

// ─── Exports (Apple Calendar + Outlook + Google compatible) ──
const makeICSEvent = (tk) => {
  const d=(tk.dueDate||td()).replace(/-/g,'');
  const st=tk.timeSlot?tk.timeSlot.replace(':','')+'00':'090000';
  const dm=tk.duration||30;
  const sh=+st.substr(0,2),sm=+st.substr(2,2),em=sm+dm,eh=sh+Math.floor(em/60);
  const et=`${p2(eh%24)}${p2(em%60)}00`;
  const notes=(tk.notes||[]).join('\\n');
  const cat=CATS.find(c=>c.id===tk.category)?.label||'';
  const sub=(tk.subtasks||[]).map(s=>`${s.done?'✓':'○'} ${s.title}`).join('\\n');
  const desc=`Categorie: ${cat}\\nPrioriteit: ${PRI_L[tk.priority]}${notes?'\\nNotities: '+notes:''}${sub?'\\nSubtaken:\\n'+sub:''}`;
  const euid=`${tk.id}@taskflowpro`;
  return `BEGIN:VEVENT\r\nUID:${euid}\r\nDTSTAMP:${d}T${st}Z\r\nDTSTART:${d}T${st}\r\nDTEND:${d}T${et}\r\nSUMMARY:${tk.title}\r\nDESCRIPTION:${desc}\r\nCATEGORIES:${cat}\r\nSTATUS:${tk.completed?'COMPLETED':'NEEDS-ACTION'}\r\nBEGIN:VALARM\r\nTRIGGER:-PT15M\r\nACTION:DISPLAY\r\nDESCRIPTION:${tk.title} begint over 15 minuten\r\nEND:VALARM\r\nEND:VEVENT`;
};

const makeICSFile = (events) => {
  return `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//TaskFlow Pro//NL\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:TaskFlow Pro\r\nX-WR-TIMEZONE:Europe/Amsterdam\r\n${events}\r\nEND:VCALENDAR`;
};

const expOutlook = tasks => {
  const ev=tasks.filter(t=>!t.completed).map(makeICSEvent).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([makeICSFile(ev)],{type:'text/calendar;charset=utf-8'}));
  a.download=`taskflow-${td()}.ics`;a.click();
};

const expAppleCalendar = (tasks) => {
  // Apple Calendar prefers opening .ics files directly
  const ev=tasks.filter(t=>!t.completed).map(makeICSEvent).join('\r\n');
  const blob=new Blob([makeICSFile(ev)],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  // On iOS/macOS, opening a .ics URL triggers the native calendar import
  window.open(url, '_blank');
};

const expSingleICS = (tk) => {
  const ics=makeICSFile(makeICSEvent(tk));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar;charset=utf-8'}));
  a.download=`${tk.title.replace(/[^a-zA-Z0-9 ]/g,'').trim()||'taak'}.ics`;
  a.click();
};

const expMail = (tasks,date) => {
  const dt=tasks.filter(t=>t.dueDate===date),dn=dt.filter(t=>t.completed),op=dt.filter(t=>!t.completed);
  const r=`DAGRAPPORT — ${fullD(date)}\n\n✅ AFGEROND (${dn.length})\n${dn.map(t=>`  ✓ ${t.timeSlot||'--:--'} ${t.title}`).join('\n')||'  Geen'}\n\n⬜ OPEN (${op.length})\n${op.map(t=>`  ○ ${t.timeSlot||'--:--'} ${t.title} [${PRI_L[t.priority]}]`).join('\n')||'  Alles af!'}\n\n— TaskFlow Pro`;
  window.open(`mailto:?subject=${encodeURIComponent('TaskFlow Dagrapport — '+fullD(date))}&body=${encodeURIComponent(r)}`,'_self');
};

const LS = {

  set: (key, val) => { try { localStorage.setItem('tf_'+key, JSON.stringify(val)); } catch {} },

};

  // ─── Slot Task Render ─────────────────────────────────
  const SlotTask = ({task:tk}) => {

          </div>

  // ─── WEEK VIEW ────────────────────────────────────────
  const WeekView = () => {
    const days = Array.from({length:7},(_,i)=>addD(selDate,i-3));
    return <div className="fin">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>

  // ─── STATS VIEW ───────────────────────────────────────
  const Stats = () => {
    const catData = CATS.map(c=>({name:c.label,value:tasks.filter(x=>x.category===c.id).length,color:catColor(c.id,t)})).filter(x=>x.value>0);
    const maxBar = Math.max(...STATS_HISTORY.map(d=>Math.max(d.afgerond,d.gepland)),1);
    const total = catData.reduce((s,c)=>s+c.value,0)||1;
    // Build donut segments
    let cumAngle = 0;
    const donutSegs = catData.map(c => {
      const angle = (c.value/total)*360;
      const start = cumAngle;
      cumAngle += angle;
      const r=60, ir=38, cx=80, cy=80;
      const toRad = a => (a-90)*Math.PI/180;
      const x1=cx+r*Math.cos(toRad(start)), y1=cy+r*Math.sin(toRad(start));
      const x2=cx+r*Math.cos(toRad(start+angle)), y2=cy+r*Math.sin(toRad(start+angle));
      const x3=cx+ir*Math.cos(toRad(start+angle)), y3=cy+ir*Math.sin(toRad(start+angle));
      const x4=cx+ir*Math.cos(toRad(start)), y4=cy+ir*Math.sin(toRad(start));
      const lg = angle>180?1:0;
      return {...c, path:`M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${x3},${y3} A${ir},${ir} 0 ${lg},0 ${x4},${y4} Z`};
    });
    return <div className="fin">
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>

        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16}}><div style={{fontSize:10,color:t.muted,textTransform:'uppercase',letterSpacing:1}}>Afgerond</div><div style={{fontSize:26,fontWeight:700,color:t.success}}>{allDn.length}</div></div>
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16}}><div style={{fontSize:10,color:t.muted,textTransform:'uppercase',letterSpacing:1}}>Voortgang</div><div style={{fontSize:26,fontWeight:700}}>{prog}%</div><div style={{height:5,background:t.elev,borderRadius:3,marginTop:5,overflow:'hidden'}}><div style={{height:'100%',background:`linear-gradient(90deg,${t.accent},${t.success})`,width:`${prog}%`,borderRadius:3}}/></div></div>
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16}}><div style={{fontSize:10,color:t.muted,textTransform:'uppercase',letterSpacing:1}}>Herhalend</div><div style={{fontSize:26,fontWeight:700,color:t.accent}}>{tasks.filter(x=>x.recur&&x.recur!=='none').length}</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:20}}>
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:20}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>📈 Afgelopen 7 dagen</div>
          <svg viewBox="0 0 350 160" style={{width:'100%',height:'auto'}}>
            {STATS_HISTORY.map((d,i)=>{
              const bw=18, gap=32, x=30+i*gap;
              const h1=(d.afgerond/maxBar)*120, h2=(d.gepland/maxBar)*120;
              return <g key={i}>
                <rect x={x} y={140-h2} width={bw} height={h2} rx={3} fill={t.accent} opacity={.35}/>
                <rect x={x} y={140-h1} width={bw} height={h1} rx={3} fill={t.success}/>
                <text x={x+bw/2} y={155} textAnchor="middle" fontSize="9" fill={t.muted}>{d.dag}</text>

          </svg>

            <span style={{fontSize:10,display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:2,background:t.success,display:'inline-block'}}/> Afgerond</span>
            <span style={{fontSize:10,display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:2,background:t.accent,opacity:.35,display:'inline-block'}}/> Gepland</span>
          </div>
        </div>
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:20}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>📊 Categorieën</div>
          <svg viewBox="0 0 160 160" style={{width:'100%',maxWidth:180,display:'block',margin:'0 auto'}}>

          </svg>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center',marginTop:8}}>{catData.map(d=><span key={d.name} style={{fontSize:10,color:d.color}}>● {d.name} ({d.value})</span>)}</div>
        </div>
      </div>
    </div>;

  // ─── Dashboard, Tasks, Team, Reports (compact) ────────
  const Dashboard = () => <div className="fin">

      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16}}><div style={{fontSize:10,color:t.muted,textTransform:'uppercase'}}>Ongepland</div><div style={{fontSize:26,fontWeight:700,color:t.warn}}>{unplan.length}</div></div>

    {insights.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:12,marginBottom:18}}>{insights.map((x,i)=><div key={i} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16}}><div style={{fontSize:22,marginBottom:6}}>{x.icon}</div><div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{x.title}</div><div style={{fontSize:12,color:t.dim}}>{x.text}</div></div>)}</div>}

  </div>;

  const Tasks = () => {const op=fTasks.filter(x=>!x.completed),cp=fTasks.filter(x=>x.completed);return <div className="fin">
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:t.elev,border:`1px solid ${t.border}`,borderRadius:14,marginBottom:14}}><span>🔍</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek..." style={{flex:1,background:'none',border:'none',color:t.text,fontFamily:'inherit',fontSize:13,outline:'none'}}/>{search&&<span style={{cursor:'pointer',color:t.muted}} onClick={()=>setSearch('')}>×</span>}</div>
    <div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
      <button onClick={()=>setFilt('all')} style={{...btnG,background:filt==='all'?t.accentS:'transparent',borderColor:filt==='all'?t.accent:t.border,color:filt==='all'?t.accent:t.dim,fontSize:11,padding:'4px 11px',borderRadius:20}}>Alles</button>
      {CATS.map(c=><button key={c.id} onClick={()=>setFilt(f=>f===c.id?'all':c.id)} style={{...btnG,background:filt===c.id?catSoft(c.id,t):'transparent',borderColor:filt===c.id?catColor(c.id,t):t.border,color:filt===c.id?catColor(c.id,t):t.dim,fontSize:11,padding:'4px 11px',borderRadius:20}}>{c.label}</button>)}
      <div style={{marginLeft:'auto'}}/>
      {!mergeMode ? (
        <button onClick={()=>{setMergeMode(true);setMergeSelected([]);}} style={{...btnG,fontSize:11,padding:'4px 11px',borderRadius:20}}>🔗 Samenvoegen</button>
      ) : (
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <span style={{fontSize:11,color:t.accent,fontWeight:600}}>{mergeSelected.length} geselecteerd</span>
          <button onClick={mergeTasks} disabled={mergeSelected.length<2} style={{...btnP,fontSize:11,padding:'4px 12px',borderRadius:20,opacity:mergeSelected.length<2?.4:1}}>✦ Voeg samen</button>
          <button onClick={cancelMerge} style={{...btnG,fontSize:11,padding:'4px 11px',borderRadius:20}}>Annuleren</button>
        </div>
      )}
    </div>
    {mergeMode&&<div style={{padding:'10px 14px',background:t.accentS,border:`1px solid ${t.accent}33`,borderRadius:10,marginBottom:14,fontSize:12,color:t.accent,display:'flex',alignItems:'center',gap:8}}>
      <span style={{fontSize:16}}>🔗</span>
      <span>Klik op 2 of meer taken om ze samen te voegen. De eerste wordt de hoofdtaak, de rest wordt subtaken.</span>
    </div>}
    <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Open ({op.length})</div>
    <div style={{display:'flex',flexDirection:'column',gap:5}}>{op.sort((a,b)=>PRIS.indexOf(a.priority)-PRIS.indexOf(b.priority)).map(Card)}<div onClick={()=>{setEditT(null);setModal(true);}} style={{background:t.card,border:`1px dashed ${t.border}`,borderRadius:14,padding:'10px 16px',cursor:'pointer',color:t.muted,fontSize:12,textAlign:'center'}}>＋ Nieuwe taak</div></div>
    {cp.length>0&&<><div style={{fontSize:14,fontWeight:600,margin:'20px 0 8px'}}>Afgerond ({cp.length})</div><div style={{display:'flex',flexDirection:'column',gap:5}}>{cp.map(Card)}</div></>}
    <div style={{display:'flex',gap:8,flexWrap:'wrap',padding:'12px 0',borderTop:`1px solid ${t.border}`,marginTop:18}}><button onClick={()=>{expOutlook(tasks);toast('Outlook .ics gedownload!');}} style={btnG}>📅 Outlook</button><button onClick={()=>{expAppleCalendar(tasks);toast('Apple Calendar geopend!');}} style={btnG}>🍎 Apple Agenda</button><button onClick={()=>{expMail(tasks,selDate);toast('Mail!');}} style={btnG}>📧 Rapport</button></div>
  </div>;};

  const TeamV = () => <div className="fin">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><div style={{fontWeight:600}}>Team ({team.length})</div><button onClick={()=>setTeamMgr(true)} style={btnP}>⚙ Beheren</button></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>{team.map(m=>{const mt=tasks.filter(x=>x.assignee===m.id),md=mt.filter(x=>x.completed);return <div key={m.id} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16,cursor:'pointer'}} onClick={()=>{setAFilt(m.id);setView('tasks');}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><div style={{width:30,height:30,borderRadius:'50%',background:m.c,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,color:'#fff'}}>{m.ini}</div><div><div style={{fontWeight:600,fontSize:13}}>{m.name}</div><div style={{fontSize:10,color:t.muted}}>{mt.length} taken</div></div></div>
      <div style={{height:5,background:t.elev,borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:`linear-gradient(90deg,${t.accent},${t.success})`,width:`${mt.length?Math.round(md.length/mt.length*100):0}%`}}/></div>
    </div>;})}</div>
    <div style={{display:'flex',flexDirection:'column',gap:5}}>{tasks.filter(x=>x.assignee!=='me'&&!x.completed).map(Card)}</div>
  </div>;

  const Reports = () => {const dd=dayT.filter(x=>x.completed),dop=dayT.filter(x=>!x.completed);return <div className="fin">
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>
      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16}}><div style={{fontSize:10,color:t.muted,textTransform:'uppercase'}}>Afgerond</div><div style={{fontSize:26,fontWeight:700,color:t.success}}>{dd.length}</div></div>
      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16}}><div style={{fontSize:10,color:t.muted,textTransform:'uppercase'}}>Open</div><div style={{fontSize:26,fontWeight:700}}>{dop.length}</div></div>
    </div>
    <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:18}}>
      <div style={{fontSize:11,fontWeight:600,color:t.accent,marginBottom:5,textTransform:'uppercase',letterSpacing:1}}>✅ Afgerond</div>
      {dd.length?dd.map(x=><div key={x.id} style={{fontSize:12,color:t.dim,padding:'2px 0',display:'flex',gap:6}}>✓ {x.timeSlot||'--:--'} — {x.title}</div>):<div style={{fontSize:12,color:t.muted,fontStyle:'italic'}}>Nog niets</div>}
      <div style={{fontSize:11,fontWeight:600,color:t.accent,margin:'12px 0 5px',textTransform:'uppercase',letterSpacing:1}}>⬜ Open</div>
      {dop.map(x=><div key={x.id} style={{fontSize:12,color:t.dim,padding:'2px 0',display:'flex',gap:6}}>○ {x.timeSlot||'--:--'} — {x.title}</div>)}
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',padding:'12px 0',borderTop:`1px solid ${t.border}`,marginTop:18}}><button onClick={()=>{expMail(tasks,selDate);toast('Mail!');}} style={btnP}>📧 Rapport Mailen</button><button onClick={()=>{expOutlook(tasks);toast('Outlook!');}} style={btnG}>📅 Outlook</button><button onClick={()=>{expAppleCalendar(tasks);toast('Apple Calendar!');}} style={btnG}>🍎 Apple Agenda</button></div>
  </div>;};

  const views={planner:Planner,dashboard:Dashboard,tasks:Tasks,week:WeekView,team:TeamV,stats:Stats,reports:Reports};
  const titles={planner:'Planner',dashboard:'Dashboard',tasks:'Taken',week:'Weekoverzicht',team:'Team',stats:'Statistieken',reports:'Rapportages'};
  const mTask=editT||(prefill?{title:'',category:'werk',priority:'medium',assignee:'me',dueDate:selDate,notes:[],links:[],completed:false,timeSlot:prefill,duration:30,recur:'none'}:null);

  return <>
    <style>{S(t)}{`
      .unpl-panel { } @media(max-width:1200px){.unpl-panel{display:none}} @media(max-width:768px){.sb{transform:translateX(-100%)!important}.sb.open{transform:translateX(0)!important}.ham{display:flex!important}.mc{padding:12px!important}.mh{padding:10px 12px!important}}
      .sb{position:fixed;left:0;top:0;bottom:0;width:250px;z-index:200;transition:transform .3s} @media(min-width:769px){.sb{position:relative;transform:none!important}}
      .aip{position:fixed;right:0;top:0;bottom:0;width:340px;z-index:200;transform:translateX(100%);transition:transform .3s}.aip.open{transform:translateX(0)}
      @media(max-width:768px){.aip{width:100%}}
      .slot-task:hover .srm{opacity:.6!important}
    `}</style>
    <div style={{display:'flex',height:'100vh',background:t.bg,color:t.text,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      {sbOpen&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:150}} onClick={()=>setSbOpen(false)}/>}
      <aside className={`sb ${sbOpen?'open':''}`} style={{background:t.card,borderRight:`1px solid ${t.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'18px 14px',borderBottom:`1px solid ${t.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,background:`linear-gradient(135deg,${t.accent},#a855f7)`,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,animation:'glow 3s ease infinite'}}>✦</div>
            <div><div style={{fontSize:18,fontWeight:700,background:`linear-gradient(135deg,${t.text},${t.accentG})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>TaskFlow Pro</div><div style={{fontSize:9,color:t.muted,letterSpacing:2,textTransform:'uppercase'}}>V2 — AI Powered</div></div>
          </div>
        </div>
        <nav style={{flex:1,padding:'10px 8px',overflowY:'auto'}}>
          <div style={{marginBottom:18}}><div style={{fontSize:9,color:t.muted,textTransform:'uppercase',letterSpacing:2,padding:'0 10px',marginBottom:5}}>Menu</div>
            {nav.map(n=><div key={n.id} onClick={()=>{setView(n.id);setSbOpen(false);}} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:8,cursor:'pointer',color:view===n.id?t.accentG:t.dim,background:view===n.id?t.accentS:'transparent',fontSize:13,marginBottom:2}}><span style={{width:16,textAlign:'center',fontSize:13}}>{n.icon}</span>{n.label}{n.badge>0&&<span style={{marginLeft:'auto',background:t.accentS,color:t.accentG,fontSize:10,padding:'1px 6px',borderRadius:10,fontWeight:600}}>{n.badge}</span>}</div>)}
          </div>
          <div style={{marginBottom:18}}><div style={{fontSize:9,color:t.muted,textTransform:'uppercase',letterSpacing:2,padding:'0 10px',marginBottom:5}}>Team</div>
            <div style={{display:'flex',padding:'6px 10px',flexWrap:'wrap'}}>{team.map(m=><div key={m.id} onClick={()=>{setAFilt(m.id);setView('team');setSbOpen(false);}} style={{width:28,height:28,borderRadius:'50%',background:m.c,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:600,color:'#fff',border:`2px solid ${t.card}`,marginLeft:m.id==='me'?0:-3,cursor:'pointer'}} title={m.name}>{m.ini}</div>)}<div onClick={()=>setTeamMgr(true)} style={{width:28,height:28,borderRadius:'50%',background:t.elev,border:`2px dashed ${t.borderL}`,display:'flex',alignItems:'center',justifyContent:'center',color:t.muted,marginLeft:-3,cursor:'pointer',fontSize:12}}>+</div></div>
          </div>
          <div><div style={{fontSize:9,color:t.muted,textTransform:'uppercase',letterSpacing:2,padding:'0 10px',marginBottom:5}}>Thema</div>
            <div onClick={()=>setDark(!dark)} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:8,cursor:'pointer',color:t.dim,fontSize:13}}><span>{dark?'🌙':'☀️'}</span>{dark?'Donker':'Licht'} Mode</div>
          </div>
          <div style={{marginTop:12}}><div style={{fontSize:9,color:t.muted,textTransform:'uppercase',letterSpacing:2,padding:'0 10px',marginBottom:5}}>Status</div>
            <div onClick={dbStatus!=='connected'?checkDb:undefined} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:8,cursor:dbStatus!=='connected'?'pointer':'default',color:dbStatus==='connected'?t.success:dbStatus==='checking'?t.accent:t.warn,fontSize:12}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:dbStatus==='connected'?t.success:dbStatus==='checking'?t.accent:t.warn,animation:dbStatus==='checking'?'pulse 1.5s ease infinite':'none'}}/>
              {dbStatus==='connected'?`Neon verbonden${dbLatency?' ('+dbLatency+'ms)':''}`:dbStatus==='checking'?'Controleren...':'Lokale opslag'}
            </div>
          </div>
        </nav>
      </aside>

      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header className="mh" style={{padding:'14px 24px',borderBottom:`1px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',background:t.bg}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}><button className="ham" onClick={()=>setSbOpen(true)} style={{display:'none',width:34,height:34,border:'none',background:t.elev,borderRadius:8,cursor:'pointer',color:t.text,fontSize:16,alignItems:'center',justifyContent:'center'}}>☰</button><h1 style={{fontSize:22,fontWeight:700}}>{titles[view]}</h1></div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={()=>{setEditT(null);setPrefill(null);setModal(true);}} style={btnP}>＋ Nieuwe Taak</button>
            <button onClick={()=>setAiOpen(!aiOpen)} style={{width:34,height:34,padding:0,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:8,background:aiOpen?t.accentS:t.elev,border:`1px solid ${aiOpen?t.accent:t.border}`,color:aiOpen?t.accent:t.dim,cursor:'pointer'}} title="AI Coach">✦</button>
          </div>
        </header>
        <div className="mc" style={{flex:1,overflowY:'auto',padding:'18px 24px'}}>
          {dbStatus==='offline'&&<div style={{padding:'10px 16px',marginBottom:16,borderRadius:10,background:t.warnS,border:`1px solid ${t.warn}44`,display:'flex',alignItems:'center',gap:10,animation:'fadeIn .3s'}}>
            <span style={{fontSize:18}}>⚠️</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:t.warn}}>Database niet verbonden</div>
              <div style={{fontSize:11,color:t.dim,marginTop:2}}>Data wordt lokaal opgeslagen in je browser. Configureer Neon + environment variables voor cloud sync.</div>
            </div>
            <button onClick={checkDb} style={{padding:'5px 12px',borderRadius:6,border:`1px solid ${t.warn}66`,background:'transparent',color:t.warn,cursor:'pointer',fontFamily:'inherit',fontSize:11,fontWeight:500,whiteSpace:'nowrap'}}>↻ Opnieuw</button>
          </div>}
          {dbStatus==='checking'&&<div style={{padding:'8px 16px',marginBottom:16,borderRadius:10,background:t.accentS,border:`1px solid ${t.accent}33`,display:'flex',alignItems:'center',gap:8,fontSize:12,color:t.accent,animation:'pulse 1.5s ease infinite'}}>⏳ Verbinding controleren...</div>}
          {views[view]?.()}
        </div>
      </main>

      <aside className={`aip ${aiOpen?'open':''}`} style={{background:t.card,borderLeft:`1px solid ${t.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:14,borderBottom:`1px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:7,fontWeight:600,fontSize:13}}><div style={{width:6,height:6,borderRadius:'50%',background:t.success,animation:'pulse 2s ease infinite'}}/>AI Coach</div>
          <button onClick={()=>setAiOpen(false)} style={{width:28,height:28,borderRadius:'50%',border:'none',background:t.elev,color:t.dim,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:14,display:'flex',flexDirection:'column',gap:10}}>
          {aiMsgs.map(m=><div key={m.id} style={{maxWidth:'92%',padding:'10px 14px',borderRadius:14,fontSize:12,lineHeight:1.55,animation:'fadeIn .3s',background:m.role==='bot'?t.elev:t.accentS,border:`1px solid ${m.role==='bot'?t.border:'rgba(108,92,231,.3)'}`,alignSelf:m.role==='bot'?'flex-start':'flex-end',whiteSpace:'pre-wrap'}}>{m.text}<div style={{fontSize:9,color:t.muted,marginTop:3}}>{m.time}</div></div>)}
          {aiLoading&&<div style={{alignSelf:'flex-start',padding:'10px 14px',borderRadius:14,fontSize:12,background:t.elev,border:`1px solid ${t.border}`,color:t.muted,animation:'pulse 1s ease infinite'}}>💭 Denkt na...</div>}
          <div ref={aiEnd}/>
        </div>
        <div style={{padding:'10px 14px',borderTop:`1px solid ${t.border}`,display:'flex',gap:7}}>
          <input value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendAi()} placeholder="Vraag je AI coach..." style={{flex:1,padding:'8px 10px',background:t.elev,border:`1px solid ${t.border}`,borderRadius:8,color:t.text,fontFamily:'inherit',fontSize:12,outline:'none'}}/>
          <button onClick={sendAi} disabled={aiLoading} style={{width:34,height:34,borderRadius:8,background:`linear-gradient(135deg,${t.accent},#8b5cf6)`,border:'none',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,opacity:aiLoading?.5:1}}>→</button>
        </div>
      </aside>

      {modal&&<TaskModal task={mTask} isNew={!editT} onSave={save} onClose={()=>{setModal(false);setEditT(null);setPrefill(null);}} tasks={tasks} selDate={selDate} team={team} theme={t}/>}
      {teamMgr&&<TeamManager team={team} onUpdate={setTeam} onClose={()=>setTeamMgr(false)} theme={t}/>}
      {pomoTask&&<Pomodoro task={pomoTask} theme={t} onClose={()=>setPomoTask(null)}/>}
      {celeb.s&&<div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}>{Array.from({length:10},(_,i)=><div key={i} style={{position:'absolute',width:7,height:7,borderRadius:2,left:`${20+Math.random()*60}%`,top:`${30+Math.random()*40}%`,background:['#6c5ce7','#00d2a0','#ffa64d','#00b4d8','#e77cd2','#ff6b6b'][i%6],animation:`confetti 1.5s ease forwards`,animationDelay:`${Math.random()*0.5}s`}}/>)}<div style={{fontSize:28,fontWeight:700,color:t.success,animation:'fadeIn .3s ease, fadeOut .5s ease 1.5s forwards',textShadow:`0 0 40px ${t.successS}`}}>{celeb.m}</div></div>}
      <div style={{position:'fixed',bottom:16,right:16,zIndex:9999,display:'flex',flexDirection:'column',gap:5}}>{toasts.map(x=><div key={x.id} style={{padding:'9px 14px',background:t.elev,border:`1px solid ${t.border}`,borderRadius:8,fontSize:12,boxShadow:'0 4px 24px rgba(0,0,0,.3)',animation:'slideUp .3s ease, fadeOut .3s ease 2.7s forwards',borderLeft:`3px solid ${x.type==='success'?t.success:t.accent}`}}>{x.type==='success'?'✓':'ℹ'} {x.message}</div>)}</div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
