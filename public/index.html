// ─── DATA PROTECTION: versioned migration ────────────
const isFirstLaunch=!LS.has('_initialized');
const storedVersion=LS.get('_initialized','0');

// Schema migration function — runs on every load, safe for existing data
const migrateData=()=>{
  // Migrate opps: ensure new fields exist
  if(LS.has('opps')){
    const opps=LS.get('opps',[]);
    const migrated=opps.map(o=>({contactIds:[],techTags:[],atosSalesId:'',atosDeliveryId:'',...o}));
    LS.set('opps',migrated);
  }
  // Migrate contacts: ensure tags array
  if(LS.has('contacts')){
    const cts=LS.get('contacts',[]);
    LS.set('contacts',cts.map(c=>({tags:[],companyId:c.companyId||c.company||'',...c})));
  }
  // Migrate companies: ensure tags
  if(LS.has('companies')){
    LS.set('companies',LS.get('companies',[]).map(c=>({tags:[],...c})));
  }
  // Store current version
  LS.set('_initialized',APP_VERSION);
};

// Run migration on every load (idempotent — safe to re-run)
if(!isFirstLaunch)migrateData();
if(isFirstLaunch)LS.set('_initialized',APP_VERSION);

// Auto-backup BEFORE any migration or load (preserve raw data)
if(!isFirstLaunch){
  try{
    const preLoad={};
    for(const k of['contacts','companies','opps','tasks','atos','interactions']){
      if(LS.has(k))preLoad[k]=LS.get(k,[]);
    }
    if(Object.keys(preLoad).length>0){
      localStorage.setItem('pf_backup_pre_update',JSON.stringify({...preLoad,ts:new Date().toISOString(),version:storedVersion}));
    }
  }catch{}
}

// ═══ SEARCHABLE SELECT ═════════════════════════════════
const SearchSelect=({value,onChange,options,placeholder,style:sx,t:theme})=>{
  const[open,setOpen]=useState(false);const[q,setQ]=useState('');const ref=useRef(null);
  const filtered=options.filter(o=>o.label.toLowerCase().includes(q.toLowerCase()));
  const selected=options.find(o=>o.value===value);
  const dark=theme.bg==='#000';
  const inpS={width:'100%',padding:'10px 14px',background:dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)',border:'none',borderRadius:10,color:theme.text,fontFamily:'inherit',fontSize:14,outline:'none'};
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[open]);
  return <div ref={ref} style={{position:'relative',...(sx||{})}}>
    <div onClick={()=>{setOpen(!open);setQ('');}} style={{...inpS,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',fontSize:13}}><span style={{color:selected?theme.text:theme.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selected?selected.label:placeholder||'Selecteer...'}</span><span style={{color:theme.muted,fontSize:10}}>▼</span></div>
    {open&&<div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:9999,background:theme.solid,border:`0.5px solid ${theme.border}`,borderRadius:10,marginTop:4,boxShadow:theme.shadow,maxHeight:220,overflowY:'auto'}}>
      <div style={{padding:'6px 8px',borderBottom:`0.5px solid ${theme.border}`}}><input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoeken..." style={{...inpS,padding:'6px 10px',fontSize:12}} onClick={e=>e.stopPropagation()}/></div>
      <div onClick={()=>{onChange('');setOpen(false);}} style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:theme.muted,borderBottom:`0.5px solid ${theme.border}`}}>— Geen selectie —</div>
      {filtered.map(o=><div key={o.value} onClick={()=>{onChange(o.value);setOpen(false);}} style={{padding:'8px 12px',fontSize:12,cursor:'pointer',color:value===o.value?theme.accent:theme.text,background:value===o.value?theme.accentS:'transparent',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>{o.label}</span>{o.sub&&<span style={{fontSize:10,color:theme.muted}}>{o.sub}</span>}</div>)}
      {filtered.length===0&&<div style={{padding:'12px',fontSize:12,color:theme.muted,textAlign:'center'}}>Geen resultaten</div>}
    </div>}
  </div>;
};

// ═══ APP ════════════════════════════════════════════════
const App = function(){
  const[dark,setDark]=useState(()=>LS.get('dark',true));
  const t=dark?DARK:LIGHT;
  const[contacts,setContacts]=useState(()=>LS.has('contacts')?LS.get('contacts',[]):isFirstLaunch?DEMO_CONTACTS:[]);
  const[companies,setCompanies]=useState(()=>LS.has('companies')?LS.get('companies',[]):isFirstLaunch?DEMO_COMPANIES:[]);
  const[opps,setOpps]=useState(()=>LS.has('opps')?LS.get('opps',[]):isFirstLaunch?DEMO_OPPS:[]);
  const[tasks,setTasks]=useState(()=>LS.has('tasks')?LS.get('tasks',[]):isFirstLaunch?DEMO_TASKS:[]);
  const[atosTeam,setAtosTeam]=useState(()=>LS.has('atos')?LS.get('atos',[]):isFirstLaunch?DEMO_ATOS:[]);
  const[interactions,setInteractions]=useState(()=>LS.get('interactions',[])); // {id,contactId,oppId,type:'call'|'email'|'meeting'|'note',text,at}
  const[view,setView]=useState('pipeline');
  const[sb,setSb]=useState(false);
  const[modal,setModal_]=useState(null);
  const[modalStack,setModalStack]=useState([]);
  const modalRef=useRef(null);
  useEffect(()=>{modalRef.current=modal;},[modal]);
  const stackRef=useRef([]);
  useEffect(()=>{stackRef.current=modalStack;},[modalStack]);
  const setModal=useCallback((m)=>{
    if(m){
      // Opening new modal — push current to stack
      if(modalRef.current)setModalStack(s=>[...s,modalRef.current]);
      setModal_(m);
    }else{
      // Closing — pop from stack or set null
      const stk=stackRef.current;
      if(stk.length>0){
        const next=[...stk];const last=next.pop();
        setModalStack(next);
        setModal_(last);
      }else{
        setModal_(null);
      }
    }
  },[]);
  const[detail,setDetail]=useState(null); // {type:'contact'|'opp'|'company', id:...}
  const[search,setSearch]=useState('');
  const[toasts,setToasts]=useState([]);
  const[dragOpp,setDragOpp]=useState(null);
  const[dbStatus,setDbStatus]=useState('checking');
  const[dbMs,setDbMs]=useState(null);
  const[aiOpen,setAiOpen]=useState(false);
  const[aiMsgs,setAiMsgs]=useState([{id:1,r:'bot',t:'👋 Ik ben je AI sales assistent.\n\nIk analyseer je pipeline, geef advies en help met:\n• Pipeline status & bottlenecks\n• Deal prioritering & volgende stappen\n• Contactstrategie & opvolging\n• Technologie-inzichten\n\nStel een vraag of typ "analyse" voor een volledig overzicht.',time:ft()}]);
  const[aiIn,setAiIn]=useState('');
  const[aiLoad,setAiLoad]=useState(false);
  const aiEnd=useRef(null);

  useEffect(()=>{LS.set('contacts',contacts);},[contacts]);
  useEffect(()=>{LS.set('companies',companies);},[companies]);
  useEffect(()=>{LS.set('opps',opps);},[opps]);
  useEffect(()=>{LS.set('tasks',tasks);},[tasks]);
  useEffect(()=>{LS.set('atos',atosTeam);},[atosTeam]);
  useEffect(()=>{LS.set('interactions',interactions);},[interactions]);
  const[filtCompany,setFiltCompany]=useState('');
  const[filtContact,setFiltContact]=useState('');
  const[filtTech,setFiltTech]=useState('');
  const[taskTab,setTaskTab]=useState('today');
  const[atQ,setAtQ]=useState('');
  const[atModal,setAtModal]=useState(null);
  useEffect(()=>{LS.set('dark',dark);},[dark]);

  // ─── DATA PROTECTION ──────────────────────────────
  // Auto-backup every 5 minutes
  const dataRef=useRef({contacts,companies,opps,tasks,atosTeam,interactions});
  useEffect(()=>{dataRef.current={contacts,companies,opps,tasks,atosTeam,interactions};},[contacts,companies,opps,tasks,atosTeam,interactions]);

  // Backup on every data change (debounced 2s) + every 5 min
  const backupTimer=useRef(null);
  useEffect(()=>{
    if(backupTimer.current)clearTimeout(backupTimer.current);
    backupTimer.current=setTimeout(()=>{
      try{localStorage.setItem('pf_backup',JSON.stringify({...dataRef.current,ts:new Date().toISOString(),v:APP_VERSION}));}catch{}
    },2000);
  },[contacts,companies,opps,tasks,atosTeam,interactions]);

  // Export all data as downloadable JSON file
  const exportData=()=>{
    const data={contacts,companies,opps,tasks,atosTeam,interactions,exportedAt:new Date().toISOString(),version:APP_VERSION};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`dpm-crm-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
    URL.revokeObjectURL(url);
    toast('Data geëxporteerd');
  };

  // Import data from JSON file
  const importData=()=>{
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=async(e)=>{
      const file=e.target.files?.[0];if(!file)return;
      try{
        const text=await file.text();const d=JSON.parse(text);
        if(!d.contacts&&!d.companies&&!d.opps){toast('Ongeldig bestand','info');return;}
        if(!confirm(`Data importeren van ${d.exportedAt?new Date(d.exportedAt).toLocaleString('nl-NL'):'onbekend'}?\n\n${(d.contacts||[]).length} contacten, ${(d.companies||[]).length} bedrijven, ${(d.opps||[]).length} deals, ${(d.tasks||[]).length} taken\n\nDit overschrijft je huidige data.`))return;
        if(d.contacts)setContacts(d.contacts);
        if(d.companies)setCompanies(d.companies);
        if(d.opps)setOpps(d.opps);
        if(d.tasks)setTasks(d.tasks);
        if(d.atosTeam)setAtosTeam(d.atosTeam);
        if(d.interactions)setInteractions(d.interactions);
        toast('Data geïmporteerd');
      }catch{toast('Import fout','info');}
    };input.click();
  };

  const restoreBackup=()=>{try{
    // Check both backup slots
    const regular=localStorage.getItem('pf_backup');
    const preUpdate=localStorage.getItem('pf_backup_pre_update');
    const options=[];
    if(regular){const b=JSON.parse(regular);options.push({label:`Laatste backup: ${new Date(b.ts).toLocaleString('nl-NL')}`,data:b});}
    if(preUpdate){const b=JSON.parse(preUpdate);options.push({label:`Pre-update backup: ${new Date(b.ts).toLocaleString('nl-NL')} (v${b.version||'?'})`,data:b});}
    if(!options.length){toast('Geen backups gevonden','info');return;}
    const choice=options.length===1?0:confirm(`Twee backups beschikbaar:\n\n1. ${options[0].label}\n${options[1]?'2. '+options[1].label:''}\n\nKlik OK voor de eerste, Annuleren voor de tweede.`)?0:1;
    const b=options[choice].data;
    if(confirm(`${options[choice].label}\n\nDit overschrijft je huidige data. Doorgaan?`)){
      setContacts(b.contacts||[]);setCompanies(b.companies||[]);setOpps(b.opps||[]);setTasks(b.tasks||[]);setAtosTeam(b.atosTeam||b.atos||[]);setInteractions(b.interactions||[]);toast('Backup teruggezet');
    }
  }catch{toast('Backup fout','info');}};

  // ─── Neon Connection Check ────────────────────────
  const checkDb=useCallback(async()=>{
    try{
      const r=await fetch('/api/health',{signal:AbortSignal.timeout(6000)});
      if(r.ok){const d=await r.json();setDbStatus('connected');setDbMs(d.latency_ms||null);}
      else setDbStatus('offline');
    }catch{setDbStatus('offline');}
  },[]);

  useEffect(()=>{
    if(location.hostname.includes('claudeusercontent')||location.protocol==='file:'){setDbStatus('offline');return;}
    checkDb();
    const iv=setInterval(()=>{if(document.visibilityState==='visible')checkDb();},300000);
    return()=>clearInterval(iv);
  },[checkDb]);

    // Group by date
    const grouped=taskTab!=='done'?[...new Set(shown.map(t=>t.dueDate||'no-date'))].sort((a,b)=>a==='no-date'?1:b==='no-date'?-1:a.localeCompare(b)):[];

    const TaskRow=({tk})=>{const isOverdue=tk.dueDate&&tk.dueDate<td()&&!tk.done;const oName=oppName(tk.oppId);return <div style={{...card,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,borderLeft:`3px solid ${isOverdue?t.red:tk.done?t.green:PRIS.find(p=>p.id===tk.priority)?.c||t.accent}`}}>
      {!tk.done?<div onClick={()=>{setTasks(p=>p.map(x=>x.id===tk.id?{...x,done:true}:x));toast(`"${tk.title}" afgerond`);}} style={{width:20,height:20,borderRadius:'50%',border:`2px solid ${t.muted}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}/>
      :<div onClick={()=>setTasks(p=>p.map(x=>x.id===tk.id?{...x,done:false}:x))} style={{width:20,height:20,borderRadius:'50%',background:t.green,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:700,cursor:'pointer',flexShrink:0}}>✓</div>}
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:500,textDecoration:tk.done?'line-through':'none',opacity:tk.done?.5:1}}>{tk.title}</div>
        <div style={{fontSize:11,color:t.dim,display:'flex',gap:8,marginTop:3,flexWrap:'wrap',alignItems:'center'}}>
          {tk.contactId&&<span onClick={e=>{e.stopPropagation();setDetail({type:'contact',id:tk.contactId});}} style={{color:t.accent,cursor:'pointer'}}>👤 {cName(tk.contactId)}</span>}
          {oName&&<span onClick={e=>{e.stopPropagation();setDetail({type:'opp',id:tk.oppId});}} style={{color:t.accent,cursor:'pointer',fontWeight:500}}>📊 {oName}</span>}
          {tk.dueDate&&<span style={{color:isOverdue?t.red:t.dim}}>{fds(tk.dueDate)}{tk.dueTime&&' · '+tk.dueTime}</span>}
          {tk.reminder&&<span>🔔{tk.reminderMin?<span style={{fontSize:10}}>{tk.reminderMin}m</span>:null}</span>}
          {tk.contactId&&compName(contacts.find(c=>c.id===tk.contactId)?.companyId)&&<span onClick={e=>{e.stopPropagation();const ct=contacts.find(c=>c.id===tk.contactId);if(ct?.companyId)setDetail({type:'company',id:ct.companyId});}} style={{color:t.teal,cursor:'pointer'}}>🏢 {compName(contacts.find(c=>c.id===tk.contactId)?.companyId)}</span>}
        </div>
      </div>
      {!tk.done&&<button onClick={()=>setModal({type:'task',data:tk})} style={{...btnG,padding:'4px 10px',fontSize:11}}>✎</button>}
      <button onClick={()=>{setTasks(p=>p.filter(x=>x.id!==tk.id));toast('Verwijderd','info');}} style={{background:'none',border:'none',color:t.red,cursor:'pointer',fontSize:14}}>✕</button>
    </div>;};

    return <div>
      {/* Stats cards */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {[{l:'Achterstallig',v:overdue.length,c:t.red,show:overdue.length>0},{l:'Vandaag',v:today.length,c:t.accent,show:true},{l:'Komend',v:upcoming.length,c:t.teal,show:true},{l:'Totaal Open',v:allOpen.length,c:t.text,show:true},{l:'Herinneringen',v:withReminder.length,c:t.orange,show:withReminder.length>0},{l:'Afgerond',v:done.length,c:t.green,show:true}].filter(s=>s.show).map((s,i)=><div key={i} style={{...card,padding:'8px 14px',flex:'1 1 100px',minWidth:100}}><div style={{fontSize:10,color:t.muted,textTransform:'uppercase',letterSpacing:.5,fontWeight:600}}>{s.l}</div><div style={{fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:4,marginBottom:16,background:dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)',borderRadius:10,padding:3}}>
        {[{id:'today',l:`Vandaag (${overdue.length+today.length})`},{id:'upcoming',l:`Komend (${upcoming.length})`},{id:'all',l:`Alle (${allOpen.length})`},{id:'done',l:`Afgerond (${done.length})`}].map(tab=><button key={tab.id} onClick={()=>setTaskTab(tab.id)} style={{flex:1,padding:'7px 12px',borderRadius:8,fontSize:12,fontWeight:taskTab===tab.id?600:400,border:'none',background:taskTab===tab.id?t.accent:'transparent',color:taskTab===tab.id?'#fff':t.dim,cursor:'pointer',fontFamily:'inherit',transition:`all .15s ${sp}`}}>{tab.l}</button>)}
      </div>

      {/* Add task button */}
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}><button onClick={()=>setModal({type:'task'})} style={btnP}>+ Taak</button></div>

      {/* Task list — grouped by date */}
      {taskTab!=='done'?<div style={{display:'flex',flexDirection:'column',gap:4}}>
        {grouped.map(date=>{const dateTasks=shown.filter(t=>(t.dueDate||'no-date')===date);const isOverdueGroup=date!=='no-date'&&date<td();const isTodayGroup=date===td();return <div key={date}>
          <div style={{fontSize:12,fontWeight:700,color:isOverdueGroup?t.red:isTodayGroup?t.accent:t.dim,padding:'10px 4px 4px',textTransform:'uppercase',letterSpacing:1}}>
            {date==='no-date'?'Geen datum':isTodayGroup?'Vandaag — '+fd(date):isOverdueGroup?'⚠ Achterstallig — '+fd(date):fd(date)}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>{dateTasks.map(tk=><TaskRow key={tk.id} tk={tk}/>)}</div>
        </div>;})}
        {noDue.length>0&&taskTab==='all'&&<div><div style={{fontSize:12,fontWeight:700,color:t.muted,padding:'10px 4px 4px',textTransform:'uppercase',letterSpacing:1}}>Geen deadline</div><div style={{display:'flex',flexDirection:'column',gap:5}}>{noDue.map(tk=><TaskRow key={tk.id} tk={tk}/>)}</div></div>}
        {shown.length===0&&<div style={{textAlign:'center',padding:40,color:t.muted}}>{taskTab==='today'?'Geen taken vandaag 👏':'Geen taken in deze categorie'}</div>}
      </div>
      :<div style={{display:'flex',flexDirection:'column',gap:4}}>
        {done.length===0&&<div style={{textAlign:'center',padding:40,color:t.muted}}>Nog geen afgeronde taken</div>}
        {done.slice(0,30).map(tk=><TaskRow key={tk.id} tk={tk}/>)}
        {done.length>30&&<div style={{textAlign:'center',color:t.muted,fontSize:12,padding:8}}>+{done.length-30} meer</div>}
      </div>}
    </div>;
  };

  // ─── DASHBOARD ────────────────────────────────────
  const Dash=()=>{
    const pOpps=opps.filter(o=>periodFilter(o.createdAt));
    const pActive=pOpps.filter(o=>o.stage!=='won'&&o.stage!=='lost');
    const pWon=pOpps.filter(o=>o.stage==='won');
    const pPipeline=pActive.reduce((s,o)=>s+o.value,0);
    const pWeighted=pActive.reduce((s,o)=>s+(o.value*o.probability/100),0);
    const pWonRev=pWon.reduce((s,o)=>s+o.value,0);
    const convRate=pOpps.length?(Math.round(pWon.length/pOpps.length*100)):0;
    const stageData=STAGES.filter(s=>s.id!=='won'&&s.id!=='lost').map(s=>({...s,count:pOpps.filter(o=>o.stage===s.id).length,val:pOpps.filter(o=>o.stage===s.id).reduce((sum,o)=>sum+o.value,0)}));
    const maxVal=Math.max(...stageData.map(s=>s.val),1);
    return <div>
      <PeriodBar/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10,marginBottom:20}}>
        {[{l:'Open Pipeline',v:eur(pPipeline),c:t.accent},{l:'Gewogen Waarde',v:eur(Math.round(pWeighted)),c:t.purple},{l:'Gewonnen',v:eur(pWonRev),c:t.green},{l:'Conversie',v:convRate+'%',c:t.orange},{l:'Actieve Deals',v:pActive.length,c:t.text},{l:'Taken Vandaag',v:todayTasks.length+(overdueTasks.length?` (+${overdueTasks.length})`:'')+' ',c:overdueTasks.length?t.red:t.text}].map((s,i)=><div key={i} style={card}><div style={lbl}>{s.l}</div><div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
        <div style={card}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Pipeline per Fase</div>
          <svg viewBox="0 0 300 140" style={{width:'100%'}}>
            {stageData.map((s,i)=>{const bw=40,gap=60,x=20+i*gap,h=(s.val/maxVal)*100;return <g key={i}>
              <rect x={x} y={120-h} width={bw} height={h} rx={6} fill={s.c} opacity={.85}/>
              <text x={x+bw/2} y={135} textAnchor="middle" fontSize="9" fill={t.muted} fontFamily="inherit">{s.l.slice(0,6)}</text>
              <text x={x+bw/2} y={115-h} textAnchor="middle" fontSize="9" fill={t.dim} fontFamily="inherit">{s.count}</text>
            </g>;})}
            <line x1="18" y1="120" x2="280" y2="120" stroke={t.border} strokeWidth=".5"/>
          </svg>
        </div>
        <div style={card}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Taken</div>
          {todayTasks.length===0&&overdueTasks.length===0?<div style={{textAlign:'center',padding:24,color:t.muted}}>Alles bij 👏</div>:
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {overdueTasks.slice(0,3).map(tk=><div key={tk.id} style={{fontSize:12,padding:'6px 10px',borderRadius:8,background:t.redS,color:t.red,fontWeight:500}}>🔴 {tk.title}</div>)}
            {todayTasks.slice(0,4).map(tk=><div key={tk.id} style={{fontSize:12,padding:'6px 10px',borderRadius:8,background:dark?'rgba(118,118,128,0.08)':'rgba(118,118,128,0.04)',display:'flex',justifyContent:'space-between'}}><span>{tk.title}</span><span style={{color:t.dim}}>{cName(tk.contactId)}</span></div>)}
          </div>}
        </div>
      </div>
      {activeOpps.filter(o=>o.priority==='high').length>0&&<div><div style={{fontSize:14,fontWeight:700,marginBottom:8}}>🔥 Hoge Prioriteit</div><div style={{display:'flex',flexDirection:'column',gap:6}}>{activeOpps.filter(o=>o.priority==='high').map(o=><div key={o.id} onClick={()=>setDetail({type:'opp',id:o.id})} style={{...card,padding:'10px 14px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',borderLeft:`3px solid ${t.red}`}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{o.title}</div><div style={{fontSize:11,color:t.dim}}>{cName(o.contactId)} · {stageC(o.stage).l}</div></div><div style={{fontWeight:700}}>{eur(o.value)}</div></div>)}</div></div>}
    </div>;
  };

  // ─── DETAIL PANEL (Contact/Opportunity) ───────────
  const DetailPanel=()=>{
    if(!detail)return null;
    if(detail.type==='contact'){
      const c=contacts.find(x=>x.id===detail.id);if(!c)return null;
      const cOpps=opps.filter(o=>o.contactId===c.id);
      const cTasks=tasks.filter(t=>t.contactId===c.id);
      return <div onClick={()=>setDetail(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',backdropFilter:'blur(8px)',zIndex:1000,display:'flex',justifyContent:'flex-end'}}><div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:500,background:t.solid,height:'100%',overflowY:'auto',boxShadow:'-10px 0 40px rgba(0,0,0,.2)'}}>
        <div style={{padding:24,borderBottom:`0.5px solid ${t.border}`}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}><button onClick={()=>setDetail(null)} style={{...btnG,padding:'4px 12px'}}>← Terug</button><div style={{display:'flex',gap:6}}><button onClick={()=>setModal({type:'contact',data:c})} style={{...btnG,padding:'4px 12px'}}>✎</button><button onClick={()=>{setContacts(p=>p.filter(x=>x.id!==c.id));setDetail(null);toast('Contact verwijderd','info');}} style={btnD}>🗑</button></div></div>
          <div style={{display:'flex',alignItems:'center',gap:14}}><div style={{width:56,height:56,borderRadius:'50%',background:`linear-gradient(135deg,${t.accent},${t.purple})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:'#fff'}}>{c.avatar}</div><div><div style={{fontSize:20,fontWeight:700}}>{c.name}</div><div style={{fontSize:13,color:t.dim}}>{c.role}{c.companyId&&<span> · <span onClick={e=>{e.stopPropagation();setDetail({type:'company',id:c.companyId});}} style={{color:t.accent,cursor:'pointer'}}>{compName(c.companyId)}</span></span>}</div></div></div>
          <div style={{display:'flex',gap:8,marginTop:14,flexWrap:'wrap'}}>
            {c.email&&<a href={`mailto:${c.email}`} style={{...btnG,padding:'6px 12px',fontSize:12,textDecoration:'none'}}>📧 {c.email}</a>}
            {c.phone&&<a href={`tel:${c.phone}`} style={{...btnG,padding:'6px 12px',fontSize:12,textDecoration:'none'}}>📱 {c.phone}</a>}
          </div>
          {/* INLINE TAG MANAGEMENT */}
          <div style={{display:'flex',gap:4,marginTop:12,flexWrap:'wrap',alignItems:'center'}}>
            {(c.tags||[]).map(tag=><span key={tag} style={{fontSize:10,padding:'2px 8px',borderRadius:6,background:t.accentS,color:t.accent,fontWeight:500,display:'flex',alignItems:'center',gap:4}}>{tag}<span onClick={()=>{removeTagFrom(contacts,setContacts,c.id,tag);toast('Tag verwijderd','info');}} style={{cursor:'pointer',fontSize:12}}>✕</span></span>)}
            <span onClick={()=>{const tg=prompt('Tag toevoegen:');if(tg){addTagTo(contacts,setContacts,c.id,tg);toast('Tag toegevoegd');}}} style={{fontSize:10,padding:'2px 8px',borderRadius:6,border:`1px dashed ${t.border}`,color:t.muted,cursor:'pointer'}}>+ tag</span>
          </div>
        </div>
        <div style={{padding:24}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Deals ({cOpps.length})</div>
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:20}}>
            {cOpps.map(o=><div key={o.id} onClick={()=>setDetail({type:'opp',id:o.id})} style={{...card,padding:'10px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:stageC(o.stage).c}}/>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{o.title}</div><div style={{fontSize:11,color:t.dim}}>{stageC(o.stage).l}</div></div>
              <span style={{fontWeight:700}}>{eur(o.value)}</span>
            </div>)}
            <button onClick={()=>setModal({type:'opp',data:{contactId:c.id,contactIds:[c.id],companyId:c.companyId||''}})} style={{...btnG,justifyContent:'center',fontSize:12}}>+ Nieuwe deal</button>
          </div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Taken ({cTasks.length})</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {cTasks.filter(t=>!t.done).map(tk=><div key={tk.id} style={{fontSize:13,padding:'8px 12px',borderRadius:8,background:dark?'rgba(118,118,128,0.08)':'rgba(118,118,128,0.04)',display:'flex',alignItems:'center',gap:8}}>
              <div onClick={()=>{setTasks(p=>p.map(x=>x.id===tk.id?{...x,done:true}:x));toast('Klaar!');}} style={{width:16,height:16,borderRadius:'50%',border:`2px solid ${t.muted}`,cursor:'pointer',flexShrink:0}}/>
              <span style={{flex:1}}>{tk.title}</span>
              {tk.dueDate&&<span style={{fontSize:11,color:tk.dueDate<td()?t.red:t.dim}}>{fds(tk.dueDate)}</span>}
            </div>)}
            <button onClick={()=>setModal({type:'task',data:{contactId:c.id}})} style={{...btnG,justifyContent:'center',fontSize:12}}>+ Taak</button>
          </div>
          {/* INTERACTIONS */}
          <div style={{marginTop:20}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span style={{fontSize:14,fontWeight:700}}>Interacties</span></div>
            <div style={{display:'flex',gap:4,marginBottom:10}}>{INT_TYPES.map(it=><button key={it.id} onClick={()=>{const txt=prompt(`${it.ic} ${it.l} met ${c.name}:`);if(txt){logInteraction(c.id,'',it.id,txt);toast(`${it.l} gelogd`);}}} style={{...btnG,padding:'5px 10px',fontSize:11}}>{it.ic} {it.l}</button>)}</div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {getInteractions(c.id).map(i=><div key={i.id} style={{padding:'8px 12px',borderRadius:8,background:dark?'rgba(118,118,128,0.05)':'rgba(118,118,128,0.03)',borderLeft:`3px solid ${i.type==='call'?t.green:i.type==='email'?t.accent:i.type==='meeting'?t.orange:t.purple}`,fontSize:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}><span style={{fontWeight:600}}>{INT_TYPES.find(x=>x.id===i.type)?.ic} {INT_TYPES.find(x=>x.id===i.type)?.l}</span><span style={{color:t.muted,fontSize:10}}>{fds(i.at)}</span></div>
                <div style={{color:t.dim}}>{i.text}</div>
              </div>)}
              {getInteractions(c.id).length===0&&<div style={{fontSize:12,color:t.muted,fontStyle:'italic',textAlign:'center',padding:12}}>Nog geen interacties gelogd</div>}
            </div>
          </div>
        </div>
      </div></div>;
    }
    if(detail.type==='opp'){
      const o=opps.find(x=>x.id===detail.id);if(!o)return null;
      const c=contacts.find(x=>x.id===o.contactId);
      const co=companies.find(x=>x.id===o.companyId);
      const oTasks=tasks.filter(t=>t.oppId===o.id);
      const oInts=getInteractions('',o.id);
      return <div onClick={()=>setDetail(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',backdropFilter:'blur(8px)',zIndex:1000,display:'flex',justifyContent:'flex-end'}}><div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:540,background:t.solid,height:'100%',overflowY:'auto',boxShadow:'-10px 0 40px rgba(0,0,0,.2)'}}>
        <div style={{padding:24,borderBottom:`0.5px solid ${t.border}`}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}><button onClick={()=>setDetail(null)} style={{...btnG,padding:'4px 12px'}}>← Terug</button><div style={{display:'flex',gap:6}}><button onClick={()=>setModal({type:'opp',data:o})} style={{...btnG,padding:'4px 12px'}}>✎</button><button onClick={()=>{setOpps(p=>p.filter(x=>x.id!==o.id));setDetail(null);toast('Deal verwijderd','info');}} style={btnD}>🗑</button></div></div>
          <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>{o.title}</div>
          {/* Clickable contact + company links */}
          <div style={{fontSize:13,color:t.dim,marginBottom:8,display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            {c?<span onClick={()=>setDetail({type:'contact',id:c.id})} style={{color:t.accent,cursor:'pointer'}}>👤 {c.name}</span>:<button onClick={()=>setModal({type:'contact',data:{companyId:o.companyId,_linkToOpp:o.id}})} style={{...btnG,padding:'3px 10px',fontSize:11}}>+ Contact toevoegen</button>}
            {co?<span onClick={()=>setDetail({type:'company',id:co.id})} style={{color:t.accent,cursor:'pointer'}}>🏢 {co.name}</span>:!o.companyId&&<button onClick={()=>setModal({type:'company',data:{_linkToOpp:o.id}})} style={{...btnG,padding:'3px 10px',fontSize:11}}>+ Bedrijf toevoegen</button>}
          </div>
          {/* Tech tags — inline add/remove */}
          {((o.techTags||[]).length>0||true)&&<div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:10,alignItems:'center'}}>
            {(o.techTags||[]).map(tt=><span key={tt} style={{fontSize:10,padding:'2px 8px',borderRadius:6,background:t.purpleS,color:t.purple,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>{tt}<span onClick={()=>setOpps(p=>p.map(x=>x.id===o.id?{...x,techTags:(x.techTags||[]).filter(t2=>t2!==tt)}:x))} style={{cursor:'pointer'}}>✕</span></span>)}
            <span onClick={()=>{const choices=TECH_TAGS.filter(tt=>!(o.techTags||[]).includes(tt));const tt=prompt('Tech tag toevoegen:\\n\\nSuggesties: '+choices.slice(0,8).join(', '));if(tt&&tt.trim())setOpps(p=>p.map(x=>x.id===o.id?{...x,techTags:[...new Set([...(x.techTags||[]),tt.trim()])]}:x));}} style={{fontSize:10,padding:'2px 8px',borderRadius:6,border:`1px dashed ${t.purple}44`,color:t.purple,cursor:'pointer'}}>+ tech</span>
          </div>}
          {/* Atos team display */}
          {(o.atosSalesId||o.atosDeliveryId)&&<div style={{display:'flex',gap:12,marginBottom:10,fontSize:12}}>
            {o.atosSalesId&&<span style={{color:t.accent}}>🔵 Sales: {atosName(o.atosSalesId)}</span>}
            {o.atosDeliveryId&&<span style={{color:t.green}}>🟢 Delivery: {atosName(o.atosDeliveryId)}</span>}
          </div>}
          <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
            <div style={{...card,padding:'10px 14px',flex:'1 1 100px'}}><div style={lbl}>Waarde</div><div style={{fontSize:20,fontWeight:700}}>{eur(o.value)}</div></div>
            <div style={{...card,padding:'10px 14px',flex:'1 1 80px'}}><div style={lbl}>Kans</div><div style={{fontSize:20,fontWeight:700}}>{o.probability}%</div></div>
            <div style={{...card,padding:'10px 14px',flex:'1 1 80px'}}><div style={lbl}>Gewogen</div><div style={{fontSize:20,fontWeight:700,color:t.green}}>{eur(Math.round(o.value*o.probability/100))}</div></div>
          </div>
          <div style={{fontSize:12,color:t.muted,marginBottom:8}}>FASE</div>

          </div>

            {co.email&&<a href={`mailto:${co.email}`} style={{...btnG,padding:'6px 12px',fontSize:12,textDecoration:'none'}}>📧 {co.email}</a>}
            {co.phone&&<a href={`tel:${co.phone}`} style={{...btnG,padding:'6px 12px',fontSize:12,textDecoration:'none'}}>📱 {co.phone}</a>}
          </div>
          {co.notes&&<div style={{marginTop:12,padding:'10px 14px',borderRadius:10,background:dark?'rgba(118,118,128,0.06)':'rgba(118,118,128,0.03)',fontSize:13,color:t.dim,borderLeft:`3px solid ${t.teal}`}}>{co.notes}</div>}
          <div style={{display:'flex',gap:4,marginTop:10,flexWrap:'wrap',alignItems:'center'}}>

            <span onClick={()=>{const tg=prompt('Tag toevoegen:');if(tg){addTagTo(companies,setCompanies,co.id,tg);toast('Tag toegevoegd');}}} style={{fontSize:10,padding:'2px 8px',borderRadius:6,border:`1px dashed ${t.border}`,color:t.muted,cursor:'pointer'}}>+ tag</span>

            <div style={{...card,padding:'10px 12px',textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:t.green}}>{eur(coVal)}</div><div style={{fontSize:10,color:t.muted}}>Waarde</div></div>

          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:20}}>
            {coContacts.map(c=><div key={c.id} onClick={()=>setDetail({type:'contact',id:c.id})} style={{...card,padding:'10px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>

              <div onClick={()=>{setTasks(p=>p.map(x=>x.id===tk.id?{...x,done:true}:x));toast('Klaar!');}} style={{width:16,height:16,borderRadius:'50%',border:`2px solid ${t.muted}`,cursor:'pointer',flexShrink:0}}/>

  // ─── MODALS ───────────────────────────────────────
  const ContactModal=()=>{const d=modal?.data;const[f,sf]=useState(d?.id?d:{name:'',email:'',phone:'',companyId:d?.companyId||'',role:'',tags:[],...(d||{})});const[tag,setTag]=useState('');const[showNewCo2,setShowNewCo2]=useState(false);const[newCoN2,setNewCoN2]=useState('');
  const inlineAddCo2=()=>{if(!newCoN2.trim())return;const nco={id:uid(),name:newCoN2.trim(),website:'',industry:'',address:'',size:'',phone:'',email:'',notes:'',tags:[],createdAt:new Date().toISOString()};setCompanies(p=>[...p,nco]);sf({...f,companyId:nco.id});setNewCoN2('');setShowNewCo2(false);toast('Bedrijf aangemaakt');};

      <div style={{padding:'16px 24px'}}>
        {[{k:'name',l:'Naam',p:'Volledige naam'},{k:'role',l:'Functie',p:'CEO, CTO...'},{k:'email',l:'E-mail',p:'email@voorbeeld.nl'},{k:'phone',l:'Telefoon',p:'+31...'}].map(x=><div key={x.k} style={{marginBottom:12}}><label style={lbl}>{x.l}</label><input style={inp} value={f[x.k]||''} onChange={e=>sf({...f,[x.k]:e.target.value})} placeholder={x.p}/></div>)}

          <button onClick={()=>setShowNewCo2(!showNewCo2)} style={{...btnG,padding:'6px 10px',fontSize:11,whiteSpace:'nowrap'}}>{showNewCo2?'✕':'+ Nieuw'}</button></div>
          {showNewCo2&&<div style={{display:'flex',gap:5,marginTop:6}}><input style={inp} value={newCoN2} onChange={e=>setNewCoN2(e.target.value)} placeholder="Bedrijfsnaam..." onKeyDown={e=>e.key==='Enter'&&inlineAddCo2()}/><button onClick={inlineAddCo2} style={{...btnP,padding:'6px 12px',fontSize:11}}>Aanmaken</button></div>}
        </div>

          {(f.tags||[]).length>0&&<div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>{f.tags.map((t2,i)=><span key={i} style={{fontSize:11,padding:'2px 8px',borderRadius:6,background:t.accentS,color:t.accent,display:'flex',alignItems:'center',gap:4}}>{t2}<span onClick={()=>sf({...f,tags:f.tags.filter((_,j)=>j!==i)})} style={{cursor:'pointer'}}>✕</span></span>)}</div>}</div>
      </div>
      <div style={{padding:'0 24px 20px',display:'flex',gap:8,justifyContent:'flex-end'}}><button onClick={()=>setModal(null)} style={btnG}>Annuleren</button><button onClick={()=>{if(!f.name?.trim()){toast('Vul een naam in','info');return;}const av=f.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);const newId=uid();if(d?.id){setContacts(p=>p.map(x=>x.id===d.id?{...x,...f,avatar:av}:x));toast('Contact bijgewerkt');}else{setContacts(p=>[...p,{...f,id:newId,avatar:av,createdAt:new Date().toISOString()}]);if(d?._linkToOpp){setOpps(p=>p.map(o=>o.id===d._linkToOpp?{...o,contactId:newId,contactIds:[...(o.contactIds||[]),newId],companyId:f.companyId||o.companyId}:o));}toast('Contact toegevoegd');}setModal(null);}} style={btnP}>{d?.id?'Opslaan':'Toevoegen'}</button></div>
    </div>
  </div>;};

  const OppModal=()=>{const d=modal?.data;
    const[f,sf]=useState(()=>{

      const base={title:'',contactId:'',contactIds:[],companyId:'',stage:'lead',value:0,probability:20,priority:'medium',nextAction:'',nextActionDate:'',techTags:[],atosSalesId:'',atosDeliveryId:'',notes:[],...(d||{})};

    const addContactToOpp=(cid)=>{if(!cid||((f.contactIds||[]).includes(cid)))return;const ct=contacts.find(c=>c.id===cid);sf({...f,contactId:f.contactId||cid,contactIds:[...(f.contactIds||[]),cid],companyId:ct?.companyId||f.companyId});};
    const inlineAddAtos=()=>{if(!newAtosName.trim())return;const a={id:uid(),name:newAtosName.trim(),role:newAtosRole,email:'',phone:''};setAtosTeam(p=>[...p,a]);if(newAtosRole==='sales')sf({...f,atosSalesId:a.id});else sf({...f,atosDeliveryId:a.id});setNewAtosName('');setShowAtosAdd(false);toast('Atos contact toegevoegd');};
  return <div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(12px)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:t.solid,borderRadius:16,width:'100%',maxWidth:540,maxHeight:'90vh',overflowY:'auto'}}>

      <div style={{padding:'16px 24px'}}>
        <div style={{marginBottom:12}}><label style={lbl}>Titel</label><input style={inp} value={f.title} onChange={e=>sf({...f,title:e.target.value})} placeholder="Elastic Observability, Dynatrace APM..." autoFocus/></div>

        {/* Bedrijf + inline aanmaken */}
        <div style={{marginBottom:12}}><label style={lbl}>Bedrijf</label>
          <div style={{display:'flex',gap:5,alignItems:'flex-start'}}><SearchSelect t={t} value={f.companyId||''} onChange={v=>{sf({...f,companyId:v,contactId:''});}} placeholder="Kies bedrijf..." options={companies.map(co=>({value:co.id,label:co.name,sub:co.industry}))} style={{flex:1}}/>
          <button onClick={()=>setShowNewCo(!showNewCo)} style={{...btnG,padding:'8px 10px',fontSize:11,whiteSpace:'nowrap'}}>{showNewCo?'✕':'+ Nieuw'}</button></div>

        </div>

  // ─── EXCEL IMPORT ──────────────────────────────────
  const ImportModal=()=>{
    const[impData,setImpData]=useState([]);const[impCols,setImpCols]=useState([]);
    const[impMapping,setImpMapping]=useState({title:'',company:'',contact:'',value:'',stage:'',probability:'',tech:'',nextAction:''});
    const[impStep,setImpStep]=useState(1);const[impResult,setImpResult]=useState(null);
    const fileRef=useRef(null);
    const fields=[{k:'title',l:'Titel *',req:true},{k:'company',l:'Bedrijf'},{k:'contact',l:'Contact'},{k:'value',l:'Waarde (€)'},{k:'stage',l:'Fase'},{k:'probability',l:'Kans (%)'},{k:'tech',l:'Technologie'},{k:'nextAction',l:'Volgende Actie'}];
    const stageMap={'lead':'lead','prospect':'lead','gekwalificeerd':'qualified','qualified':'qualified','voorstel':'proposal','proposal':'proposal','offerte':'proposal','onderhandeling':'negotiation','negotiation':'negotiation','gewonnen':'won','won':'won','verloren':'lost','lost':'lost'};
    const handleFile=async(e)=>{const file=e.target.files?.[0];if(!file)return;
      const ext=file.name.split('.').pop().toLowerCase();
      if(ext==='csv'||ext==='tsv'){
        const text=await file.text();const sep=ext==='tsv'?'\t':text.includes(';')?';':',';
        const lines=text.trim().split('\n').map(l=>l.split(sep).map(c=>c.replace(/^"|"$/g,'').trim()));
        if(lines.length<2)return toast('Bestand is leeg','info');
        setImpCols(lines[0]);setImpData(lines.slice(1));
        // Auto-map columns
        const m={...impMapping};lines[0].forEach((col,i)=>{const lc=col.toLowerCase();
          if(lc.includes('titel')||lc.includes('title')||lc.includes('deal')||lc.includes('naam'))m.title=col;
          else if(lc.includes('bedrijf')||lc.includes('company')||lc.includes('klant')||lc.includes('account'))m.company=col;
          else if(lc.includes('contact')||lc.includes('persoon'))m.contact=col;
          else if(lc.includes('waarde')||lc.includes('value')||lc.includes('bedrag')||lc.includes('omzet'))m.value=col;
          else if(lc.includes('fase')||lc.includes('stage')||lc.includes('status'))m.stage=col;
          else if(lc.includes('kans')||lc.includes('prob'))m.probability=col;
          else if(lc.includes('tech'))m.tech=col;
          else if(lc.includes('actie')||lc.includes('action')||lc.includes('next'))m.nextAction=col;
        });setImpMapping(m);setImpStep(2);
      }else{toast('Upload CSV of TSV bestand','info');}
    };
    const doImport=()=>{
      let added=0,skipped=0,companiesAdded=0,contactsAdded=0;
      impData.forEach(row=>{const g=col=>col?row[impCols.indexOf(col)]||'':'';
        const title=g(impMapping.title);if(!title){skipped++;return;}
        // Find or create company
        let coId='';const coName=g(impMapping.company);
        if(coName){const ex=companies.find(c=>c.name.toLowerCase()===coName.toLowerCase());if(ex)coId=ex.id;else{const nco={id:uid(),name:coName,website:'',industry:'',address:'',size:'',phone:'',email:'',notes:'',tags:[],createdAt:new Date().toISOString()};setCompanies(p=>[...p,nco]);coId=nco.id;companiesAdded++;}}
        // Find or create contact
        let ctId='';const ctName=g(impMapping.contact);
        if(ctName){const ex=contacts.find(c=>c.name.toLowerCase()===ctName.toLowerCase());if(ex)ctId=ex.id;else{const av=ctName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);const nct={id:uid(),name:ctName,email:'',phone:'',companyId:coId,role:'',tags:[],avatar:av,createdAt:new Date().toISOString()};setContacts(p=>[...p,nct]);ctId=nct.id;contactsAdded++;}}
        const rawStage=(g(impMapping.stage)||'').toLowerCase();const stage=stageMap[rawStage]||'lead';
        const val=parseInt((g(impMapping.value)||'0').replace(/[^\d]/g,''))||0;
        const prob=parseInt(g(impMapping.probability))||20;
        const tech=(g(impMapping.tech)||'').split(/[,;|]/).map(s=>s.trim()).filter(Boolean);
        const now=new Date().toISOString();
        setOpps(p=>[...p,{id:uid(),title,contactId:ctId,contactIds:ctId?[ctId]:[],companyId:coId,stage,value:val,probability:prob,priority:'medium',nextAction:g(impMapping.nextAction),nextActionDate:'',techTags:tech,atosSalesId:'',atosDeliveryId:'',notes:[],createdAt:now,updatedAt:now,closedAt:null}]);added++;
      });
      setImpResult({added,skipped,companiesAdded,contactsAdded});setImpStep(3);
    };
    return <div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(12px)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:t.solid,borderRadius:16,width:'100%',maxWidth:580,maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{padding:'20px 24px 0',display:'flex',justifyContent:'space-between'}}><span style={{fontSize:19,fontWeight:700}}>📥 Opportunities Importeren</span><button onClick={()=>setModal(null)} style={{width:30,height:30,borderRadius:'50%',border:'none',background:t.elev,color:t.dim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>
        <div style={{padding:'16px 24px'}}>
          {impStep===1&&<div>
            <div style={{padding:30,borderRadius:12,border:`2px dashed ${t.border}`,textAlign:'center',cursor:'pointer',marginBottom:16}} onClick={()=>fileRef.current?.click()}>
              <div style={{fontSize:32,marginBottom:8}}>📄</div>
              <div style={{fontSize:14,fontWeight:600}}>Sleep een CSV of klik om te uploaden</div>
              <div style={{fontSize:12,color:t.muted,marginTop:4}}>CSV, TSV — kolommen worden automatisch herkend</div>
            </div>
            <input ref={fileRef} type="file" accept=".csv,.tsv" onChange={handleFile} style={{display:'none'}}/>
            <div style={{fontSize:12,color:t.dim,padding:'10px 14px',borderRadius:10,background:dark?'rgba(118,118,128,0.06)':'rgba(118,118,128,0.03)'}}>
              <div style={{fontWeight:600,marginBottom:6}}>Verwachte kolommen (flexibel):</div>
              Titel/Deal, Bedrijf/Account, Contact, Waarde/Bedrag, Fase/Stage, Kans(%), Technologie, Volgende Actie
            </div>
          </div>}
          {impStep===2&&<div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>📋 {impData.length} rijen gevonden — Koppel kolommen:</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
              {fields.map(f2=><div key={f2.k}><label style={lbl}>{f2.l}</label><select style={{...inp,cursor:'pointer',fontSize:12}} value={impMapping[f2.k]} onChange={e=>setImpMapping({...impMapping,[f2.k]:e.target.value})}><option value="">— Niet koppelen —</option>{impCols.map(c=><option key={c} value={c}>{c}</option>)}</select></div>)}
            </div>
            <div style={{fontSize:12,color:t.dim,marginBottom:12}}>Preview (eerste 3 rijen):</div>
            <div style={{overflowX:'auto',marginBottom:16}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}><thead><tr>{impCols.slice(0,6).map(c=><th key={c} style={{padding:'4px 8px',borderBottom:`1px solid ${t.border}`,textAlign:'left',color:t.muted}}>{c}</th>)}</tr></thead><tbody>{impData.slice(0,3).map((r,i)=><tr key={i}>{r.slice(0,6).map((c,j)=><td key={j} style={{padding:'4px 8px',borderBottom:`0.5px solid ${t.border}`}}>{c}</td>)}</tr>)}</tbody></table></div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><button onClick={()=>setImpStep(1)} style={btnG}>Terug</button><button onClick={doImport} disabled={!impMapping.title} style={{...btnP,opacity:impMapping.title?1:.5}}>Importeer {impData.length} deals</button></div>
          </div>}
          {impStep===3&&impResult&&<div style={{textAlign:'center',padding:20}}>
            <div style={{fontSize:48,marginBottom:12}}>✅</div>
            <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>Import voltooid!</div>
            <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:20}}>
              {[{l:'Deals',v:impResult.added,c:t.green},{l:'Overgeslagen',v:impResult.skipped,c:t.orange},{l:'Bedrijven',v:impResult.companiesAdded,c:t.accent},{l:'Contacten',v:impResult.contactsAdded,c:t.purple}].map((s,i)=><div key={i} style={{...card,padding:'8px 14px'}}><div style={{fontSize:10,color:t.muted}}>{s.l}</div><div style={{fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
            </div>
            <button onClick={()=>setModal(null)} style={btnP}>Sluiten</button>
          </div>}
        </div>
      </div>
    </div>;
  };

  // ─── REPORTS / SALES FUNNEL ────────────────────────
  const Reports=()=>{
    const funnelStages=STAGES.filter(s=>s.id!=='won'&&s.id!=='lost');
    const funnelData=funnelStages.map(s=>{const st=opps.filter(o=>o.stage===s.id);return{...s,count:st.length,val:st.reduce((sum,o)=>sum+o.value,0),weighted:st.reduce((sum,o)=>sum+(o.value*o.probability/100),0)};});
    const maxCount=Math.max(...funnelData.map(d=>d.count),1);
    const totalAll=opps.length||1;
    const convRate=opps.length?Math.round(wonOpps.length/opps.length*100):0;
    const avgDealSize=activeOpps.length?Math.round(totalPipeline/activeOpps.length):0;
    const avgWon=wonOpps.length?Math.round(wonRevenue/wonOpps.length):0;

    // Funnel widths (percentage) — widest at top, narrowing down
    const fW=funnelData.map((d,i)=>{const base=90-i*12;return Math.max(base*(d.count/maxCount),20);});

    return <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:10,marginBottom:24}}>
        {[{l:'Totaal Deals',v:opps.length,c:t.text},{l:'Conversie',v:convRate+'%',c:t.green},{l:'Gem. Dealgrootte',v:eur(avgDealSize),c:t.accent},{l:'Gem. Gewonnen',v:eur(avgWon),c:t.green},{l:'Pipeline Waarde',v:eur(totalPipeline),c:t.purple},{l:'Verloren',v:opps.filter(o=>o.stage==='lost').length,c:t.red}].map((s,i)=><div key={i} style={card}><div style={lbl}>{s.l}</div><div style={{fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
        {/* VISUAL FUNNEL */}
        <div style={card}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>Sales Funnel</div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
            {funnelData.map((d,i)=>{const w=fW[i];return <div key={d.id} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
              <div style={{width:`${w}%`,background:`linear-gradient(135deg,${d.c}cc,${d.c}88)`,borderRadius:i===0?'12px 12px 4px 4px':i===funnelData.length-1?'4px 4px 12px 12px':'4px',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',minHeight:52,transition:`all 0.4s ${sp}`}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>{d.l}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.7)'}}>{d.count} deal{d.count!==1?'s':''}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:15,fontWeight:700,color:'#fff'}}>{eur(d.val)}</div>
                  <div style={{fontSize:10,color:'rgba(255,255,255,0.6)'}}>gewogen {eur(Math.round(d.weighted))}</div>
                </div>
              </div>
              {i<funnelData.length-1&&<div style={{position:'absolute',bottom:-6,fontSize:10,color:t.muted,zIndex:1}}>
                {funnelData[i+1].count>0&&d.count>0?Math.round(funnelData[i+1].count/d.count*100)+'%':'—'}
              </div>}
            </div>;})}
          </div>
          <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:20}}>
            <div style={{textAlign:'center'}}><div style={{fontSize:20,fontWeight:700,color:t.green}}>🏆 {wonOpps.length}</div><div style={{fontSize:11,color:t.dim}}>Gewonnen</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:20,fontWeight:700,color:t.red}}>✕ {opps.filter(o=>o.stage==='lost').length}</div><div style={{fontSize:11,color:t.dim}}>Verloren</div></div>
          </div>
        </div>

        {/* CONVERSION TABLE */}
        <div style={card}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Conversie per Fase</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {funnelData.map((d,i)=>{const pct=d.count>0?Math.round(d.count/totalAll*100):0;return <div key={d.id}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:8,height:8,borderRadius:'50%',background:d.c}}/><span style={{fontSize:13,fontWeight:600}}>{d.l}</span></div>
                <div style={{display:'flex',gap:12,alignItems:'center'}}><span style={{fontSize:12,color:t.dim}}>{d.count} deals</span><span style={{fontSize:13,fontWeight:700}}>{eur(d.val)}</span></div>
              </div>
              <div style={{height:6,background:t.elev,borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:d.c,width:`${pct}%`,borderRadius:3,transition:`width 0.5s ${sp}`}}/></div>
              {i<funnelData.length-1&&funnelData[i+1].count>0&&d.count>0&&<div style={{fontSize:10,color:t.muted,textAlign:'right',marginTop:2}}>↓ {Math.round(funnelData[i+1].count/d.count*100)}% conversie</div>}
            </div>;})}
          </div>
          <div style={{marginTop:20,padding:'14px 16px',borderRadius:10,background:t.greenS,border:`0.5px solid ${t.green}33`}}>
            <div style={{fontSize:13,fontWeight:700,color:t.green,marginBottom:4}}>Lead → Won Conversie</div>
            <div style={{fontSize:28,fontWeight:800,color:t.green}}>{convRate}%</div>
            <div style={{fontSize:11,color:t.dim,marginTop:2}}>{wonOpps.length} van {opps.length} deals gewonnen</div>
          </div>
        </div>
      </div>

      {/* PIPELINE VALUE CHART */}
      <div style={card}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Pipeline Waarde per Fase</div>
        <svg viewBox="0 0 500 160" style={{width:'100%'}}>
          {funnelData.map((d,i)=>{const bw=60,gap=110,x=30+i*gap,maxV=Math.max(...funnelData.map(s=>s.val),1),h=(d.val/maxV)*110;return <g key={i}>
            <rect x={x} y={130-h} width={bw} height={h} rx={8} fill={d.c} opacity={.8}/>
            <text x={x+bw/2} y={145} textAnchor="middle" fontSize="10" fill={t.muted} fontFamily="Outfit,system-ui">{d.l.slice(0,8)}</text>
            <text x={x+bw/2} y={123-h} textAnchor="middle" fontSize="10" fill={t.dim} fontWeight="600" fontFamily="Outfit,system-ui">{eur(d.val)}</text>
          </g>;})}
          <line x1="28" y1="130" x2="480" y2="130" stroke={t.border} strokeWidth=".5"/>
        </svg>
      </div>
    </div>;
  };

  // ─── ATOS TEAM VIEW ────────────────────────────────
  const AtosView=()=>{
    const sales=atosTeam.filter(a=>a.role==='sales');const delivery=atosTeam.filter(a=>a.role==='delivery');
    const filtered=atosTeam.filter(a=>{if(!atQ)return true;const q=atQ.toLowerCase();return a.name.toLowerCase().includes(q)||a.role.includes(q)||(a.email||'').includes(q);});
    const atosDeals=(aid)=>opps.filter(o=>o.atosSalesId===aid||o.atosDeliveryId===aid);

    return <div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <div style={{flex:1,...inp,display:'flex',alignItems:'center',gap:8,padding:'8px 14px'}}><span style={{color:t.muted}}>🔍</span><input value={atQ} onChange={e=>setAtQ(e.target.value)} placeholder="Zoek teamleden..." style={{flex:1,background:'none',border:'none',color:t.text,fontFamily:'inherit',fontSize:14,outline:'none'}}/>{atQ&&<span onClick={()=>setAtQ('')} style={{cursor:'pointer',color:t.muted}}>✕</span>}</div>
        <button onClick={()=>setAtModal({name:'',role:'sales',email:'',phone:''})} style={btnP}>+ Teamlid</button>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {[{l:'Sales',v:sales.length,c:t.accent},{l:'Delivery',v:delivery.length,c:t.green},{l:'Totaal',v:atosTeam.length,c:t.text}].map((s,i)=><div key={i} style={{...card,padding:'8px 14px',flex:1}}><div style={{fontSize:10,color:t.muted,textTransform:'uppercase',fontWeight:600}}>{s.l}</div><div style={{fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {filtered.map(a=>{const deals=atosDeals(a.id);const dealVal=deals.filter(o=>o.stage!=='lost').reduce((s,o)=>s+o.value,0);return <div key={a.id} style={{...card,padding:'14px 16px',display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:42,height:42,borderRadius:10,background:a.role==='sales'?`linear-gradient(135deg,${t.accent},${t.purple})`:`linear-gradient(135deg,${t.green},${t.teal})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff',flexShrink:0}}>{a.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600}}>{a.name}</div>
            <div style={{fontSize:12,color:t.dim}}><span style={{color:a.role==='sales'?t.accent:t.green,fontWeight:600}}>{a.role==='sales'?'🔵 Sales':'🟢 Delivery'}</span>{a.email&&' · '+a.email}</div>
            {deals.length>0&&<div style={{fontSize:11,color:t.dim,marginTop:3}}>{deals.length} deal{deals.length!==1?'s':''} · {eur(dealVal)}</div>}
          </div>
          <div style={{display:'flex',gap:4}}>
            <button onClick={()=>setAtModal(a)} style={{...btnG,padding:'4px 10px',fontSize:11}}>✎</button>
            <button onClick={()=>{if(confirm('Teamlid verwijderen?'))setAtosTeam(p=>p.filter(x=>x.id!==a.id));}} style={{...btnD,padding:'4px 10px',fontSize:11}}>✕</button>
          </div>
        </div>;})}
      </div>
    </div>;
  };

  // ─── COMPANIES VIEW ────────────────────────────────
  const Companies=()=>{
    const filtered=companies.filter(c=>{if(!search)return true;const q=search.toLowerCase();return c.name.toLowerCase().includes(q)||(c.industry||'').toLowerCase().includes(q)||(c.address||'').toLowerCase().includes(q)||(c.tags||[]).some(tg=>tg.includes(q));});
    return <div>
      <div style={{display:'flex',gap:8,marginBottom:16}}><div style={{flex:1,...inp,display:'flex',alignItems:'center',gap:8,padding:'8px 14px'}}><span style={{color:t.muted}}>🔍</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek bedrijven..." style={{flex:1,background:'none',border:'none',color:t.text,fontFamily:'inherit',fontSize:14,outline:'none'}}/>{search&&<span onClick={()=>setSearch('')} style={{cursor:'pointer',color:t.muted}}>✕</span>}</div><button onClick={()=>setModal({type:'company'})} style={btnP}>+ Bedrijf</button></div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {filtered.map(co=>{const coContacts=contacts.filter(c=>c.companyId===co.id);const coOpps=opps.filter(o=>o.companyId===co.id&&o.stage!=='lost');const coVal=coOpps.reduce((s,o)=>s+o.value,0);return <div key={co.id} onClick={()=>setDetail({type:'company',id:co.id})} style={{...card,padding:'14px 16px',display:'flex',alignItems:'center',gap:14,cursor:'pointer'}}>
          <div style={{width:42,height:42,borderRadius:10,background:`linear-gradient(135deg,${t.teal},${t.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:'#fff',flexShrink:0}}>{co.name.charAt(0)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600}}>{co.name}</div>
            <div style={{fontSize:12,color:t.dim}}>{co.industry}{co.address&&' · '+co.address}</div>
            <div style={{display:'flex',gap:6,marginTop:4,alignItems:'center'}}>
              {coContacts.length>0?<span style={{fontSize:10,color:t.accent}}>👤 {coContacts.length} contact{coContacts.length!==1?'en':''}</span>:<span style={{fontSize:10,color:t.orange,fontWeight:500}}>Geen contactpersoon</span>}
              {co.tags?.length>0&&co.tags.map(tg=><span key={tg} style={{fontSize:10,padding:'1px 6px',borderRadius:5,background:t.accentS,color:t.accent}}>{tg}</span>)}
            </div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            {coOpps.length>0&&<div style={{fontSize:13,fontWeight:700}}>{eur(coVal)}</div>}
            <div style={{fontSize:11,color:t.dim}}>{coOpps.length} deal{coOpps.length!==1?'s':''}</div>
          </div>
        </div>;})}
      </div>
    </div>;
  };

  // Navigation
  const views={pipeline:Pipeline,contacts:Contacts,companies:Companies,atos:AtosView,tasks:Tasks,dashboard:Dash,reports:Reports};
  const titles={pipeline:'Pipeline',contacts:'Contacten',companies:'Bedrijven',atos:'Atos Team',tasks:'Taken',dashboard:'Dashboard',reports:'Rapporten'};
  const nav=[{id:'dashboard',ic:'◆',l:'Dashboard'},{id:'pipeline',ic:'📊',l:'Pipeline'},{id:'companies',ic:'🏢',l:'Bedrijven'},{id:'contacts',ic:'👤',l:'Contacten'},{id:'atos',ic:'🔵',l:'Atos Team'},{id:'tasks',ic:'☑',l:'Taken'},{id:'reports',ic:'📈',l:'Rapporten'}];

  return <>
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
      *{margin:0;padding:0;box-sizing:border-box}body{font-family:Outfit,system-ui,-apple-system,sans-serif;background:${t.bg};color:${t.text}}
      ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:${t.border};border-radius:3px}
      @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
      @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
      @keyframes glow{0%,100%{box-shadow:0 0 12px ${t.accentS}}50%{box-shadow:0 0 28px ${t.accentS}}}
      .sb{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:200;transition:transform .3s ${sp}}
      @media(min-width:769px){.sb{position:relative;transform:none!important}}
      @media(max-width:768px){.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.ham{display:flex!important}.mc{padding:14px!important}}
      .aip{position:fixed;right:0;top:0;bottom:0;width:360px;z-index:200;transform:translateX(100%);transition:transform .3s ${sp}}.aip.open{transform:translateX(0)}
      @media(max-width:768px){.aip{width:100%}}
    `}</style>
    <div style={{display:'flex',height:'100vh'}}>
      {sb&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:150}} onClick={()=>setSb(false)}/>}
      <aside className={`sb ${sb?'open':''}`} style={{background:t.bg2,borderRight:`0.5px solid ${t.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'20px 16px',borderBottom:`0.5px solid ${t.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,background:`linear-gradient(135deg,${t.accent},#5856D6)`,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:'#fff',animation:'glow 3s ease infinite'}}>D</div><div><div style={{fontSize:18,fontWeight:800,letterSpacing:-.3}}>DPM CRM</div><div style={{fontSize:9,color:t.muted,letterSpacing:2,textTransform:'uppercase',fontWeight:600}}>Sales Pipeline</div></div></div>
        </div>
        <nav style={{flex:1,padding:'12px 10px'}}>
          {nav.map(n=><div key={n.id} onClick={()=>{setView(n.id);setSb(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,cursor:'pointer',color:view===n.id?t.accent:t.dim,background:view===n.id?t.accentS:'transparent',fontSize:14,fontWeight:view===n.id?600:400,marginBottom:2,transition:`all .15s ${sp}`}}><span style={{fontSize:15}}>{n.ic}</span>{n.l}</div>)}
          <div style={{borderTop:`0.5px solid ${t.border}`,marginTop:16,paddingTop:12}}>
            <div onClick={()=>setDark(!dark)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,cursor:'pointer',color:t.dim,fontSize:13}}>{dark?'🌙':'☀️'} {dark?'Donker':'Licht'}</div>
            <div onClick={exportData} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,cursor:'pointer',color:t.dim,fontSize:13}}>📤 Data exporteren</div>
            <div onClick={importData} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,cursor:'pointer',color:t.dim,fontSize:13}}>📥 Data importeren</div>
            <div onClick={restoreBackup} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,cursor:'pointer',color:t.dim,fontSize:13}}>💾 Backup terugzetten</div>
          </div>
        </nav>
        <div style={{padding:'12px 16px',borderTop:`0.5px solid ${t.border}`}}>
          <div style={{fontSize:11,color:t.muted}}>Pipeline: {eur(totalPipeline)}</div>
          <div style={{fontSize:11,color:t.green}}>{wonOpps.length} gewonnen · {eur(wonRevenue)}</div>
          <div onClick={dbStatus!=='connected'?checkDb:undefined} style={{display:'flex',alignItems:'center',gap:6,marginTop:8,cursor:dbStatus!=='connected'?'pointer':'default',fontSize:11,color:dbStatus==='connected'?t.green:dbStatus==='checking'?t.accent:t.orange}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:dbStatus==='connected'?t.green:dbStatus==='checking'?t.accent:t.orange,animation:dbStatus==='checking'?'pulse 1.5s infinite':'none'}}/>
            {dbStatus==='connected'?`Neon verbonden${dbMs?' ('+dbMs+'ms)':''}`:dbStatus==='checking'?'Verbinden...':'Lokale opslag'}
          </div>
        </div>
      </aside>

      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{padding:'14px 24px',borderBottom:`0.5px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',background:t.bg}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}><button className="ham" onClick={()=>setSb(true)} style={{display:'none',width:36,height:36,border:'none',background:t.elev,borderRadius:10,cursor:'pointer',color:t.text,fontSize:18,alignItems:'center',justifyContent:'center'}}>☰</button><h1 style={{fontSize:24,fontWeight:800,letterSpacing:-.5}}>{titles[view]}</h1></div>
          <div style={{display:'flex',gap:8}}>
            {view==='pipeline'&&<><button onClick={()=>setModal({type:'import'})} style={btnG}>📥 Import</button><button onClick={()=>setModal({type:'opp'})} style={btnP}>+ Deal</button></>}
            {view==='contacts'&&<button onClick={()=>setModal({type:'contact'})} style={btnP}>+ Contact</button>}
            {view==='companies'&&<button onClick={()=>setModal({type:'company'})} style={btnP}>+ Bedrijf</button>}
            {view==='tasks'&&<button onClick={()=>setModal({type:'task'})} style={btnP}>+ Taak</button>}
            {view==='dashboard'&&<button onClick={()=>setModal({type:'opp'})} style={btnP}>+ Deal</button>}
            <button onClick={()=>setAiOpen(!aiOpen)} style={{width:36,height:36,borderRadius:10,background:aiOpen?t.accentS:t.glass,backdropFilter:t.blur,border:`0.5px solid ${aiOpen?t.accent:t.border}`,color:aiOpen?t.accent:t.dim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}} title="AI Sales Assistent">✦</button>
          </div>
        </header>
        <div className="mc" style={{flex:1,overflowY:'auto',padding:'20px 24px',animation:'fadeIn .3s'}}>
          {dbStatus==='offline'&&!location.hostname.includes('claudeusercontent')&&<div style={{padding:'12px 16px',marginBottom:16,borderRadius:12,background:t.orangeS,border:`0.5px solid ${t.orange}44`,display:'flex',alignItems:'flex-start',gap:10}}>
            <span style={{marginTop:2}}>⚠️</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:t.orange}}>Neon database niet verbonden</div>
              <div style={{fontSize:11,color:t.dim,marginTop:3}}>Data wordt lokaal opgeslagen. Stel DATABASE_URL en JWT_SECRET in als Netlify env vars.</div>
            </div>
            <button onClick={checkDb} style={{...btnG,padding:'4px 10px',fontSize:11,color:t.orange,borderColor:`${t.orange}44`,whiteSpace:'nowrap'}}>↻ Check</button>
          </div>}
          {dbStatus==='checking'&&!location.hostname.includes('claudeusercontent')&&<div style={{padding:'8px 16px',marginBottom:16,borderRadius:12,background:t.accentS,fontSize:12,color:t.accent,animation:'pulse 1.5s infinite'}}>⏳ Verbinding controleren...</div>}
          {view==='dashboard'&&<Dash/>}
          {view==='pipeline'&&<Pipeline/>}
          {view==='companies'&&<Companies/>}
          {view==='contacts'&&<Contacts/>}
          {view==='atos'&&<AtosView/>}
          {view==='tasks'&&<Tasks/>}
          {view==='reports'&&<Reports/>}
        </div>
      </main>

      {/* AI SALES ASSISTANT PANEL */}
      <aside className={`aip ${aiOpen?'open':''}`} style={{background:t.bg2,borderLeft:`0.5px solid ${t.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'14px 16px',borderBottom:`0.5px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}><div style={{display:'flex',alignItems:'center',gap:8,fontWeight:700,fontSize:14}}><div style={{width:7,height:7,borderRadius:'50%',background:t.green,animation:'pulse 2s infinite'}}/>AI Sales Assistent</div><button onClick={()=>setAiOpen(false)} style={{width:28,height:28,borderRadius:'50%',border:'none',background:t.elev,color:t.dim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>
        <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}}>{aiMsgs.map(m=><div key={m.id} style={{maxWidth:'90%',padding:'10px 14px',borderRadius:14,fontSize:13,lineHeight:1.6,background:m.r==='bot'?(dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)'):t.accentS,alignSelf:m.r==='bot'?'flex-start':'flex-end',whiteSpace:'pre-wrap'}}>{m.t}<div style={{fontSize:10,color:t.muted,marginTop:3}}>{m.time}</div></div>)}{aiLoad&&<div style={{padding:'10px 14px',borderRadius:14,fontSize:13,background:dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)',color:t.muted,animation:'pulse 1s infinite',alignSelf:'flex-start'}}>💭 Analyseert pipeline...</div>}<div ref={aiEnd}/></div>
        <div style={{padding:'12px 16px',borderTop:`0.5px solid ${t.border}`,display:'flex',gap:8}}><input value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendAi()} placeholder="Vraag over je pipeline..." style={{...inp,flex:1,fontSize:13}}/><button onClick={sendAi} disabled={aiLoad} style={{width:36,height:36,borderRadius:10,background:t.accent,border:'none',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,opacity:aiLoad?.5:1}}>↑</button></div>
      </aside>

      {detail&&<DetailPanel/>}
      {modal?.type==='contact'&&<ContactModal/>}
      {modal?.type==='opp'&&<OppModal/>}
      {modal?.type==='task'&&<TaskModal/>}
      {modal?.type==='company'&&<CompanyModal/>}
      {modal?.type==='import'&&<ImportModal/>}
      {atModal&&<div onClick={()=>setAtModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(12px)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:t.solid,borderRadius:16,width:'100%',maxWidth:400}}>
          <div style={{padding:'20px 24px 0',display:'flex',justifyContent:'space-between'}}><span style={{fontSize:19,fontWeight:700}}>{atModal.id?'Bewerken':'Nieuw Teamlid'}</span><button onClick={()=>setAtModal(null)} style={{width:30,height:30,borderRadius:'50%',border:'none',background:t.elev,color:t.dim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>
          <div style={{padding:'16px 24px'}}>
            {[{k:'name',l:'Naam',p:'Volledige naam'},{k:'email',l:'E-mail',p:'naam@atos.net'},{k:'phone',l:'Telefoon',p:'+31...'}].map(x=><div key={x.k} style={{marginBottom:12}}><label style={lbl}>{x.l}</label><input style={inp} value={atModal[x.k]||''} onChange={e=>setAtModal({...atModal,[x.k]:e.target.value})} placeholder={x.p}/></div>)}
            <div style={{marginBottom:12}}><label style={lbl}>Rol</label><div style={{display:'flex',gap:6}}>{['sales','delivery'].map(r=><button key={r} onClick={()=>setAtModal({...atModal,role:r})} style={{flex:1,padding:'8px',borderRadius:8,fontSize:13,fontWeight:600,border:`1.5px solid ${atModal.role===r?(r==='sales'?t.accent:t.green):'transparent'}`,background:atModal.role===r?(r==='sales'?t.accentS:t.greenS):(dark?'rgba(118,118,128,0.08)':'rgba(118,118,128,0.04)'),color:atModal.role===r?(r==='sales'?t.accent:t.green):t.dim,cursor:'pointer',fontFamily:'inherit'}}>{r==='sales'?'🔵 Sales':'🟢 Delivery'}</button>)}</div></div>
          </div>
          <div style={{padding:'0 24px 20px',display:'flex',gap:8,justifyContent:'flex-end'}}><button onClick={()=>setAtModal(null)} style={btnG}>Annuleren</button><button onClick={()=>{if(!atModal.name?.trim()){toast('Vul een naam in','info');return;}if(atModal.id){setAtosTeam(p=>p.map(x=>x.id===atModal.id?{...atModal}:x));toast('Bijgewerkt');}else{setAtosTeam(p=>[...p,{...atModal,id:uid()}]);toast('Teamlid toegevoegd');}setAtModal(null);}} style={btnP}>{atModal.id?'Opslaan':'Toevoegen'}</button></div>
        </div>
      </div>}
      <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:6}}>{toasts.map(x=><div key={x.id} style={{padding:'10px 16px',background:t.glass,backdropFilter:t.blur,border:`0.5px solid ${t.border}`,borderRadius:12,fontSize:13,boxShadow:t.shadow,animation:'fadeIn .3s',borderLeft:`3px solid ${x.ty==='ok'?t.green:t.accent}`}}>{x.ty==='ok'?'✓':'ℹ'} {x.m}</div>)}</div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
