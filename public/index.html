// ── Neon API helper — camelCase ↔ snake_case ──
const toSnake=s=>s.replace(/[A-Z]/g,c=>'_'+c.toLowerCase());
const toCamel=s=>s.replace(/_([a-z])/g,(_,c)=>c.toUpperCase());
const snakeObj=o=>{const r={};for(const k in o)r[toSnake(k)]=o[k];return r;};
const camelObj=o=>{const r={};for(const k in o)r[toCamel(k)]=o[k];return r;};
const camelArr=a=>(a||[]).map(camelObj);

const apiCall=async(endpoint,method='GET',body=null)=>{
  const token=LS.get('auth_session',null)?.token;
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(token)opts.headers['Authorization']='Bearer '+token;
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch('/api/'+endpoint,opts);
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||'API error');
  return d;
};

// ─── DATA PROTECTION: versioned migration ────────────
const isFirstLaunch=!LS.has('_initialized');
const storedVersion=LS.get('_initialized','0');

const migrateData=()=>{
  if(LS.has('opps')){
    const opps=LS.get('opps',[]);
    const migrated=opps.map(o=>({contactIds:[],techTags:[],atosSalesId:'',atosDeliveryId:'',expectedCloseDate:'',stageChangedAt:'',closedReason:'',closedNote:'',dealNotes:'',...o}));
    LS.set('opps',migrated);
  }
  if(LS.has('contacts')){
    const cts=LS.get('contacts',[]);
    LS.set('contacts',cts.map(c=>({tags:[],category:'',companyId:c.companyId||c.company||'',...c})));
  }
  if(LS.has('companies')){
    LS.set('companies',LS.get('companies',[]).map(c=>({tags:[],...c})));
  }
  LS.set('_initialized',APP_VERSION);
};

if(!isFirstLaunch)migrateData();
if(isFirstLaunch)LS.set('_initialized',APP_VERSION);

if(!isFirstLaunch){
  try{
    const preLoad={};
    for(const k of['contacts','companies','opps','tasks','atos','interactions']){
      if(LS.has(k))preLoad[k]=LS.get(k,[]);
    }
    if(Object.keys(preLoad).length>0){
      localStorage.setItem('pf_backup_pre_update',JSON.stringify({...preLoad,ts:new Date().toISOString(),version:storedVersion}));
    }
  }catch{}
}

// ═══ ERROR BOUNDARY ═════════════════════════════════════
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  componentDidCatch(e,info){console.error('CRM crash:',e,info);}
  render(){
    if(this.state.error){
      const dark=window.matchMedia?.('(prefers-color-scheme:dark)').matches;
      const bg=dark?'#000':'#f2f2f7';const text=dark?'#f5f5f7':'#1c1c1e';const dim=dark?'#98989f':'#8e8e93';
      return React.createElement('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:bg,padding:20}},
        React.createElement('div',{style:{maxWidth:400,textAlign:'center',color:text}},
          React.createElement('div',{style:{fontSize:48,marginBottom:16}},'⚠️'),
          React.createElement('h2',{style:{fontSize:20,fontWeight:700,marginBottom:8}},'Er ging iets mis'),
          React.createElement('p',{style:{fontSize:14,color:dim,marginBottom:20}},String(this.state.error?.message||'Onbekende fout')),
          React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'center'}},
            React.createElement('button',{onClick:()=>location.reload(),style:{padding:'10px 20px',borderRadius:10,background:'#007AFF',color:'#fff',border:'none',fontSize:14,fontWeight:600,cursor:'pointer'}},'Herladen'),
            React.createElement('button',{onClick:()=>{try{Object.keys(localStorage).filter(k=>k.startsWith('pf_')&&k!=='pf_auth_session'&&k!=='pf_dark'&&k!=='pf_lang'&&k!=='pf_backup'&&!k.includes('backup_pre')).forEach(k=>localStorage.removeItem(k));}catch{}location.reload();},style:{padding:'10px 20px',borderRadius:10,background:dark?'#3a3a3c':'#e5e5ea',color:text,border:'none',fontSize:14,fontWeight:600,cursor:'pointer'}},'Reset data & herladen')
          )
        )
      );
    }
    return this.props.children;
  }
}

    const escape=(s)=>(s||'').replace(/[\\;,\n]/g,c=>c==='\n'?'\\n':'\\'+c);

      ics+='END:VEVENT\r\n';
    });

              <td style={{...cellS,padding:'6px 6px'}}><div onClick={()=>toggleSel(opp.id)} style={{width:18,height:18,borderRadius:4,border:`2px solid ${isSel?t.accent:t.muted}`,background:isSel?t.accent:'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:10,color:'#fff',fontWeight:700}}>{isSel&&'✓'}</div></td>
              <td style={cellS} onClick={()=>!isE('title')&&setEditCell({id:opp.id,f:'title'})}>{isE('title')?<input autoFocus style={{...inp,padding:'4px 8px',fontSize:13}} defaultValue={opp.title} onBlur={e=>saveCell('title',e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveCell('title',e.target.value);if(e.key==='Escape')setEditCell(null);}}/>:<span style={{fontWeight:600}}>{opp.title}</span>}</td>
              <td style={cellS} onClick={()=>setDetail({type:'opp',id:opp.id})}><span style={{color:t.dim}}>{compName(opp.companyId)||'—'}</span></td>
              <td style={cellS} onClick={()=>setDetail({type:'opp',id:opp.id})}><span style={{color:t.dim}}>{oppWho(opp)||'—'}</span></td>
              <td style={cellS} onClick={()=>!isE('stage')&&setEditCell({id:opp.id,f:'stage'})}>{isE('stage')?<select autoFocus style={{...inp,padding:'4px 8px',fontSize:12}} value={opp.stage} onChange={e=>{saveCell('stage',e.target.value);}} onBlur={()=>setEditCell(null)}>{STAGES.map(s=><option key={s.id} value={s.id}>{s.l[lang]||s.l.nl}</option>)}</select>:<span style={{fontSize:11,padding:'2px 8px',borderRadius:8,background:`${stg.c}20`,color:stg.c,fontWeight:600}}>{stg.l[lang]}</span>}</td>
              <td style={cellS} onClick={()=>!isE('value')&&setEditCell({id:opp.id,f:'value'})}>{isE('value')?<input autoFocus type="number" style={{...inp,padding:'4px 8px',fontSize:13,width:100}} defaultValue={opp.value??0} onBlur={e=>saveCell('value',+e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveCell('value',+e.target.value);if(e.key==='Escape')setEditCell(null);}}/>:<span style={{fontWeight:700}}>{eur(opp.value||0)}</span>}</td>
              <td style={cellS} onClick={()=>!isE('probability')&&setEditCell({id:opp.id,f:'probability'})}>{isE('probability')?<input autoFocus type="number" min="0" max="100" style={{...inp,padding:'4px 8px',fontSize:13,width:60}} defaultValue={opp.probability??0} onBlur={e=>saveCell('probability',+e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveCell('probability',+e.target.value);if(e.key==='Escape')setEditCell(null);}}/>:<span>{opp.probability??0}%</span>}</td>
              <td style={cellS} onClick={()=>!isE('priority')&&setEditCell({id:opp.id,f:'priority'})}>{isE('priority')?<select autoFocus style={{...inp,padding:'4px 8px',fontSize:12}} value={opp.priority||'medium'} onChange={e=>saveCell('priority',e.target.value)} onBlur={()=>setEditCell(null)}>{PRIS.map(p=><option key={p.id} value={p.id}>{p.l[lang]||p.l.nl}</option>)}</select>:<span style={{color:(PRIS.find(p=>p.id===opp.priority)||PRIS[1]).c,fontWeight:600,fontSize:11}}>{pl(opp.priority)}</span>}</td>
              <td style={cellS} onClick={()=>!isE('nextAction')&&setEditCell({id:opp.id,f:'nextAction'})}>{isE('nextAction')?<input autoFocus style={{...inp,padding:'4px 8px',fontSize:12}} defaultValue={opp.nextAction||''} onBlur={e=>saveCell('nextAction',e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveCell('nextAction',e.target.value);if(e.key==='Escape')setEditCell(null);}}/>:<span style={{color:opp.nextAction?t.orange:t.muted,fontSize:12}}>{opp.nextAction||'—'}</span>}</td>
              <td style={cellS} onClick={()=>!isE('expectedCloseDate')&&setEditCell({id:opp.id,f:'expectedCloseDate'})}>{isE('expectedCloseDate')?<input autoFocus type="date" style={{...inp,padding:'4px 8px',fontSize:12}} defaultValue={opp.expectedCloseDate||''} onBlur={e=>saveCell('expectedCloseDate',e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveCell('expectedCloseDate',e.target.value);if(e.key==='Escape')setEditCell(null);}}/>:<span style={{fontSize:12,color:t.dim}}>{opp.expectedCloseDate?fds(opp.expectedCloseDate):'—'}</span>}</td>
              <td style={{...cellS,padding:'6px 6px',textAlign:'center'}}><span onClick={async(e)=>{e.stopPropagation();if(confirm(lang==='nl'?`"${opp.title}" verwijderen?`:`Delete "${opp.title}"?`))await deleteOpp(opp.id);}} style={{cursor:'pointer',color:t.red,fontSize:14,opacity:.6,transition:'opacity .15s'}} onMouseOver={e=>e.target.style.opacity=1} onMouseOut={e=>e.target.style.opacity=.6}>✕</span></td>
            </tr>;})}</tbody>
        </table>
      </div>;})()}
      {(fWon.length>0||filteredOpps.filter(o=>o.stage==='lost'||o.stage==='dropped').length>0)&&<div style={{marginTop:24}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:10}}>{tx.closedDeals}</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {filteredOpps.filter(o=>o.stage==='won'||o.stage==='lost'||o.stage==='dropped').map(o=><div key={o.id} onClick={()=>setDetail({type:'opp',id:o.id})} style={{...card,padding:'10px 14px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',opacity:.7}}>
            <span style={{fontSize:16}}>{o.stage==='won'?'🏆':o.stage==='dropped'?'⏸':'✕'}</span>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{o.title}</div><div style={{fontSize:11,color:t.dim}}>{oppWho(o)}{(o.techTags||[]).length>0&&' · '+o.techTags.join(', ')}</div></div>
            <span style={{fontWeight:700,color:o.stage==='won'?t.green:o.stage==='dropped'?t.muted:t.red}}>{eur(o.value||0)}</span>
          </div>)}
        </div>
      </div>}
    </div>;
  };

  const renderContacts=()=>{
    const filtered=contacts.filter(c=>{if(!search)return true;const q=search.toLowerCase();return c.name.toLowerCase().includes(q)||compName(c.companyId).toLowerCase().includes(q)||c.email.toLowerCase().includes(q)||(c.tags||[]).some(t=>t.includes(q));});
    return <div>
      <div style={{display:'flex',gap:8,marginBottom:16}}><div style={{flex:1,...inp,display:'flex',alignItems:'center',gap:8,padding:'8px 14px'}}><span style={{color:t.muted}}>🔍</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder={tx.searchContacts} style={{flex:1,background:'none',border:'none',color:t.text,fontFamily:'inherit',fontSize:14,outline:'none'}}/>{search&&<span onClick={()=>setSearch('')} style={{cursor:'pointer',color:t.muted}}>✕</span>}</div><button onClick={()=>setModal({type:'contact'})} style={btnP}>{tx.addContact2}</button></div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {filtered.map(c=>{const cOpps=opps.filter(o=>o.contactId===c.id&&o.stage!=='lost');const cVal=cOpps.reduce((s,o)=>s+(o.value||0),0);return <div key={c.id} onClick={()=>setDetail({type:'contact',id:c.id})} style={{...card,padding:'14px 16px',display:'flex',alignItems:'center',gap:14,cursor:'pointer'}}>
          <div style={{width:42,height:42,borderRadius:'50%',background:`linear-gradient(135deg,${t.accent},${t.purple})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff',flexShrink:0}}>{c.avatar||c.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600}}>{c.name}</div>
            <div style={{fontSize:12,color:t.dim}}>{c.role&&c.role+' · '}{compName(c.companyId)}</div>
            {c.tags?.length>0&&<div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}}>{c.tags.map(tag=><span key={tag} style={{fontSize:10,padding:'1px 7px',borderRadius:6,background:t.accentS,color:t.accent,fontWeight:500}}>{tag}</span>)}</div>}
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            {cOpps.length>0&&<div style={{fontSize:13,fontWeight:700}}>{eur(cVal)}</div>}
            <div style={{fontSize:11,color:t.dim}}>{cOpps.length} deal{cOpps.length!==1?'s':''}</div>
          </div>
        </div>;})}
      </div>
    </div>;
  };

  const renderTasks=()=>{
    const allOpen=tasks.filter(t=>!t.done);
    const today=allOpen.filter(t=>t.dueDate===td());
    const overdue=allOpen.filter(t=>t.dueDate&&t.dueDate<td());
    const upcoming=allOpen.filter(t=>t.dueDate&&t.dueDate>td());
    const noDue=allOpen.filter(t=>!t.dueDate);
    const done=tasks.filter(t=>t.done);
    const withReminder=allOpen.filter(t=>t.reminder);

    let shown=[];
    if(taskTab==='today')shown=[...overdue,...today];
    else if(taskTab==='upcoming')shown=upcoming;
    else if(taskTab==='all')shown=allOpen;
    else if(taskTab==='done')shown=done;

    const grouped=taskTab!=='done'?[...new Set(shown.map(t=>t.dueDate||'no-date'))].sort((a,b)=>a==='no-date'?1:b==='no-date'?-1:a.localeCompare(b)):[];

    const renderTaskRow=(tk)=>{const isOverdue=tk.dueDate&&tk.dueDate<td()&&!tk.done;const oName=oppName(tk.oppId);return <div style={{...card,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,borderLeft:`3px solid ${isOverdue?t.red:tk.done?t.green:PRIS.find(p=>p.id===tk.priority)?.c||t.accent}`}}>
      {!tk.done?<div onClick={()=>{completeTask(tk.id);}} style={{width:20,height:20,borderRadius:'50%',border:`2px solid ${t.muted}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}/>
      :<div onClick={()=>updateTask_(tk.id,{done:false})} style={{width:20,height:20,borderRadius:'50%',background:t.green,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:700,cursor:'pointer',flexShrink:0}}>✓</div>}
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:500,textDecoration:tk.done?'line-through':'none',opacity:tk.done?.5:1}}>{tk.title}</div>
        <div style={{fontSize:11,color:t.dim,display:'flex',gap:8,marginTop:3,flexWrap:'wrap',alignItems:'center'}}>
          {tk.contactId&&<span onClick={e=>{e.stopPropagation();setDetail({type:'contact',id:tk.contactId});}} style={{color:t.accent,cursor:'pointer'}}>👤 {cName(tk.contactId)}</span>}
          {oName&&<span onClick={e=>{e.stopPropagation();setDetail({type:'opp',id:tk.oppId});}} style={{color:t.accent,cursor:'pointer',fontWeight:500}}>📊 {oName}</span>}
          {tk.dueDate&&<span style={{color:isOverdue?t.red:t.dim}}>{fds(tk.dueDate)}{tk.dueTime&&' · '+tk.dueTime}</span>}
          {tk.reminder&&<span>🔔{tk.reminderMin?<span style={{fontSize:10}}>{tk.reminderMin}m</span>:null}</span>}
          {tk.contactId&&compName(contacts.find(c=>c.id===tk.contactId)?.companyId)&&<span onClick={e=>{e.stopPropagation();const ct=contacts.find(c=>c.id===tk.contactId);if(ct?.companyId)setDetail({type:'company',id:ct.companyId});}} style={{color:t.teal,cursor:'pointer'}}>🏢 {compName(contacts.find(c=>c.id===tk.contactId)?.companyId)}</span>}
        </div>
      </div>
      {!tk.done&&<button onClick={()=>setModal({type:'task',data:tk})} style={{...btnG,padding:'4px 10px',fontSize:11}}>✎</button>}
      <button onClick={()=>{deleteTask_(tk.id);toast(tx.removed,'info');}} style={{background:'none',border:'none',color:t.red,cursor:'pointer',fontSize:14}}>✕</button>
    </div>;};

    return <div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {[{l:tx.taskOverdue,v:overdue.length,c:t.red,show:overdue.length>0},{l:tx.taskToday,v:today.length,c:t.accent,show:true},{l:tx.taskUpcoming,v:upcoming.length,c:t.teal,show:true},{l:tx.taskTotalOpen,v:allOpen.length,c:t.text,show:true},{l:tx.taskReminders,v:withReminder.length,c:t.orange,show:withReminder.length>0},{l:tx.taskDone,v:done.length,c:t.green,show:true}].filter(s=>s.show).map((s,i)=><div key={i} style={{...card,padding:'8px 14px',flex:'1 1 100px',minWidth:100}}><div style={{fontSize:10,color:t.muted,textTransform:'uppercase',letterSpacing:.5,fontWeight:600}}>{s.l}</div><div style={{fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
      </div>
      <div style={{display:'flex',gap:4,marginBottom:16,background:dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)',borderRadius:10,padding:3}}>
        {[{id:'today',l:`${tx.taskToday} (${overdue.length+today.length})`},{id:'upcoming',l:`${tx.taskUpcoming} (${upcoming.length})`},{id:'all',l:`${tx.all} (${allOpen.length})`},{id:'done',l:`${tx.taskDone} (${done.length})`}].map(tab=><button key={tab.id} onClick={()=>setTaskTab(tab.id)} style={{flex:1,padding:'7px 12px',borderRadius:8,fontSize:12,fontWeight:taskTab===tab.id?600:400,border:'none',background:taskTab===tab.id?t.accent:'transparent',color:taskTab===tab.id?'#fff':t.dim,cursor:'pointer',fontFamily:'inherit',transition:`all .15s ${sp}`}}>{tab.l}</button>)}
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginBottom:12}}><button onClick={()=>exportTasksIcal()} style={{...btnG,fontSize:12}}>📅 {tx.exportCalendar||'Export'}</button><button onClick={()=>setModal({type:'task'})} style={btnP}>{tx.addTask}</button></div>
      {taskTab!=='done'?<div style={{display:'flex',flexDirection:'column',gap:4}}>
        {grouped.map(date=>{const dateTasks=shown.filter(t=>(t.dueDate||'no-date')===date);const isOverdueGroup=date!=='no-date'&&date<td();const isTodayGroup=date===td();return <div key={date}>
          <div style={{fontSize:12,fontWeight:700,color:isOverdueGroup?t.red:isTodayGroup?t.accent:t.dim,padding:'10px 4px 4px',textTransform:'uppercase',letterSpacing:1}}>
            {date==='no-date'?tx.noDate:isTodayGroup?tx.todayDash+fd(date):isOverdueGroup?tx.overdueDash+fd(date):fd(date)}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>{dateTasks.map(tk=><div key={tk.id}>{renderTaskRow(tk)}</div>)}</div>
        </div>;})}
        {noDue.length>0&&taskTab==='all'&&<div><div style={{fontSize:12,fontWeight:700,color:t.muted,padding:'10px 4px 4px',textTransform:'uppercase',letterSpacing:1}}>{tx.noDeadline}</div><div style={{display:'flex',flexDirection:'column',gap:5}}>{noDue.map(tk=><div key={tk.id}>{renderTaskRow(tk)}</div>)}</div></div>}
        {shown.length===0&&<div style={{textAlign:'center',padding:40,color:t.muted}}>{taskTab==='today'?tx.noTasksToday:tx.noTasksCat}</div>}
      </div>
      :<div style={{display:'flex',flexDirection:'column',gap:4}}>
        {done.length===0&&<div style={{textAlign:'center',padding:40,color:t.muted}}>{tx.noTasksDone}</div>}
        {done.slice(0,30).map(tk=><div key={tk.id}>{renderTaskRow(tk)}</div>)}
        {done.length>30&&<div style={{textAlign:'center',color:t.muted,fontSize:12,padding:8}}>+{done.length-30} {tx.more}</div>}
      </div>}
    </div>;
  };

  const renderDash=()=>{
    const pOpps=opps.filter(o=>periodFilter(o.createdAt));
    const pActive=pOpps.filter(o=>o.stage!=='won'&&o.stage!=='lost'&&o.stage!=='dropped');
    const pWon=pOpps.filter(o=>o.stage==='won');
    const pPipeline=pActive.reduce((s,o)=>s+(o.value||0),0);
    const pWeighted=pActive.reduce((s,o)=>s+((o.value||0)*(o.probability||0)/100),0);
    const pWonRev=pWon.reduce((s,o)=>s+(o.value||0),0);
    const convRate=pOpps.length?(Math.round(pWon.length/pOpps.length*100)):0;
    const stageData=STAGES.filter(s=>s.id!=='won'&&s.id!=='lost'&&s.id!=='dropped').map(s=>({...s,count:pOpps.filter(o=>o.stage===s.id).length,val:pOpps.filter(o=>o.stage===s.id).reduce((sum,o)=>sum+(o.value||0),0)}));
    const maxVal=Math.max(...stageData.map(s=>s.val),1);
    // Velocity: avg cycle time for won deals
    const wonCycles=pWon.map(o=>{const c=new Date(o.closedAt||o.updatedAt),s=new Date(o.createdAt);return Math.max(1,Math.round((c-s)/(1000*60*60*24)));}).filter(Boolean);
    const avgCycle=wonCycles.length?Math.round(wonCycles.reduce((a,b)=>a+b,0)/wonCycles.length):0;
    // Avg days per stage for active deals
    const avgStageAge=pActive.length?Math.round(pActive.reduce((s,o)=>s+dealAge(o),0)/pActive.length):0;
    // Closed deals this month
    const now30=new Date();now30.setDate(now30.getDate()-30);
    const monthWon=opps.filter(o=>o.stage==='won'&&o.closedAt&&new Date(o.closedAt)>=now30);
    const monthLost=opps.filter(o=>o.stage==='lost'&&o.closedAt&&new Date(o.closedAt)>=now30);
    const monthWonVal=monthWon.reduce((s,o)=>s+(o.value||0),0);
    const monthLostVal=monthLost.reduce((s,o)=>s+(o.value||0),0);
    return <div>
      {renderPeriodBar()}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:20}}>
        {[{l:tx.openPipeline,v:eur(pPipeline),c:t.accent},{l:tx.weightedValue,v:eur(Math.round(pWeighted)),c:t.purple},{l:tx.wonLabel,v:eur(pWonRev),c:t.green},{l:tx.conversionLabel,v:convRate+'%',c:t.orange},{l:tx.activeDeals,v:pActive.length,c:t.text},{l:tx.avgCycleTime,v:avgCycle?avgCycle+' '+tx.days:'—',c:t.teal},{l:tx.avgDaysInStage,v:avgStageAge+' '+tx.days,c:avgStageAge>14?t.red:t.text},{l:tx.tasksToday,v:todayTasks.length+(overdueTasks.length?` (+${overdueTasks.length})`:'')+' ',c:overdueTasks.length?t.red:t.text}].map((s,i)=><div key={i} style={card}><div style={lbl}>{s.l}</div><div style={{fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
        <div style={card}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{tx.pipePerPhaseShort}</div>
          <svg viewBox="0 0 300 140" style={{width:'100%'}}>
            {stageData.map((s,i)=>{const bw=40,gap=60,x=20+i*gap,h=(s.val/maxVal)*100;return <g key={i}>
              <rect x={x} y={120-h} width={bw} height={h} rx={6} fill={s.c} opacity={.85}/>
              <text x={x+bw/2} y={135} textAnchor="middle" fontSize="9" fill={t.muted} fontFamily="inherit">{(s.l[lang]||s.l.nl).slice(0,6)}</text>
              <text x={x+bw/2} y={115-h} textAnchor="middle" fontSize="9" fill={t.dim} fontFamily="inherit">{s.count}</text>
            </g>;})}
            <line x1="18" y1="120" x2="280" y2="120" stroke={t.border} strokeWidth=".5"/>
          </svg>
        </div>
        <div style={card}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{tx.tasks}</div>
          {todayTasks.length===0&&overdueTasks.length===0?<div style={{textAlign:'center',padding:24,color:t.muted}}>{tx.allGood}</div>:
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {overdueTasks.slice(0,3).map(tk=><div key={tk.id} style={{fontSize:12,padding:'6px 10px',borderRadius:8,background:t.redS,color:t.red,fontWeight:500}}>🔴 {tk.title}</div>)}
            {todayTasks.slice(0,4).map(tk=><div key={tk.id} style={{fontSize:12,padding:'6px 10px',borderRadius:8,background:dark?'rgba(118,118,128,0.08)':'rgba(118,118,128,0.04)',display:'flex',justifyContent:'space-between'}}><span>{tk.title}</span><span style={{color:t.dim}}>{cName(tk.contactId)}</span></div>)}
          </div>}
        </div>
      </div>
      {activeOpps.filter(o=>o.priority==='high').length>0&&<div style={{marginBottom:20}}><div style={{fontSize:14,fontWeight:700,marginBottom:8}}>{tx.highPriority}</div><div style={{display:'flex',flexDirection:'column',gap:6}}>{activeOpps.filter(o=>o.priority==='high').map(o=><div key={o.id} onClick={()=>setDetail({type:'opp',id:o.id})} style={{...card,padding:'10px 14px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',borderLeft:`3px solid ${t.red}`}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{o.title}</div><div style={{fontSize:11,color:t.dim}}>{cName(o.contactId)} · {stageC(o.stage,lang).l}</div></div><div style={{fontWeight:700}}>{eur(o.value||0)}</div></div>)}</div></div>}
      <div style={card}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{tx.closedSummary}</div>
        {(monthWon.length+monthLost.length)===0?<div style={{color:t.muted,fontSize:12,textAlign:'center',padding:12}}>{tx.noClosedDeals}</div>:
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{padding:12,borderRadius:10,background:t.greenS}}>
            <div style={{fontSize:12,color:t.green,fontWeight:700,marginBottom:4}}>{tx.wonDeals}</div>
            <div style={{fontSize:20,fontWeight:700,color:t.green}}>{monthWon.length}</div>
            <div style={{fontSize:12,color:t.dim}}>{eur(monthWonVal)}</div>
          </div>
          <div style={{padding:12,borderRadius:10,background:t.redS}}>
            <div style={{fontSize:12,color:t.red,fontWeight:700,marginBottom:4}}>{tx.lostDeals2}</div>
            <div style={{fontSize:20,fontWeight:700,color:t.red}}>{monthLost.length}</div>
            <div style={{fontSize:12,color:t.dim}}>{eur(monthLostVal)}</div>
          </div>
        </div>}
      </div>
    </div>;
  };

  const renderDetailPanel=()=>{
    if(!detail)return null;
    if(detail.type==='contact'){
      const c=contacts.find(x=>x.id===detail.id);if(!c)return null;

      </aside>

      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{padding:'10px 16px',borderBottom:`0.5px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,flexWrap:'wrap',background:t.bg}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}><button className="ham" onClick={()=>setSb(true)} style={{display:'none',width:36,height:36,border:'none',background:t.elev,borderRadius:10,cursor:'pointer',color:t.text,fontSize:18,alignItems:'center',justifyContent:'center'}}>☰</button><h1 style={{fontSize:20,fontWeight:800,letterSpacing:-.5}}>{titles[view]}</h1></div>
          <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            {view==='pipeline'&&<><div style={{display:'flex',background:dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)',borderRadius:8,padding:2}}>{[{id:'kanban',l:tx.kanbanView,ic:'▦'},{id:'table',l:tx.tableView,ic:'☰'}].map(v=><button key={v.id} onClick={()=>setPipeView(v.id)} style={{padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:pipeView===v.id?600:400,border:'none',background:pipeView===v.id?t.accent:'transparent',color:pipeView===v.id?'#fff':t.dim,cursor:'pointer',fontFamily:'inherit',minHeight:32,minWidth:32}}>{v.ic} {v.l}</button>)}</div><button onClick={()=>setModal({type:'import'})} style={{...btnG,padding:'6px 10px',fontSize:11}}>📥</button><button onClick={()=>setModal({type:'opp'})} style={{...btnP,padding:'6px 12px',fontSize:12}}>{tx.addDeal}</button></>}
            {view==='contacts'&&<button onClick={()=>setModal({type:'contact'})} style={{...btnP,padding:'6px 12px',fontSize:12}}>{tx.addContact2}</button>}
            {view==='companies'&&<button onClick={()=>setModal({type:'company'})} style={{...btnP,padding:'6px 12px',fontSize:12}}>{tx.addCompany}</button>}
            {view==='tasks'&&<button onClick={()=>setModal({type:'task'})} style={{...btnP,padding:'6px 12px',fontSize:12}}>{tx.addTask}</button>}
            {view==='dashboard'&&<button onClick={()=>setModal({type:'opp'})} style={{...btnP,padding:'6px 12px',fontSize:12}}>{tx.addDeal}</button>}
            <button onClick={runDailyScan} style={{height:32,padding:'0 10px',borderRadius:8,background:t.glass,backdropFilter:t.blur,border:`0.5px solid ${t.border}`,color:t.dim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,fontFamily:'inherit',gap:3,minHeight:32,minWidth:32}} title={tx.dailyScan}>🔍</button>
            <button onClick={()=>setAiOpen(!aiOpen)} style={{width:32,height:32,borderRadius:8,background:aiOpen?t.accentS:t.glass,backdropFilter:t.blur,border:`0.5px solid ${aiOpen?t.accent:t.border}`,color:aiOpen?t.accent:t.dim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,minHeight:32,minWidth:32}} title={tx.aiTitle}>✦</button>
          </div>
        </header>
        <div className="mc" style={{flex:1,overflowY:'auto',padding:'20px 24px',animation:'fadeIn .3s'}}>
          {dbStatus==='offline'&&!location.hostname.includes('claudeusercontent')&&<div style={{padding:'12px 16px',marginBottom:16,borderRadius:12,background:t.orangeS,border:`0.5px solid ${t.orange}44`,display:'flex',alignItems:'flex-start',gap:10}}>
            <span style={{marginTop:2}}>⚠️</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:t.orange}}>{tx.neonWarning}</div>
              <div style={{fontSize:11,color:t.dim,marginTop:3}}>{tx.neonWarningDesc}</div>
            </div>
            <button onClick={checkDb} style={{...btnG,padding:'4px 10px',fontSize:11,color:t.orange,borderColor:`${t.orange}44`,whiteSpace:'nowrap'}}>{tx.checkConn}</button>
          </div>}
          {dbStatus==='checking'&&!location.hostname.includes('claudeusercontent')&&<div style={{padding:'8px 16px',marginBottom:16,borderRadius:12,background:t.accentS,fontSize:12,color:t.accent,animation:'pulse 1.5s infinite'}}>{tx.connecting2}</div>}
          {view==='dashboard'&&renderDash()}
          {view==='pipeline'&&renderPipeline()}
          {view==='companies'&&renderCompanies()}
          {view==='contacts'&&renderContacts()}
          {view==='atos'&&renderAtosView()}
          {view==='tasks'&&renderTasks()}
          {view==='reports'&&renderReports()}
        </div>
      </main>

      <aside className={`aip ${aiOpen?'open':''}`} style={{background:t.bg2,borderLeft:`0.5px solid ${t.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'14px 16px',borderBottom:`0.5px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}><div style={{display:'flex',alignItems:'center',gap:8,fontWeight:700,fontSize:14}}><div style={{width:7,height:7,borderRadius:'50%',background:t.green,animation:'pulse 2s infinite'}}/>{tx.aiTitle}</div><button onClick={()=>setAiOpen(false)} style={{width:28,height:28,borderRadius:'50%',border:'none',background:t.elev,color:t.dim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>
        <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}}>{aiMsgs.map(m=><div key={m.id} style={{maxWidth:'90%',padding:'10px 14px',borderRadius:14,fontSize:13,lineHeight:1.6,background:m.r==='bot'?(dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)'):t.accentS,alignSelf:m.r==='bot'?'flex-start':'flex-end',whiteSpace:'pre-wrap'}}>{m.t}<div style={{fontSize:10,color:t.muted,marginTop:3}}>{m.time}</div></div>)}{aiLoad&&<div style={{padding:'10px 14px',borderRadius:14,fontSize:13,background:dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)',color:t.muted,animation:'pulse 1s infinite',alignSelf:'flex-start'}}>{tx.analyzing}</div>}<div ref={aiEnd}/></div>
        <div style={{padding:'12px 16px',borderTop:`0.5px solid ${t.border}`,display:'flex',gap:8}}><input value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendAi()} placeholder={tx.askPipeline} style={{...inp,flex:1,fontSize:13}}/><button onClick={sendAi} disabled={aiLoad} style={{width:36,height:36,borderRadius:10,background:t.accent,border:'none',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,opacity:aiLoad?.5:1}}>↑</button></div>
      </aside>

      {detail&&renderDetailPanel()}
      {modal?.type==='contact'&&renderContactModal()}
      {modal?.type==='opp'&&renderOppModal()}
      {modal?.type==='task'&&renderTaskModal()}
      {modal?.type==='company'&&renderCompanyModal()}
      {modal?.type==='import'&&renderImportModal()}
      {atModal&&<div onClick={()=>setAtModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(12px)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:t.solid,borderRadius:16,width:'100%',maxWidth:400}}>
          <div style={{padding:'20px 24px 0',display:'flex',justifyContent:'space-between'}}><span style={{fontSize:19,fontWeight:700}}>{atModal.id?tx.editLabel:tx.newTeam}</span><button onClick={()=>setAtModal(null)} style={{width:30,height:30,borderRadius:'50%',border:'none',background:t.elev,color:t.dim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>
          <div style={{padding:'16px 24px'}}>
            {[{k:'name',l:tx.name,p:tx.fullName},{k:'email',l:tx.email,p:'name@atos.net'},{k:'phone',l:tx.phone,p:'+31...'}].map(x=><div key={x.k} style={{marginBottom:12}}><label style={lbl}>{x.l}</label><input style={inp} value={atModal[x.k]||''} onChange={e=>setAtModal({...atModal,[x.k]:e.target.value})} placeholder={x.p}/></div>)}
            <div style={{marginBottom:12}}><label style={lbl}>{tx.roleLabel}</label><div style={{display:'flex',gap:6}}>{['sales','delivery'].map(r=><button key={r} onClick={()=>setAtModal({...atModal,role:r})} style={{flex:1,padding:'8px',borderRadius:8,fontSize:13,fontWeight:600,border:`1.5px solid ${atModal.role===r?(r==='sales'?t.accent:t.green):'transparent'}`,background:atModal.role===r?(r==='sales'?t.accentS:t.greenS):(dark?'rgba(118,118,128,0.08)':'rgba(118,118,128,0.04)'),color:atModal.role===r?(r==='sales'?t.accent:t.green):t.dim,cursor:'pointer',fontFamily:'inherit'}}>{r==='sales'?'🔵 Sales':'🟢 Delivery'}</button>)}</div></div>
          </div>
          <div style={{padding:'0 24px 20px',display:'flex',gap:8,justifyContent:'flex-end'}}><button onClick={()=>setAtModal(null)} style={btnG}>{tx.cancel}</button><button onClick={async()=>{if(!atModal.name?.trim()){toast(tx.fillName,'info');return;}if(atModal.id){updateAtos_(atModal.id,atModal);toast(tx.updated);setAtModal(null);}else{const saved=await addAtos_({...atModal});if(saved){toast(tx.teamAdded);setAtModal(null);}}}} style={btnP}>{atModal.id?tx.save:tx.add}</button></div>
        </div>
      </div>}
      <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:6}}>{toasts.map(x=><div key={x.id} style={{padding:'10px 16px',background:t.glass,backdropFilter:t.blur,border:`0.5px solid ${t.border}`,borderRadius:12,fontSize:13,boxShadow:t.shadow,animation:'fadeIn .3s',borderLeft:`3px solid ${x.ty==='ok'?t.green:t.accent}`}}>{x.ty==='ok'?'✓':'ℹ'} {x.m}</div>)}</div>
      {intModal&&<div onClick={()=>setIntModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(12px)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:t.solid,borderRadius:16,width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto'}}>
          <div style={{padding:'20px 24px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:18}}>{INT_TYPES.find(x=>x.id===intModal.type)?.ic}</span><span style={{fontSize:19,fontWeight:700}}>{INT_TYPES.find(x=>x.id===intModal.type)?.l} {tx.logAction}</span></div>
            <button onClick={()=>setIntModal(null)} style={{width:30,height:30,borderRadius:'50%',border:'none',background:t.elev,color:t.dim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          </div>
          <div style={{padding:'16px 24px'}}>
            {intModal.oppId&&<div style={{fontSize:12,color:t.dim,marginBottom:8}}>Deal: <strong style={{color:t.text}}>{oppName(intModal.oppId)}</strong></div>}
            <div style={{marginBottom:12}}><label style={lbl}>{tx.contact}</label>
              <div style={{display:'flex',gap:5,alignItems:'flex-start'}}>
                <SearchSelect t={t} lang={lang} value={intModal.contactId||''} onChange={v=>setIntModal({...intModal,contactId:v})} placeholder={tx.selectOrNew} options={(()=>{const opp=intModal.oppId?opps.find(o=>o.id===intModal.oppId):null;const oppCids=opp?[...(opp.contactIds||[]),opp.contactId].filter(Boolean):[]; const oppCs=oppCids.map(id=>contacts.find(c=>c.id===id)).filter(Boolean); const rest=contacts.filter(c=>!oppCids.includes(c.id)); return[...oppCs.map(c=>({value:c.id,label:c.name,sub:'★ '+compName(c.companyId)})),...rest.map(c=>({value:c.id,label:c.name,sub:compName(c.companyId)}))];})()}  style={{flex:1}}/>
                <button onClick={()=>setIntModal({...intModal,_showNew:!intModal._showNew})} style={{...btnG,padding:'8px 10px',fontSize:11,whiteSpace:'nowrap'}}>{intModal._showNew?'✕':'+ '+tx.newContact.split(' ').pop()}</button>
              </div>
              {intModal._showNew&&<div style={{display:'flex',gap:5,marginTop:6}}>
                <input style={inp} value={intModal._newName||''} onChange={e=>setIntModal({...intModal,_newName:e.target.value})} placeholder={tx.newContactName} onKeyDown={async e=>{if(e.key==='Enter'&&intModal._newName?.trim()){const opp=intModal.oppId?opps.find(o=>o.id===intModal.oppId):null;const saved=await addContact_({name:intModal._newName.trim(),companyId:opp?.companyId||''});if(!saved)return;if(intModal.oppId){updateOpp(intModal.oppId,{contactIds:[...(opp?.contactIds||[]),saved.id],contactId:opp?.contactId||saved.id});}setIntModal({...intModal,contactId:saved.id,_newName:'',_showNew:false});toast(tx.contactAdded);}}}/>
                <button onClick={async()=>{if(!intModal._newName?.trim())return;const opp=intModal.oppId?opps.find(o=>o.id===intModal.oppId):null;const saved=await addContact_({name:intModal._newName.trim(),companyId:opp?.companyId||''});if(!saved)return;if(intModal.oppId){updateOpp(intModal.oppId,{contactIds:[...(opp?.contactIds||[]),saved.id],contactId:opp?.contactId||saved.id});}setIntModal({...intModal,contactId:saved.id,_newName:'',_showNew:false});toast(tx.contactAdded);}} style={{...btnP,padding:'6px 12px',fontSize:11}}>{tx.createContact}</button>
              </div>}
            </div>
            <div style={{marginBottom:12}}><label style={lbl}>Type</label><div style={{display:'flex',gap:4}}>{INT_TYPES.map(it=><button key={it.id} onClick={()=>setIntModal({...intModal,type:it.id})} style={{flex:1,padding:'6px',borderRadius:8,fontSize:12,fontWeight:600,border:`1.5px solid ${intModal.type===it.id?t.accent:'transparent'}`,background:intModal.type===it.id?t.accentS:(dark?'rgba(118,118,128,0.08)':'rgba(118,118,128,0.04)'),color:intModal.type===it.id?t.accent:t.dim,cursor:'pointer',fontFamily:'inherit'}}>{it.ic} {it.l}</button>)}</div></div>
            <div style={{marginBottom:12}}><label style={lbl}>{tx.description}</label><textarea style={{...inp,minHeight:100,resize:'vertical'}} value={intText} onChange={e=>setIntText(e.target.value)} placeholder={tx.descPlaceholder}/></div>
            <div style={{marginBottom:12}}><label style={{...lbl,display:'flex',alignItems:'center',gap:6}}><input type="checkbox" checked={!!intModal.createTask} onChange={e=>setIntModal({...intModal,createTask:e.target.checked})}/> {tx.createFollowup}</label></div>
            {intModal.createTask&&<div style={{marginBottom:12,padding:'10px 14px',borderRadius:10,background:t.accentS,border:`0.5px solid ${t.accent}44`}}>
              <div style={{marginBottom:8}}><label style={lbl}>{tx.taskDesc}</label><input style={inp} value={intModal.taskTitle||''} onChange={e=>setIntModal({...intModal,taskTitle:e.target.value})} placeholder={tx.taskDescPlaceholder}/></div>
              <div><label style={lbl}>{tx.date}</label><input type="date" style={inp} value={intModal.taskDate||td()} onChange={e=>setIntModal({...intModal,taskDate:e.target.value})}/></div>
            </div>}
          </div>
          <div style={{padding:'0 24px 20px',display:'flex',gap:8,justifyContent:'flex-end'}}><button onClick={()=>setIntModal(null)} style={btnG}>{tx.cancel}</button><button onClick={async()=>{if(!intText.trim()){toast(tx.fillDesc,'info');return;}const saved=await logInteraction(intModal.contactId||'',intModal.oppId||'',intModal.type,intText.trim());if(!saved)return;if(intModal.createTask&&intModal.taskTitle?.trim()){await addTask_({title:intModal.taskTitle.trim(),contactId:intModal.contactId||'',oppId:intModal.oppId||'',dueDate:intModal.taskDate||td(),dueTime:'',done:false,priority:'medium',reminder:true,reminderMin:15});toast(tx.intAndTask);}else{toast(`${INT_TYPES.find(x=>x.id===intModal.type)?.l} ${tx.intLogged}`);}setIntModal(null);}} style={btnP}>{tx.save}</button></div>
        </div>
      </div>}
      {reasonModal&&<div onClick={()=>setReasonModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(12px)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:t.solid,borderRadius:16,width:'100%',maxWidth:400}}>
          <div style={{padding:'20px 24px 0'}}><span style={{fontSize:19,fontWeight:700}}>{reasonModal.title}</span></div>
          <div style={{padding:'16px 24px'}}>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
              {reasonModal.reasons.map(r=><button key={r} onClick={()=>setReasonModal({...reasonModal,selected:r})} style={{padding:'8px 14px',borderRadius:10,fontSize:13,fontWeight:reasonModal.selected===r?700:400,border:`1.5px solid ${reasonModal.selected===r?t.accent:'transparent'}`,background:reasonModal.selected===r?t.accentS:(dark?'rgba(118,118,128,0.08)':'rgba(118,118,128,0.04)'),color:reasonModal.selected===r?t.accent:t.text,cursor:'pointer',textAlign:'left',fontFamily:'inherit'}}>{tx[r]||r}</button>)}
            </div>
            <textarea value={reasonModal.note||''} onChange={e=>setReasonModal({...reasonModal,note:e.target.value})} placeholder={tx.optionalNote} style={{...inp,minHeight:60,resize:'vertical',fontSize:12}}/>
          </div>
          <div style={{padding:'0 24px 20px',display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button onClick={()=>setReasonModal(null)} style={btnG}>{tx.cancel}</button>
            <button onClick={()=>{if(!reasonModal.selected){toast(tx.pleaseSelectReason,'info');return;}const now=new Date().toISOString();const prob=reasonModal.stage==='won'?100:0;updateOpp(reasonModal.oppId,{stage:reasonModal.stage,closedAt:now,closedReason:reasonModal.selected,closedNote:reasonModal.note||'',probability:prob,stageChangedAt:now,updatedAt:now});if(reasonModal.stage==='won')toast('🏆 '+tx.won);else if(reasonModal.stage==='lost')toast(tx.lost,'info');else toast(tx.dropped,'info');setReasonModal(null);}} style={btnP}>{tx.save}</button>
          </div>
        </div>
      </div>}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
