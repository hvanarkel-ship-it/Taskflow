<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DPM CRM</title>
<meta name="description" content="Persoonlijk CRM systeem voor sales pipeline management">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DPM CRM">
<script>
if('serviceWorker' in navigator && !location.hostname.includes('claudeusercontent') && !location.hostname.includes('localhost')){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});
}
if(!location.hostname.includes('claudeusercontent')){
  const m=document.createElement('link');m.rel='manifest';m.href='/manifest.json';document.head.appendChild(m);
}
</script>
<style>body{margin:0;font-family:Outfit,system-ui,-apple-system,sans-serif;}</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const _w=console.warn;console.warn=function(){if(arguments[0]&&typeof arguments[0]==='string'&&arguments[0].includes('in-browser Babel'))return;_w.apply(console,arguments);};
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect, useRef, useMemo, useCallback} = React;

// ═══════════════════════════════════════════════════════
// DPM CRM · Apple Design
// ═══════════════════════════════════════════════════════

const DARK={bg:'#000',bg2:'#1c1c1e',card:'rgba(44,44,46,0.82)',solid:'#2c2c2e',elev:'#3a3a3c',border:'rgba(84,84,88,0.35)',text:'#f5f5f7',dim:'#98989f',muted:'#636366',accent:'#0A84FF',accentS:'rgba(10,132,255,0.14)',green:'#30D158',greenS:'rgba(48,209,88,0.14)',orange:'#FF9F0A',orangeS:'rgba(255,159,10,0.14)',red:'#FF453A',redS:'rgba(255,69,58,0.14)',purple:'#BF5AF2',purpleS:'rgba(191,90,242,0.14)',teal:'#64D2FF',glass:'rgba(44,44,46,0.7)',blur:'blur(20px)',shadow:'0 2px 10px rgba(0,0,0,0.3)'};
const LIGHT={bg:'#f2f2f7',bg2:'#fff',card:'rgba(255,255,255,0.82)',solid:'#fff',elev:'#e5e5ea',border:'rgba(60,60,67,0.12)',text:'#1c1c1e',dim:'#8e8e93',muted:'#aeaeb2',accent:'#007AFF',accentS:'rgba(0,122,255,0.1)',green:'#34C759',greenS:'rgba(52,199,89,0.1)',orange:'#FF9500',orangeS:'rgba(255,149,0,0.1)',red:'#FF3B30',redS:'rgba(255,59,48,0.1)',purple:'#AF52DE',purpleS:'rgba(175,82,222,0.1)',teal:'#5AC8FA',glass:'rgba(255,255,255,0.7)',blur:'blur(20px)',shadow:'0 1px 4px rgba(0,0,0,0.04),0 4px 20px rgba(0,0,0,0.08)'};

const uid=()=>Math.random().toString(36).substr(2,9);
const fd=d=>d?new Date(d).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}):'';
const fds=d=>d?new Date(d).toLocaleDateString('nl-NL',{day:'numeric',month:'short'}):'';
const ft=()=>new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
const td=()=>new Date().toISOString().split('T')[0];
const sp='cubic-bezier(0.25,0.46,0.45,0.94)';
const LS={get:(k,fb)=>{try{const v=localStorage.getItem('pf_'+k);return v?JSON.parse(v):fb;}catch{return fb;}},set:(k,v)=>{try{localStorage.setItem('pf_'+k,JSON.stringify(v));}catch{}}};

// Pipeline stages
const STAGES=[
  {id:'lead',l:'Lead',ic:'🎯',c:'#5AC8FA'},
  {id:'qualified',l:'Gekwalificeerd',ic:'✓',c:'#007AFF'},
  {id:'proposal',l:'Voorstel',ic:'📄',c:'#BF5AF2'},
  {id:'negotiation',l:'Onderhandeling',ic:'🤝',c:'#FF9F0A'},
  {id:'won',l:'Gewonnen',ic:'🏆',c:'#30D158'},
  {id:'lost',l:'Verloren',ic:'✕',c:'#FF453A'},
];
const stageC=id=>STAGES.find(s=>s.id===id)||STAGES[0];

// Priority
const PRIS=[{id:'high',l:'Hoog',c:'#FF453A'},{id:'medium',l:'Midden',c:'#FF9F0A'},{id:'low',l:'Laag',c:'#30D158'}];

// Demo data
const DEMO_COMPANIES=[
  {id:uid(),name:'TechVentures BV',website:'techventures.nl',industry:'Technologie',address:'Amsterdam',size:'10-50',phone:'+31201234567',email:'info@techventures.nl',notes:'Innovatief bedrijf, groeit snel',tags:['tech','enterprise'],createdAt:new Date().toISOString()},
  {id:uid(),name:'Design Studio',website:'designstudio.nl',industry:'Creatief',address:'Rotterdam',size:'1-10',phone:'',email:'hello@designstudio.nl',notes:'',tags:['design'],createdAt:new Date().toISOString()},
  {id:uid(),name:'Berg Consultancy',website:'bergconsultancy.nl',industry:'Consultancy',address:'Utrecht',size:'10-50',phone:'',email:'info@bergconsultancy.nl',notes:'',tags:['consultancy'],createdAt:new Date().toISOString()},
  {id:uid(),name:'GreenTech Startup',website:'greentech.io',industry:'Duurzaamheid',address:'Eindhoven',size:'1-10',phone:'',email:'hi@greentech.io',notes:'Seed-fase, zoekt partners',tags:['startup','duurzaam'],createdAt:new Date().toISOString()},
  {id:uid(),name:'Nexus Finance',website:'nexusfinance.nl',industry:'Financieel',address:'Den Haag',size:'50-200',phone:'+31703456789',email:'contact@nexusfinance.nl',notes:'Nog geen contactpersoon',tags:['finance','prospect'],createdAt:new Date().toISOString()},
];

const DEMO_CONTACTS=[
  {id:uid(),name:'Sarah de Vries',email:'sarah@example.nl',phone:'+31612345678',companyId:DEMO_COMPANIES[0].id,role:'CEO',tags:['beslisser','tech'],createdAt:new Date().toISOString(),avatar:'SV'},
  {id:uid(),name:'Mark Jansen',email:'mark@designstudio.nl',phone:'+31698765432',companyId:DEMO_COMPANIES[1].id,role:'Creative Director',tags:['design','partner'],createdAt:new Date().toISOString(),avatar:'MJ'},
  {id:uid(),name:'Lisa van den Berg',email:'lisa@consultancy.nl',phone:'',companyId:DEMO_COMPANIES[2].id,role:'Managing Partner',tags:['consultancy'],createdAt:new Date().toISOString(),avatar:'LB'},
  {id:uid(),name:'Tom Bakker',email:'tom@startup.io',phone:'+31655551234',companyId:DEMO_COMPANIES[3].id,role:'CTO',tags:['startup','tech'],createdAt:new Date().toISOString(),avatar:'TB'},
];

const mkOpp=(title,contactId,stage,value,prob)=>({id:uid(),title,contactId,companyId:'',stage,value,probability:prob,priority:'medium',nextAction:'',nextActionDate:'',notes:[],createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),closedAt:null});

const DEMO_OPPS=[
  {...mkOpp('Website Redesign','','proposal',15000,60),contactId:DEMO_CONTACTS[0].id,companyId:DEMO_COMPANIES[0].id,nextAction:'Voorstel versturen',nextActionDate:td(),priority:'high',notes:[{id:uid(),text:'Sarah wil Q3 live gaan',at:new Date().toISOString()}]},
  {...mkOpp('Brand Identity','','qualified',8500,40),contactId:DEMO_CONTACTS[1].id,companyId:DEMO_COMPANIES[1].id,nextAction:'Portfolio sturen',nextActionDate:td(),notes:[]},
  {...mkOpp('Strategie Workshop','','negotiation',12000,75),contactId:DEMO_CONTACTS[2].id,companyId:DEMO_COMPANIES[2].id,nextAction:'Contract reviewen',nextActionDate:td(),priority:'high',notes:[{id:uid(),text:'Akkoord op scope, prijs nog open',at:new Date().toISOString()}]},
  {...mkOpp('App Development','','lead',25000,20),contactId:DEMO_CONTACTS[3].id,companyId:DEMO_COMPANIES[3].id,nextAction:'Discovery call plannen',nextActionDate:'',notes:[]},
  {...mkOpp('SEO Pakket','','won',4800,100),contactId:DEMO_CONTACTS[0].id,companyId:DEMO_COMPANIES[0].id,closedAt:new Date().toISOString(),notes:[]},
  {...mkOpp('Pensioenadvies Platform','','lead',35000,15),contactId:'',companyId:DEMO_COMPANIES[4].id,nextAction:'Contactpersoon vinden',nextActionDate:td(),notes:[{id:uid(),text:'Nog geen contactpersoon, via LinkedIn benaderen',at:new Date().toISOString()}]},
];

const DEMO_TASKS=[
  {id:uid(),title:'Voorstel Sarah versturen',contactId:DEMO_CONTACTS[0].id,oppId:DEMO_OPPS[0].id,dueDate:td(),dueTime:'10:00',done:false,priority:'high',reminder:true,reminderMin:15,createdAt:new Date().toISOString()},
  {id:uid(),title:'Follow-up Mark bellen',contactId:DEMO_CONTACTS[1].id,oppId:DEMO_OPPS[1].id,dueDate:td(),dueTime:'14:00',done:false,priority:'medium',reminder:true,reminderMin:30,createdAt:new Date().toISOString()},
  {id:uid(),title:'Contract Lisa opstellen',contactId:DEMO_CONTACTS[2].id,oppId:DEMO_OPPS[2].id,dueDate:td(),dueTime:'',done:false,priority:'high',reminder:false,reminderMin:0,createdAt:new Date().toISOString()},
  {id:uid(),title:'Tom terugbellen over app specs',contactId:DEMO_CONTACTS[3].id,oppId:DEMO_OPPS[3].id,dueDate:td(),dueTime:'16:30',done:false,priority:'low',reminder:true,reminderMin:15,createdAt:new Date().toISOString()},
];

// ═══ APP ════════════════════════════════════════════════
const App = function(){
  const[dark,setDark]=useState(()=>LS.get('dark',true));
  const t=dark?DARK:LIGHT;
  const[contacts,setContacts]=useState(()=>LS.get('contacts',DEMO_CONTACTS));
  const[companies,setCompanies]=useState(()=>LS.get('companies',DEMO_COMPANIES));
  const[opps,setOpps]=useState(()=>LS.get('opps',DEMO_OPPS));
  const[tasks,setTasks]=useState(()=>LS.get('tasks',DEMO_TASKS));
  const[view,setView]=useState('pipeline');
  const[sb,setSb]=useState(false);
  const[modal,setModal]=useState(null); // {type:'contact'|'opp'|'task'|'company', data?:...}
  const[detail,setDetail]=useState(null); // {type:'contact'|'opp'|'company', id:...}
  const[search,setSearch]=useState('');
  const[toasts,setToasts]=useState([]);
  const[dragOpp,setDragOpp]=useState(null);
  const[dbStatus,setDbStatus]=useState('checking');
  const[dbMs,setDbMs]=useState(null);

  useEffect(()=>{LS.set('contacts',contacts);},[contacts]);
  useEffect(()=>{LS.set('companies',companies);},[companies]);
  useEffect(()=>{LS.set('opps',opps);},[opps]);
  useEffect(()=>{LS.set('tasks',tasks);},[tasks]);
  useEffect(()=>{LS.set('dark',dark);},[dark]);

  // ─── Neon Connection Check ────────────────────────
  const checkDb=useCallback(async()=>{
    try{
      const r=await fetch('/api/health',{signal:AbortSignal.timeout(6000)});
      if(r.ok){const d=await r.json();setDbStatus('connected');setDbMs(d.latency_ms||null);}
      else setDbStatus('offline');
    }catch{setDbStatus('offline');}
  },[]);

  useEffect(()=>{
    if(location.hostname.includes('claudeusercontent')||location.protocol==='file:'){setDbStatus('offline');return;}
    checkDb();
    const iv=setInterval(()=>{if(document.visibilityState==='visible')checkDb();},300000);
    return()=>clearInterval(iv);
  },[checkDb]);

  const toast=(m,ty='ok')=>{const i=uid();setToasts(p=>[...p,{id:i,m,ty}]);setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==i)),3000);};
  const cName=id=>contacts.find(c=>c.id===id)?.name||'';
  const compName=id=>companies.find(c=>c.id===id)?.name||'';
  const cCompany=id=>{const c=contacts.find(x=>x.id===id);return c?compName(c.companyId):'';}
  const oppName=id=>opps.find(o=>o.id===id)?.title||'';
  // Resolve display name for opp: contact name or company name
  const oppWho=o=>{if(o.contactId&&cName(o.contactId))return cName(o.contactId);if(o.companyId)return compName(o.companyId);return '';};
  const oppOrg=o=>{if(o.companyId)return compName(o.companyId);if(o.contactId)return cCompany(o.contactId);return '';};

  // ─── REMINDER SYSTEM ──────────────────────────────
  const firedRef=useRef(new Set());
  useEffect(()=>{
    // Request notification permission on first load
    if('Notification' in window && Notification.permission==='default'){
      Notification.requestPermission();
    }
  },[]);

  useEffect(()=>{
    const check=()=>{
      const now=new Date();
      const nowStr=td();
      const nowMin=now.getHours()*60+now.getMinutes();
      tasks.filter(tk=>tk.reminder&&!tk.done&&tk.dueDate===nowStr&&tk.dueTime).forEach(tk=>{
        const[h,m]=tk.dueTime.split(':').map(Number);
        const taskMin=h*60+m;
        const remMin=tk.reminderMin||15;
        const triggerMin=taskMin-remMin;
        if(nowMin>=triggerMin&&nowMin<=taskMin&&!firedRef.current.has(tk.id)){
          firedRef.current.add(tk.id);
          toast(`🔔 Herinnering: "${tk.title}" over ${taskMin-nowMin} min`,'info');
          if('Notification' in window && Notification.permission==='granted'){
            new Notification('DPM CRM Herinnering',{body:`${tk.title}${tk.dueTime?' om '+tk.dueTime:''}`,icon:'📋'});
          }
        }
      });
    };
    check();
    const iv=setInterval(check,30000); // check every 30s
    return()=>clearInterval(iv);
  },[tasks]);

  // Stats
  const activeOpps=opps.filter(o=>o.stage!=='won'&&o.stage!=='lost');
  const wonOpps=opps.filter(o=>o.stage==='won');
  const totalPipeline=activeOpps.reduce((s,o)=>s+o.value,0);
  const weightedPipeline=activeOpps.reduce((s,o)=>s+(o.value*o.probability/100),0);
  const wonRevenue=wonOpps.reduce((s,o)=>s+o.value,0);
  const todayTasks=tasks.filter(t=>t.dueDate===td()&&!t.done);
  const overdueTasks=tasks.filter(t=>t.dueDate&&t.dueDate<td()&&!t.done);

  // Apple styles
  const card={background:t.card,backdropFilter:t.blur,WebkitBackdropFilter:t.blur,border:`0.5px solid ${t.border}`,borderRadius:14,padding:16,boxShadow:t.shadow};
  const btn={display:'inline-flex',alignItems:'center',gap:6,padding:'8px 16px',borderRadius:10,fontFamily:'inherit',fontSize:13,fontWeight:500,cursor:'pointer',border:'none',transition:`all 0.2s ${sp}`};
  const btnP={...btn,background:t.accent,color:'#fff'};
  const btnG={...btn,background:t.glass,backdropFilter:t.blur,color:t.dim,border:`0.5px solid ${t.border}`};
  const btnD={...btn,background:t.redS,color:t.red,fontSize:12};
  const inp={width:'100%',padding:'10px 14px',background:dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)',border:'none',borderRadius:10,color:t.text,fontFamily:'inherit',fontSize:14,outline:'none'};
  const lbl={display:'block',fontSize:11,color:t.muted,textTransform:'uppercase',letterSpacing:0.8,marginBottom:5,fontWeight:600};
  const eur=n=>'€'+n.toLocaleString('nl-NL');

  // ─── PIPELINE VIEW (Kanban) ───────────────────────
  const Pipeline=()=>{
    const active=STAGES.filter(s=>s.id!=='won'&&s.id!=='lost');
    return <div>
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {[{l:'Pipeline',v:eur(totalPipeline),c:t.accent},{l:'Gewogen',v:eur(Math.round(weightedPipeline)),c:t.purple},{l:'Gewonnen',v:eur(wonRevenue),c:t.green},{l:'Deals',v:activeOpps.length,c:t.text}].map((s,i)=><div key={i} style={{...card,flex:'1 1 140px',minWidth:140}}><div style={lbl}>{s.l}</div><div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${active.length},1fr)`,gap:10,overflowX:'auto'}}>
        {active.map(stage=>{
          const stageOpps=opps.filter(o=>o.stage===stage.id);
          const stageVal=stageOpps.reduce((s,o)=>s+o.value,0);
          return <div key={stage.id}
            onDragOver={e=>e.preventDefault()}
            onDrop={()=>{if(dragOpp){setOpps(p=>p.map(o=>o.id===dragOpp?{...o,stage:stage.id,updatedAt:new Date().toISOString()}:o));toast(`Verplaatst naar ${stage.l}`);setDragOpp(null);}}}
            style={{minWidth:200}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,padding:'0 4px'}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:stage.c}}/>
                <span style={{fontSize:13,fontWeight:700}}>{stage.l}</span>
                <span style={{fontSize:11,color:t.muted,background:dark?'rgba(118,118,128,0.12)':'rgba(118,118,128,0.06)',padding:'1px 7px',borderRadius:8}}>{stageOpps.length}</span>
              </div>
              <span style={{fontSize:11,color:t.dim,fontWeight:500}}>{eur(stageVal)}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,minHeight:100}}>
              {stageOpps.map(opp=><div key={opp.id} draggable onDragStart={()=>setDragOpp(opp.id)} onClick={()=>setDetail({type:'opp',id:opp.id})}
                style={{...card,padding:'12px 14px',cursor:'grab',transition:`all 0.15s ${sp}`,borderLeft:`3px solid ${PRIS.find(p=>p.id===opp.priority)?.c||t.accent}`}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{opp.title}</div>
                <div style={{fontSize:11,color:t.dim,marginBottom:6}}>{oppWho(opp)}{oppOrg(opp)&&oppWho(opp)?' · '+oppOrg(opp):oppOrg(opp)}</div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:14,fontWeight:700,color:t.text}}>{eur(opp.value)}</span>
                  <span style={{fontSize:10,padding:'2px 8px',borderRadius:8,background:`${stage.c}20`,color:stage.c,fontWeight:600}}>{opp.probability}%</span>
                </div>
                {opp.nextAction&&<div style={{fontSize:11,color:t.orange,marginTop:6,fontWeight:500}}>→ {opp.nextAction}</div>}
              </div>)}
              <div onClick={()=>setModal({type:'opp',data:{stage:stage.id}})} style={{padding:10,borderRadius:10,border:`1.5px dashed ${t.border}`,textAlign:'center',color:t.muted,fontSize:12,cursor:'pointer'}}>+ Deal</div>
            </div>
          </div>;
        })}
      </div>
      {(wonOpps.length>0||opps.filter(o=>o.stage==='lost').length>0)&&<div style={{marginTop:24}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:10}}>Afgeronde deals</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {opps.filter(o=>o.stage==='won'||o.stage==='lost').map(o=><div key={o.id} onClick={()=>setDetail({type:'opp',id:o.id})} style={{...card,padding:'10px 14px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',opacity:.7}}>
            <span style={{fontSize:16}}>{o.stage==='won'?'🏆':'✕'}</span>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{o.title}</div><div style={{fontSize:11,color:t.dim}}>{oppWho(o)}{oppOrg(o)&&oppWho(o)?' · '+oppOrg(o):oppOrg(o)}</div></div>
            <span style={{fontWeight:700,color:o.stage==='won'?t.green:t.red}}>{eur(o.value)}</span>
          </div>)}
        </div>
      </div>}
    </div>;
  };

  // ─── CONTACTS VIEW ────────────────────────────────
  const Contacts=()=>{
    const filtered=contacts.filter(c=>{if(!search)return true;const q=search.toLowerCase();return c.name.toLowerCase().includes(q)||compName(c.companyId).toLowerCase().includes(q)||c.email.toLowerCase().includes(q)||(c.tags||[]).some(t=>t.includes(q));});
    return <div>
      <div style={{display:'flex',gap:8,marginBottom:16}}><div style={{flex:1,...inp,display:'flex',alignItems:'center',gap:8,padding:'8px 14px'}}><span style={{color:t.muted}}>🔍</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek contacten..." style={{flex:1,background:'none',border:'none',color:t.text,fontFamily:'inherit',fontSize:14,outline:'none'}}/>{search&&<span onClick={()=>setSearch('')} style={{cursor:'pointer',color:t.muted}}>✕</span>}</div><button onClick={()=>setModal({type:'contact'})} style={btnP}>+ Contact</button></div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {filtered.map(c=>{const cOpps=opps.filter(o=>o.contactId===c.id&&o.stage!=='lost');const cVal=cOpps.reduce((s,o)=>s+o.value,0);return <div key={c.id} onClick={()=>setDetail({type:'contact',id:c.id})} style={{...card,padding:'14px 16px',display:'flex',alignItems:'center',gap:14,cursor:'pointer'}}>
          <div style={{width:42,height:42,borderRadius:'50%',background:`linear-gradient(135deg,${t.accent},${t.purple})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff',flexShrink:0}}>{c.avatar||c.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600}}>{c.name}</div>
            <div style={{fontSize:12,color:t.dim}}>{c.role&&c.role+' · '}{compName(c.companyId)}</div>
            {c.tags?.length>0&&<div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}}>{c.tags.map(tag=><span key={tag} style={{fontSize:10,padding:'1px 7px',borderRadius:6,background:t.accentS,color:t.accent,fontWeight:500}}>{tag}</span>)}</div>}
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            {cOpps.length>0&&<div style={{fontSize:13,fontWeight:700}}>{eur(cVal)}</div>}
            <div style={{fontSize:11,color:t.dim}}>{cOpps.length} deal{cOpps.length!==1?'s':''}</div>
          </div>
        </div>;})}
      </div>
    </div>;
  };

  // ─── TASKS VIEW ───────────────────────────────────
  const Tasks=()=>{
    const open=tasks.filter(t=>!t.done).sort((a,b)=>{
      // Sort: overdue first, then by date+time
      const aOver=a.dueDate&&a.dueDate<td()?0:1;
      const bOver=b.dueDate&&b.dueDate<td()?0:1;
      if(aOver!==bOver)return aOver-bOver;
      return (a.dueDate||'z').localeCompare(b.dueDate||'z')||(a.dueTime||'zz').localeCompare(b.dueTime||'zz');
    });
    const done=tasks.filter(t=>t.done);
    return <div>

  // ─── REPORTS / SALES FUNNEL ────────────────────────
  const Reports=()=>{
    const funnelStages=STAGES.filter(s=>s.id!=='won'&&s.id!=='lost');
    const funnelData=funnelStages.map(s=>{const st=opps.filter(o=>o.stage===s.id);return{...s,count:st.length,val:st.reduce((sum,o)=>sum+o.value,0),weighted:st.reduce((sum,o)=>sum+(o.value*o.probability/100),0)};});
    const maxCount=Math.max(...funnelData.map(d=>d.count),1);
    const totalAll=opps.length||1;
    const convRate=opps.length?Math.round(wonOpps.length/opps.length*100):0;
    const avgDealSize=activeOpps.length?Math.round(totalPipeline/activeOpps.length):0;
    const avgWon=wonOpps.length?Math.round(wonRevenue/wonOpps.length):0;

    // Funnel widths (percentage) — widest at top, narrowing down
    const fW=funnelData.map((d,i)=>{const base=90-i*12;return Math.max(base*(d.count/maxCount),20);});

    return <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:10,marginBottom:24}}>
        {[{l:'Totaal Deals',v:opps.length,c:t.text},{l:'Conversie',v:convRate+'%',c:t.green},{l:'Gem. Dealgrootte',v:eur(avgDealSize),c:t.accent},{l:'Gem. Gewonnen',v:eur(avgWon),c:t.green},{l:'Pipeline Waarde',v:eur(totalPipeline),c:t.purple},{l:'Verloren',v:opps.filter(o=>o.stage==='lost').length,c:t.red}].map((s,i)=><div key={i} style={card}><div style={lbl}>{s.l}</div><div style={{fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
        {/* VISUAL FUNNEL */}
        <div style={card}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>Sales Funnel</div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
            {funnelData.map((d,i)=>{const w=fW[i];return <div key={d.id} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
              <div style={{width:`${w}%`,background:`linear-gradient(135deg,${d.c}cc,${d.c}88)`,borderRadius:i===0?'12px 12px 4px 4px':i===funnelData.length-1?'4px 4px 12px 12px':'4px',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',minHeight:52,transition:`all 0.4s ${sp}`}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>{d.l}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.7)'}}>{d.count} deal{d.count!==1?'s':''}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:15,fontWeight:700,color:'#fff'}}>{eur(d.val)}</div>
                  <div style={{fontSize:10,color:'rgba(255,255,255,0.6)'}}>gewogen {eur(Math.round(d.weighted))}</div>
                </div>
              </div>
              {i<funnelData.length-1&&<div style={{position:'absolute',bottom:-6,fontSize:10,color:t.muted,zIndex:1}}>
                {funnelData[i+1].count>0&&d.count>0?Math.round(funnelData[i+1].count/d.count*100)+'%':'—'}
              </div>}
            </div>;})}
          </div>
          <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:20}}>
            <div style={{textAlign:'center'}}><div style={{fontSize:20,fontWeight:700,color:t.green}}>🏆 {wonOpps.length}</div><div style={{fontSize:11,color:t.dim}}>Gewonnen</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:20,fontWeight:700,color:t.red}}>✕ {opps.filter(o=>o.stage==='lost').length}</div><div style={{fontSize:11,color:t.dim}}>Verloren</div></div>
          </div>
        </div>

        {/* CONVERSION TABLE */}
        <div style={card}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Conversie per Fase</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {funnelData.map((d,i)=>{const pct=d.count>0?Math.round(d.count/totalAll*100):0;return <div key={d.id}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:8,height:8,borderRadius:'50%',background:d.c}}/><span style={{fontSize:13,fontWeight:600}}>{d.l}</span></div>
                <div style={{display:'flex',gap:12,alignItems:'center'}}><span style={{fontSize:12,color:t.dim}}>{d.count} deals</span><span style={{fontSize:13,fontWeight:700}}>{eur(d.val)}</span></div>
              </div>
              <div style={{height:6,background:t.elev,borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:d.c,width:`${pct}%`,borderRadius:3,transition:`width 0.5s ${sp}`}}/></div>
              {i<funnelData.length-1&&funnelData[i+1].count>0&&d.count>0&&<div style={{fontSize:10,color:t.muted,textAlign:'right',marginTop:2}}>↓ {Math.round(funnelData[i+1].count/d.count*100)}% conversie</div>}
            </div>;})}
          </div>
          <div style={{marginTop:20,padding:'14px 16px',borderRadius:10,background:t.greenS,border:`0.5px solid ${t.green}33`}}>
            <div style={{fontSize:13,fontWeight:700,color:t.green,marginBottom:4}}>Lead → Won Conversie</div>
            <div style={{fontSize:28,fontWeight:800,color:t.green}}>{convRate}%</div>
            <div style={{fontSize:11,color:t.dim,marginTop:2}}>{wonOpps.length} van {opps.length} deals gewonnen</div>
          </div>
        </div>
      </div>

      {/* PIPELINE VALUE CHART */}
      <div style={card}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Pipeline Waarde per Fase</div>
        <svg viewBox="0 0 500 160" style={{width:'100%'}}>
          {funnelData.map((d,i)=>{const bw=60,gap=110,x=30+i*gap,maxV=Math.max(...funnelData.map(s=>s.val),1),h=(d.val/maxV)*110;return <g key={i}>
            <rect x={x} y={130-h} width={bw} height={h} rx={8} fill={d.c} opacity={.8}/>
            <text x={x+bw/2} y={145} textAnchor="middle" fontSize="10" fill={t.muted} fontFamily="Outfit,system-ui">{d.l.slice(0,8)}</text>
            <text x={x+bw/2} y={123-h} textAnchor="middle" fontSize="10" fill={t.dim} fontWeight="600" fontFamily="Outfit,system-ui">{eur(d.val)}</text>
          </g>;})}
          <line x1="28" y1="130" x2="480" y2="130" stroke={t.border} strokeWidth=".5"/>
        </svg>
      </div>
    </div>;
  };

  // ─── COMPANIES VIEW ────────────────────────────────
  const Companies=()=>{
    const filtered=companies.filter(c=>{if(!search)return true;const q=search.toLowerCase();return c.name.toLowerCase().includes(q)||(c.industry||'').toLowerCase().includes(q)||(c.address||'').toLowerCase().includes(q)||(c.tags||[]).some(tg=>tg.includes(q));});
    return <div>
      <div style={{display:'flex',gap:8,marginBottom:16}}><div style={{flex:1,...inp,display:'flex',alignItems:'center',gap:8,padding:'8px 14px'}}><span style={{color:t.muted}}>🔍</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek bedrijven..." style={{flex:1,background:'none',border:'none',color:t.text,fontFamily:'inherit',fontSize:14,outline:'none'}}/>{search&&<span onClick={()=>setSearch('')} style={{cursor:'pointer',color:t.muted}}>✕</span>}</div><button onClick={()=>setModal({type:'company'})} style={btnP}>+ Bedrijf</button></div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {filtered.map(co=>{const coContacts=contacts.filter(c=>c.companyId===co.id);const coOpps=opps.filter(o=>o.companyId===co.id&&o.stage!=='lost');const coVal=coOpps.reduce((s,o)=>s+o.value,0);return <div key={co.id} onClick={()=>setDetail({type:'company',id:co.id})} style={{...card,padding:'14px 16px',display:'flex',alignItems:'center',gap:14,cursor:'pointer'}}>
          <div style={{width:42,height:42,borderRadius:10,background:`linear-gradient(135deg,${t.teal},${t.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:'#fff',flexShrink:0}}>{co.name.charAt(0)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600}}>{co.name}</div>
            <div style={{fontSize:12,color:t.dim}}>{co.industry}{co.address&&' · '+co.address}</div>
            <div style={{display:'flex',gap:6,marginTop:4,alignItems:'center'}}>
              {coContacts.length>0?<span style={{fontSize:10,color:t.accent}}>👤 {coContacts.length} contact{coContacts.length!==1?'en':''}</span>:<span style={{fontSize:10,color:t.orange,fontWeight:500}}>Geen contactpersoon</span>}
              {co.tags?.length>0&&co.tags.map(tg=><span key={tg} style={{fontSize:10,padding:'1px 6px',borderRadius:5,background:t.accentS,color:t.accent}}>{tg}</span>)}
            </div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            {coOpps.length>0&&<div style={{fontSize:13,fontWeight:700}}>{eur(coVal)}</div>}
            <div style={{fontSize:11,color:t.dim}}>{coOpps.length} deal{coOpps.length!==1?'s':''}</div>
          </div>
        </div>;})}
      </div>
    </div>;
  };

  // Navigation
  const views={pipeline:Pipeline,contacts:Contacts,companies:Companies,tasks:Tasks,dashboard:Dash,reports:Reports};
  const titles={pipeline:'Pipeline',contacts:'Contacten',companies:'Bedrijven',tasks:'Taken',dashboard:'Dashboard',reports:'Rapporten'};
  const nav=[{id:'dashboard',ic:'◆',l:'Dashboard'},{id:'pipeline',ic:'📊',l:'Pipeline'},{id:'companies',ic:'🏢',l:'Bedrijven'},{id:'contacts',ic:'👤',l:'Contacten'},{id:'tasks',ic:'☑',l:'Taken'},{id:'reports',ic:'📈',l:'Rapporten'}];

  return <>
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
      *{margin:0;padding:0;box-sizing:border-box}body{font-family:Outfit,system-ui,-apple-system,sans-serif;background:${t.bg};color:${t.text}}
      ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:${t.border};border-radius:3px}
      @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
      @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
      @keyframes glow{0%,100%{box-shadow:0 0 12px ${t.accentS}}50%{box-shadow:0 0 28px ${t.accentS}}}
      .sb{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:200;transition:transform .3s ${sp}}
      @media(min-width:769px){.sb{position:relative;transform:none!important}}
      @media(max-width:768px){.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.ham{display:flex!important}.mc{padding:14px!important}}
    `}</style>
    <div style={{display:'flex',height:'100vh'}}>
      {sb&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:150}} onClick={()=>setSb(false)}/>}
      <aside className={`sb ${sb?'open':''}`} style={{background:t.bg2,borderRight:`0.5px solid ${t.border}`,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'20px 16px',borderBottom:`0.5px solid ${t.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,background:`linear-gradient(135deg,${t.accent},#5856D6)`,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:'#fff',animation:'glow 3s ease infinite'}}>P</div><div><div style={{fontSize:18,fontWeight:800,letterSpacing:-.3}}>DPM CRM</div><div style={{fontSize:9,color:t.muted,letterSpacing:2,textTransform:'uppercase',fontWeight:600}}>Sales Pipeline</div></div></div>
        </div>
        <nav style={{flex:1,padding:'12px 10px'}}>
          {nav.map(n=><div key={n.id} onClick={()=>{setView(n.id);setSb(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,cursor:'pointer',color:view===n.id?t.accent:t.dim,background:view===n.id?t.accentS:'transparent',fontSize:14,fontWeight:view===n.id?600:400,marginBottom:2,transition:`all .15s ${sp}`}}><span style={{fontSize:15}}>{n.ic}</span>{n.l}</div>)}
          <div style={{borderTop:`0.5px solid ${t.border}`,marginTop:16,paddingTop:12}}>
            <div onClick={()=>setDark(!dark)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,cursor:'pointer',color:t.dim,fontSize:13}}>{dark?'🌙':'☀️'} {dark?'Donker':'Licht'}</div>
          </div>
        </nav>
        <div style={{padding:'12px 16px',borderTop:`0.5px solid ${t.border}`}}>
          <div style={{fontSize:11,color:t.muted}}>Pipeline: {eur(totalPipeline)}</div>
          <div style={{fontSize:11,color:t.green}}>{wonOpps.length} gewonnen · {eur(wonRevenue)}</div>
          <div onClick={dbStatus!=='connected'?checkDb:undefined} style={{display:'flex',alignItems:'center',gap:6,marginTop:8,cursor:dbStatus!=='connected'?'pointer':'default',fontSize:11,color:dbStatus==='connected'?t.green:dbStatus==='checking'?t.accent:t.orange}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:dbStatus==='connected'?t.green:dbStatus==='checking'?t.accent:t.orange,animation:dbStatus==='checking'?'pulse 1.5s infinite':'none'}}/>
            {dbStatus==='connected'?`Neon verbonden${dbMs?' ('+dbMs+'ms)':''}`:dbStatus==='checking'?'Verbinden...':'Lokale opslag'}
          </div>
        </div>
      </aside>

      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{padding:'14px 24px',borderBottom:`0.5px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',background:t.bg}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}><button className="ham" onClick={()=>setSb(true)} style={{display:'none',width:36,height:36,border:'none',background:t.elev,borderRadius:10,cursor:'pointer',color:t.text,fontSize:18,alignItems:'center',justifyContent:'center'}}>☰</button><h1 style={{fontSize:24,fontWeight:800,letterSpacing:-.5}}>{titles[view]}</h1></div>
          <div style={{display:'flex',gap:8}}>
            {view==='pipeline'&&<button onClick={()=>setModal({type:'opp'})} style={btnP}>+ Deal</button>}
            {view==='contacts'&&<button onClick={()=>setModal({type:'contact'})} style={btnP}>+ Contact</button>}
            {view==='companies'&&<button onClick={()=>setModal({type:'company'})} style={btnP}>+ Bedrijf</button>}
            {view==='tasks'&&<button onClick={()=>setModal({type:'task'})} style={btnP}>+ Taak</button>}
            {view==='dashboard'&&<button onClick={()=>setModal({type:'opp'})} style={btnP}>+ Deal</button>}
          </div>
        </header>
        <div className="mc" style={{flex:1,overflowY:'auto',padding:'20px 24px',animation:'fadeIn .3s'}}>
          {dbStatus==='offline'&&!location.hostname.includes('claudeusercontent')&&<div style={{padding:'12px 16px',marginBottom:16,borderRadius:12,background:t.orangeS,border:`0.5px solid ${t.orange}44`,display:'flex',alignItems:'flex-start',gap:10}}>
            <span style={{marginTop:2}}>⚠️</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:t.orange}}>Neon database niet verbonden</div>
              <div style={{fontSize:11,color:t.dim,marginTop:3}}>Data wordt lokaal opgeslagen. Stel DATABASE_URL en JWT_SECRET in als Netlify env vars.</div>
            </div>
            <button onClick={checkDb} style={{...btnG,padding:'4px 10px',fontSize:11,color:t.orange,borderColor:`${t.orange}44`,whiteSpace:'nowrap'}}>↻ Check</button>
          </div>}
          {dbStatus==='checking'&&!location.hostname.includes('claudeusercontent')&&<div style={{padding:'8px 16px',marginBottom:16,borderRadius:12,background:t.accentS,fontSize:12,color:t.accent,animation:'pulse 1.5s infinite'}}>⏳ Verbinding controleren...</div>}
          {views[view]?.()}
        </div>
      </main>

      {detail&&<DetailPanel/>}
      {modal?.type==='contact'&&<ContactModal/>}
      {modal?.type==='opp'&&<OppModal/>}
      {modal?.type==='task'&&<TaskModal/>}
      {modal?.type==='company'&&<CompanyModal/>}
      <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:6}}>{toasts.map(x=><div key={x.id} style={{padding:'10px 16px',background:t.glass,backdropFilter:t.blur,border:`0.5px solid ${t.border}`,borderRadius:12,fontSize:13,boxShadow:t.shadow,animation:'fadeIn .3s',borderLeft:`3px solid ${x.ty==='ok'?t.green:t.accent}`}}>{x.ty==='ok'?'✓':'ℹ'} {x.m}</div>)}</div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
